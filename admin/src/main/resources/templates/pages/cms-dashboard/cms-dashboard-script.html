<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="script">
<script th:inline="javascript">
/*<![CDATA[*/
    const CAN_MANAGE_OWN_CMS_PAGE = /*[[${userAuthorities != null && userAuthorities.contains('CMS:R')}]]*/ false;
    // 새 페이지 생성 후 에디터 이동에 사용하는 CMS URL (말미 슬래시 제거)
    const CMS_USER_URL = /*[[${cmsUserUrl}]]*/ '';
/*]]>*/
</script>
<script>
    // ==================== CmsDashboardPage ====================

    window.CmsDashboardPage = {
        currentPage: 1,
        totalItems: 0,
        itemsPerPage: 10,
        sortBy: null,
        sortDirection: null,
        rowsByPageId: {},
        templateOptions: [],

        APPROVE_STATE_BADGE: {
            WORK:     '<span class="badge bg-secondary">작업중</span>',
            PENDING:  '<span class="badge bg-warning text-dark">승인대기</span>',
            APPROVED: '<span class="badge bg-success">승인완료</span>',
            REJECTED: '<span class="badge bg-danger">반려</span>',
        },

        // DB 값 → 한글 표시명 매핑
        VIEW_MODE_LABEL: {
            mobile:     '모바일',
            web:        '웹',
            PC:         '웹',
            responsive: '반응형',
        },

        load: function(page) {
            if (page !== undefined) this.currentPage = page;
            const params = new URLSearchParams({
                page:         this.currentPage,
                size:         this.itemsPerPage,
                approveState: $('#filterApproveState').val(),
                viewMode:     $('#filterViewMode').val(),
                search:       $('#filterSearch').val().trim(),
            });
            if (this.sortBy) {
                params.append('sortBy', this.sortBy);
                params.append('sortDirection', this.sortDirection);
            }

            fetch('/api/cms-dashboard/pages?' + params)
                .then(r => r.json())
                .then(res => {
                    if (!res.success) { Toast.error(res.message); return; }
                    const pageData = res.data;
                    this.totalItems = pageData.totalElements;
                    this.renderTable(pageData.content);
                    this.renderPagination();
                    this.updateSortIndicators();
                })
                .catch(() => Toast.error('목록 조회 중 오류가 발생했습니다.'));
        },

        attachSortHandlers: function() {
            $(document)
                .off('click.cmsDashboardSort', '#dashboardTable thead th[data-sort]')
                .on('click.cmsDashboardSort', '#dashboardTable thead th[data-sort]', function() {
                    const sortKey = $(this).data('sort');
                    if (!sortKey) return;

                    if (CmsDashboardPage.sortBy === sortKey) {
                        if (CmsDashboardPage.sortDirection === 'ASC') {
                            CmsDashboardPage.sortDirection = 'DESC';
                        } else {
                            CmsDashboardPage.sortBy = null;
                            CmsDashboardPage.sortDirection = null;
                        }
                    } else {
                        CmsDashboardPage.sortBy = sortKey;
                        CmsDashboardPage.sortDirection = 'ASC';
                    }

                    CmsDashboardPage.updateSortIndicators();
                    CmsDashboardPage.load(1);
                });
        },

        updateSortIndicators: function() {
            const headers = $('#dashboardTable thead th.sortable');
            headers.removeClass('sort-asc sort-desc');
            if (!this.sortBy || !this.sortDirection) return;
            headers.filter(`[data-sort="${this.sortBy}"]`)
                .addClass(this.sortDirection === 'ASC' ? 'sort-asc' : 'sort-desc');
        },

        renderTable: function(rows) {
            const $tbody = $('#dashboardTableBody');
            if (!rows || rows.length === 0) {
                this.rowsByPageId = {};
                $tbody.html('<tr><td colspan="8" class="text-center py-4 text-body-secondary">조회된 데이터가 없습니다.</td></tr>');
                return;
            }

            this.rowsByPageId = rows.reduce((map, row) => {
                if (row.pageId) map[row.pageId] = row;
                return map;
            }, {});

            const html = rows.map(row => {
                const badge      = this.APPROVE_STATE_BADGE[row.approveState] || HtmlUtils.escape(row.approveState);
                const viewMode   = this.VIEW_MODE_LABEL[row.viewMode] || HtmlUtils.escape(row.viewMode || '');
                const expiredCls = row.isExpired === 'Y' ? 'text-danger fw-bold' : '';
                const pid        = HtmlUtils.escape(row.pageId);

                // 승인요청 버튼 — CMS DashboardClient.tsx:472-484 기준
                // WORK → "승인요청", REJECTED / APPROVED → "재승인요청", PENDING → 버튼 없음
                let tdApprove = '-';
                if (CAN_MANAGE_OWN_CMS_PAGE) {
                    if (row.approveState === 'WORK') {
                        tdApprove = `<button class="btn btn-primary btn-xs"
                            onclick="CmsDashboardPage.openApproveRequestModal('${pid}')">승인요청</button>`;
                    } else if (row.approveState === 'REJECTED' || row.approveState === 'APPROVED') {
                        tdApprove = `<button class="btn btn-outline-primary btn-xs"
                            onclick="CmsDashboardPage.openApproveRequestModal('${pid}')">재승인요청</button>`;
                    }
                }

                // 삭제 버튼 — CMS:R 제작자 권한에서 본인 페이지에만 표시
                const tdDelete = CAN_MANAGE_OWN_CMS_PAGE
                    ? `<button class="btn btn-outline-danger btn-xs"
                           onclick="CmsDashboardPage.deletePage('${pid}')">삭제</button>`
                    : '-';

                // 반려 상태면 페이지명 옆에 반려 사유 확인 링크 표시
                const rejectedLink = (row.approveState === 'REJECTED' && row.rejectedReason)
                    ? ` <a href="#" class="text-danger small" title="반려 사유 확인"
                            onclick="CmsDashboardPage.showRejectedReason('${pid}'); return false;">
                            <i class="bi bi-exclamation-circle"></i></a>`
                    : '';

                return `<tr>
                    <td>
                        <span class="clickable-cell"
                              onclick="CmsDashboardPage.openEditor('${pid}')"
                              title="CMS 에디터로 이동">${HtmlUtils.escape(row.pageName || '')}</span>${rejectedLink}
                    </td>
                    <td class="text-center">${viewMode}</td>
                    <td class="text-center">${badge}</td>
                    <td class="text-center">${HtmlUtils.escape(row.beginningDate || '-')}</td>
                    <td class="text-center ${expiredCls}">${HtmlUtils.escape(row.expiredDate || '-')}</td>
                    <td class="text-center small">${HtmlUtils.escape(row.lastModifiedDtime || '-')}</td>
                    <td class="text-center">${tdApprove}</td>
                    <td class="text-center">${tdDelete}</td>
                </tr>`;
            }).join('');

            $tbody.html(html);
        },

        renderPagination: function() {
            const totalPages = Math.ceil(this.totalItems / this.itemsPerPage);
            const pagination = $('#pagination');
            pagination.empty();

            pagination.append(`
                <li class="page-item ${this.currentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="CmsDashboardPage.changePage(1); return false;"><i class="bi bi-chevron-double-left"></i></a>
                </li>
                <li class="page-item ${this.currentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="CmsDashboardPage.changePage(${this.currentPage - 1}); return false;"><i class="bi bi-chevron-left"></i></a>
                </li>
            `);

            const maxButtons = 5;
            let startPage = Math.max(1, this.currentPage - Math.floor(maxButtons / 2));
            let endPage   = Math.min(totalPages, startPage + maxButtons - 1);
            if (endPage - startPage + 1 < maxButtons) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }

            for (let i = startPage; i <= endPage; i++) {
                pagination.append(`
                    <li class="page-item ${i === this.currentPage ? 'active' : ''}">
                        <a class="page-link" href="#" onclick="CmsDashboardPage.changePage(${i}); return false;">${i}</a>
                    </li>
                `);
            }

            pagination.append(`
                <li class="page-item ${this.currentPage === totalPages || totalPages === 0 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="CmsDashboardPage.changePage(${this.currentPage + 1}); return false;"><i class="bi bi-chevron-right"></i></a>
                </li>
                <li class="page-item ${this.currentPage === totalPages || totalPages === 0 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="CmsDashboardPage.changePage(${totalPages}); return false;"><i class="bi bi-chevron-double-right"></i></a>
                </li>
            `);

            const start = this.totalItems === 0 ? 0 : (this.currentPage - 1) * this.itemsPerPage + 1;
            const end   = Math.min(this.currentPage * this.itemsPerPage, this.totalItems);
            $('#pageInfo').text(`${start} - ${end} of ${this.totalItems} items`);
        },

        changePage: function(page) {
            const totalPages = Math.ceil(this.totalItems / this.itemsPerPage);
            if (page < 1 || page > totalPages) return;
            this.currentPage = page;
            this.load();
        },

        reset: function() {
            $('#filterApproveState').val('');
            $('#filterViewMode').val('');
            $('#filterSearch').val('');
            this.sortBy = null;
            this.sortDirection = null;
            this.updateSortIndicators();
            this.itemsPerPage = parseInt($('#limitRows').val()) || 10;
            this.load(1);
        },

        // ── CMS 에디터 이동 ──
        openEditor: function(pageId) {
            const url = CMS_USER_URL.replace(/\/$/, '') + '/cms/edit?bank=' + encodeURIComponent(pageId);
            window.open(url, 'cmsEditor', 'width=1280,height=800,scrollbars=yes,resizable=yes');
        },

        // ── 페이지 생성 모달 ──
        openCreatePageModal: function() {
            $('#createPageName').val('');
            this.selectCreateViewMode('mobile');
            this.selectCreateTemplate('blank');
            this.updateCreateButtonState(false);
            new bootstrap.Modal('#createPageModal').show();
        },

        selectCreateViewMode: function(viewMode) {
            $('#createViewMode').val(viewMode);
            $('.cms-create-view-mode')
                .removeClass('active')
                .filter(`[data-view-mode="${viewMode}"]`)
                .addClass('active');
            this.renderCreateTemplates();
        },

        selectCreateTemplate: function(templateId) {
            const $template = $(`.cms-create-template[data-template-id="${templateId}"]`);
            $('#createTemplateId').val(templateId);
            $('.cms-create-template')
                .removeClass('active')
                .filter(`[data-template-id="${templateId}"]`)
                .addClass('active');
            $('.cms-create-template-selected-name').text($template.find('.cms-create-template-title').text());
        },

        /**
         * 템플릿 목록 동적 로드 — GET /api/cms-dashboard/templates
         * 페이지 초기화 시 1회 호출. 중복 방지를 위해 blank 외 기존 항목을 먼저 제거한다.
         * XSS 방지: pageName은 jQuery .text()로 설정하여 HTML 이스케이프 처리.
         */
        _loadTemplates: function() {
            fetch('/api/cms-dashboard/templates')
                .then(r => r.json())
                .then(res => {
                    if (!res.success || !res.data) return;
                    this.templateOptions = Array.isArray(res.data) ? res.data : [];
                    this.renderCreateTemplates();
                })
                .catch(() => {}); // 로드 실패 시 빈 페이지만으로 정상 동작
        },

        renderCreateTemplates: function() {
            const $list = $('.cms-create-template-list');
            const selectedViewMode = $('#createViewMode').val() || 'mobile';
            const currentTemplateId = $('#createTemplateId').val() || 'blank';
            const filteredTemplates = this.templateOptions.filter((template) =>
                template.viewMode === selectedViewMode || (selectedViewMode === 'web' && template.viewMode === 'PC'));

            // 이전에 동적으로 추가된 항목 제거 (중복 방지)
            $list.find('.cms-create-template:not([data-template-id="blank"])').remove();

            filteredTemplates.forEach(function(template) {
                const $btn = $('<button type="button" class="cms-create-template"></button>');
                $btn.attr('data-template-id', template.pageId);
                $btn.attr('data-template-view-mode', template.viewMode);
                const $radio = $('<span class="cms-create-template-radio"></span>');
                const $title = $('<span class="cms-create-template-title"></span>').text(template.pageName);
                const $desc = $('<span class="cms-create-template-desc"></span>').text('미리 구성된 템플릿으로 시작합니다.');
                $btn.append($radio).append($('<span></span>').append($title).append($desc));
                $list.append($btn);
            });

            const hasCurrentTemplate = currentTemplateId === 'blank'
                || filteredTemplates.some((template) => template.pageId === currentTemplateId);

            if (!hasCurrentTemplate) {
                this.selectCreateTemplate('blank');
                return;
            }

            this.selectCreateTemplate(currentTemplateId);
        },

        updateCreateButtonState: function(creating) {
            const hasName = !!$('#createPageName').val().trim();
            $('#btnCreatePageConfirm')
                .prop('disabled', creating || !hasName)
                .text(creating ? '생성 중...' : '만들기');
        },

        _submitCreatePage: function() {
            if ($('#btnCreatePageConfirm').prop('disabled')) return;
            const pageName = $('#createPageName').val().trim();
            const viewMode = $('#createViewMode').val();
            const templateId = $('#createTemplateId').val();

            if (!pageName) { Toast.warning('페이지명을 입력하세요.'); return; }
            this.updateCreateButtonState(true);

            fetch('/api/cms-dashboard/pages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pageName, viewMode, templateId }),
            })
                .then(r => r.json())
                .then(res => {
                    bootstrap.Modal.getInstance('#createPageModal').hide();
                    if (res.success) {
                        Toast.success(res.message);
                        // 생성 후 CMS 에디터로 자동 이동
                        window.open(res.data.editorUrl, 'cmsEditor', 'width=1280,height=800,scrollbars=yes,resizable=yes');
                        this.load(1);
                    } else {
                        Toast.error(res.message);
                        this.updateCreateButtonState(false);
                    }
                })
                .catch(() => {
                    this.updateCreateButtonState(false);
                    Toast.error('페이지 생성 중 오류가 발생했습니다.');
                });
        },

        // ── 승인 요청 모달 ──
        openApproveRequestModal: function(pageId) {
            const row = this.rowsByPageId[pageId] || {};
            // 상태에 따라 모달 타이틀 변경
            const isReApprove = row.approveState === 'REJECTED' || row.approveState === 'APPROVED';
            $('#approveRequestModalTitle').text(isReApprove ? '재승인요청' : '승인 요청');
            $('#approveRequestPageId').val(pageId);
            $('#approveRequestPageName').text(row.pageName || '-');
            $('#approveRequestApproverId').html('<option value="">승인자 선택</option>');

            // 노출 시작일 최소값 = 오늘 (과거 노출은 의미 없으므로 date picker에서 선택 불가)
            // YYYY-MM-DD 로컬 시각 기준 — toISOString()은 UTC라 한국 시간 자정 부근에 하루 어긋날 수 있어 사용 금지
            const now = new Date();
            const todayStr = now.getFullYear() + '-'
                           + String(now.getMonth() + 1).padStart(2, '0') + '-'
                           + String(now.getDate()).padStart(2, '0');
            $('#approveRequestBeginningDate').attr('min', todayStr);

            // 재승인 케이스에서 row.beginningDate가 과거이면 빈 값으로 초기화 (min 위배 값 잔존 방지)
            const prefBegin = row.beginningDate || '';
            $('#approveRequestBeginningDate').val(prefBegin && prefBegin >= todayStr ? prefBegin : '');
            $('#approveRequestExpiredDate').val(row.expiredDate || '');

            // 승인자 목록 로드
            fetch('/api/auth/cms-approvers')
                .then(r => r.json())
                .then(res => {
                    if (!res.success) return;
                    const options = res.data.map(a =>
                        `<option value="${HtmlUtils.escape(a.userId)}" data-name="${HtmlUtils.escape(a.userName)}">
                            ${HtmlUtils.escape(a.userName)}
                        </option>`
                    ).join('');
                    $('#approveRequestApproverId').append(options);
                });

            new bootstrap.Modal('#approveRequestModal').show();
        },

        _submitApproveRequest: function() {
            const pageId     = $('#approveRequestPageId').val();
            const approverId = $('#approveRequestApproverId').val();

            if (!approverId) { Toast.warning('승인자를 선택하세요.'); return; }

            const beginningDate = $('#approveRequestBeginningDate').val();
            const expiredDate   = $('#approveRequestExpiredDate').val();

            // approverName은 서버에서 DB 조회 — 클라이언트에서 전달하지 않음 (위변조 방지)
            fetch(`/api/cms-dashboard/pages/${pageId}/approve-request`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ approverId, beginningDate, expiredDate }),
            })
                .then(r => r.json())
                .then(res => {
                    bootstrap.Modal.getInstance('#approveRequestModal').hide();
                    if (res.success) { Toast.success(res.message); this.load(); }
                    else             { Toast.error(res.message); }
                })
                .catch(() => Toast.error('승인 요청 중 오류가 발생했습니다.'));
        },

        // ── 반려 사유 확인 ──
        showRejectedReason: function(pageId) {
            const row = this.rowsByPageId[pageId] || {};
            $('#rejectedReasonText').text(row.rejectedReason || '반려 사유가 없습니다.');
            new bootstrap.Modal('#rejectedReasonModal').show();
        },

        // ── 삭제 ──
        deletePage: function(pageId) {
            const row = this.rowsByPageId[pageId] || {};
            if (!confirm(`'${row.pageName || pageId}' 페이지를 삭제하시겠습니까?`)) return;

            fetch(`/api/cms-dashboard/pages/${pageId}`, { method: 'DELETE' })
                .then(r => r.json())
                .then(res => {
                    if (res.success) { Toast.success(res.message); this.load(); }
                    else             { Toast.error(res.message); }
                })
                .catch(() => Toast.error('삭제 중 오류가 발생했습니다.'));
        },
    };

    // ==================== 이벤트 바인딩 ====================

    $(document).ready(function() {
        CmsDashboardPage.itemsPerPage = parseInt($('#limitRows').val()) || 10;
        CmsDashboardPage.attachSortHandlers();
        CmsDashboardPage.load(1);
        CmsDashboardPage._loadTemplates();

        $('#limitRows').on('change', function() {
            CmsDashboardPage.itemsPerPage = parseInt($(this).val()) || 10;
            CmsDashboardPage.load(1);
        });

        $('.cms-create-view-mode').on('click', function() {
            CmsDashboardPage.selectCreateViewMode($(this).data('view-mode'));
        });
        // 이벤트 위임 — _loadTemplates()로 동적 추가된 버튼에도 적용
        $('.cms-create-template-list').on('click', '.cms-create-template', function() {
            CmsDashboardPage.selectCreateTemplate($(this).data('template-id'));
        });
        $('#createPageName').on('input', function() {
            CmsDashboardPage.updateCreateButtonState(false);
        });
        $('#createPageName').on('keydown', function(event) {
            if (event.key === 'Enter' && $(this).val().trim()) CmsDashboardPage._submitCreatePage();
        });
        $('#btnCreatePage').on('click', function() { CmsDashboardPage.openCreatePageModal(); });
        $('#btnCreatePageConfirm').on('click', function() { CmsDashboardPage._submitCreatePage(); });
        $('#btnApproveRequestConfirm').on('click', function() { CmsDashboardPage._submitApproveRequest(); });
    });
</script>
</th:block>
</body>
</html>
