<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<script th:fragment="script">
    window.LogLevelManage = (function () {
        const LEVEL_OPTIONS = ['ERROR', 'WARN', 'INFO', 'DEBUG', 'TRACE', 'OFF'];

        let allLoggers = [];      // 서버에서 받은 전체 로거 목록
        let filteredLoggers = []; // 필터 적용 후 목록
        let currentPage = 1;
        let itemsPerPage = 10;

        function init() {
            document.getElementById('btnRefresh').addEventListener('click', load);
            document.getElementById('btnExcel').addEventListener('click', exportCsv);
            document.getElementById('btnPrint').addEventListener('click', printTable);
            bindTableEvents();
            load();
        }

        // 조회 버튼 — 필터 적용 후 1페이지로 이동
        function search() {
            itemsPerPage = parseInt(document.getElementById('limitRows')?.value || '10', 10);
            currentPage = 1;
            applyFilter();
        }

        // 서버에서 전체 로거 목록 조회
        function load() {
            const tbody = document.getElementById('logLevelTableBody');
            tbody.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-body-secondary">데이터를 불러오는 중입니다...</td></tr>`;

            fetch(API_BASE_URL + '/log-level')
                .then(res => {
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.json();
                })
                .then(data => {
                    if (data.success) {
                        allLoggers = data.data || [];
                        itemsPerPage = parseInt(document.getElementById('limitRows')?.value || '10', 10);
                        applyFilter();
                    } else {
                        Toast.error(data.message || '로거 목록 조회 실패');
                    }
                })
                .catch(err => Toast.error('로거 목록 조회 중 오류가 발생했습니다: ' + err.message));
        }

        function applyFilter() {
            const keyword   = (document.getElementById('logNameFilter')?.value || '').toLowerCase().trim();
            const level     = document.getElementById('levelFilter')?.value || '';

            filteredLoggers = allLoggers.filter(l => {
                const nameMatch  = !keyword || l.logName.toLowerCase().includes(keyword);
                const levelMatch = !level
                    || (level === '__INHERITED__' ? !l.logLevel : l.logLevel === level);
                return nameMatch && levelMatch;
            });
            renderPage();
        }

        function renderPage() {
            const totalItems = filteredLoggers.length;
            const totalPages = Math.max(1, Math.ceil(totalItems / itemsPerPage));
            if (currentPage > totalPages) currentPage = totalPages;

            const start = (currentPage - 1) * itemsPerPage;
            const pageData = filteredLoggers.slice(start, start + itemsPerPage);

            renderTable(pageData, start);
            renderPagination(totalItems, totalPages);
        }

        function renderTable(loggers, offset) {
            const tbody = document.getElementById('logLevelTableBody');
            if (!tbody) return;

            if (loggers.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-body-secondary">조회된 데이터가 없습니다.</td></tr>`;
                return;
            }

            tbody.innerHTML = loggers.map((logger, i) => createRow(logger, offset + i)).join('');
        }

        function renderPagination(totalItems, totalPages) {
            const pagination = document.getElementById('pagination');
            const pageInfo  = document.getElementById('pageInfo');
            if (!pagination) return;

            let html = `
                <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="window.LogLevelManage.changePage(1); return false;"><i class="bi bi-chevron-double-left"></i></a>
                </li>
                <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="window.LogLevelManage.changePage(${currentPage - 1}); return false;"><i class="bi bi-chevron-left"></i></a>
                </li>`;

            const maxButtons = 10;
            let startPage = Math.max(1, currentPage - Math.floor(maxButtons / 2));
            let endPage   = Math.min(totalPages, startPage + maxButtons - 1);
            if (endPage - startPage + 1 < maxButtons) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }
            for (let i = startPage; i <= endPage; i++) {
                html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                    <a class="page-link" href="#" onclick="window.LogLevelManage.changePage(${i}); return false;">${i}</a>
                </li>`;
            }

            html += `
                <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="window.LogLevelManage.changePage(${currentPage + 1}); return false;"><i class="bi bi-chevron-right"></i></a>
                </li>
                <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="window.LogLevelManage.changePage(${totalPages}); return false;"><i class="bi bi-chevron-double-right"></i></a>
                </li>`;

            pagination.innerHTML = html;

            if (pageInfo) {
                const s = totalItems === 0 ? 0 : (currentPage - 1) * itemsPerPage + 1;
                const e = Math.min(currentPage * itemsPerPage, totalItems);
                pageInfo.textContent = `${s} - ${e} of ${totalItems} items`;
            }
        }

        function changePage(page) {
            const totalPages = Math.max(1, Math.ceil(filteredLoggers.length / itemsPerPage));
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderPage();
        }

        function createRow(logger, index) {
            // Level 셀: 쓰기 권한이면 드롭다운+저장 버튼, 없으면 텍스트 표시
            // 드롭다운의 "상속" 옵션은 선택 시 실제로 적용될 부모 레벨을 표시
            // 읽기전용 뱃지는 현재 실제 적용 중인 effectiveLevel 표시
            const inheritedOptionLabel = logger.parentEffectiveLevel
                ? `상속 (${logger.parentEffectiveLevel})`
                : '상속';
            const inheritedBadgeLabel = `상속 (${logger.effectiveLevel})`;
            const levelCell = hasLogLevelWrite
                ? `<td>
                       <div class="d-flex gap-1 align-items-center">
                           <select class="form-select form-select-sm level-select" style="min-width:130px;">
                               <option value="" ${!logger.logLevel ? 'selected' : ''}>${inheritedOptionLabel}</option>
                               ${LEVEL_OPTIONS.map(l =>
                                   `<option value="${l}" ${logger.logLevel === l ? 'selected' : ''}>${l}</option>`
                               ).join('')}
                           </select>
                           <button class="btn btn-sm btn-primary text-nowrap save-level-btn">저장</button>
                       </div>
                   </td>`
                : `<td>${logger.logLevel
                        ? `<span class="badge bg-secondary">${logger.logLevel}</span>`
                        : `<span class="text-muted small">${inheritedBadgeLabel}</span>`}
                   </td>`;

            // Additivity 셀: 쓰기 권한이면 드롭다운+저장 버튼, 없으면 텍스트 표시
            const additivityCell = hasLogLevelWrite
                ? `<td>
                       <div class="d-flex gap-1 align-items-center">
                           <select class="form-select form-select-sm additivity-select" style="min-width:110px;">
                               <option value="Y" ${logger.additivity === 'Y' ? 'selected' : ''}>예 (Y)</option>
                               <option value="N" ${logger.additivity === 'N' ? 'selected' : ''}>아니오 (N)</option>
                           </select>
                           <button class="btn btn-sm btn-primary text-nowrap save-additivity-btn">저장</button>
                       </div>
                   </td>`
                : `<td>${logger.additivity === 'Y' ? '예 (Y)' : '아니오 (N)'}</td>`;

            return `<tr data-index="${index}" data-log-name="${escapeAttr(logger.logName)}">
                        <td class="font-monospace small" style="max-width:300px;">
                            <div style="overflow-x:auto; white-space:nowrap;">${escapeHtml(logger.logName)}</div>
                        </td>
                        ${levelCell}
                        ${additivityCell}
                        <td class="small text-body-secondary">${escapeHtml(logger.appender || '')}</td>
                    </tr>`;
        }

        // 테이블 전체에 이벤트 위임 — 동적 생성 행에 매번 핸들러를 바인딩하지 않기 위해 사용
        function bindTableEvents() {
            const tbody = document.getElementById('logLevelTableBody');
            if (!tbody) return;

            tbody.addEventListener('click', function (e) {
                if (e.target.classList.contains('save-level-btn')) {
                    saveLevelForRow(e.target.closest('tr'));
                } else if (e.target.classList.contains('save-additivity-btn')) {
                    saveAdditivityForRow(e.target.closest('tr'));
                }
            });
        }

        function saveLevelForRow(row) {
            const logName = row.getAttribute('data-log-name');
            const selectVal = row.querySelector('.level-select')?.value;
            if (!logName) return;

            // 빈 문자열("")은 상속 → null로 변환
            const level = selectVal || null;
            const levelLabel = level ?? '상속';

            Toast.confirm(`[${logName}] 로그 레벨을 "${levelLabel}"로 변경하시겠습니까?`, function () {
                fetch(API_BASE_URL + '/log-level/level', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ logName, level })
                })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            Toast.success(data.message || '로그 레벨이 변경되었습니다');
                            load();
                        } else {
                            Toast.error(data.message || '변경 실패');
                        }
                    })
                    .catch(err => Toast.error('레벨 변경 중 오류가 발생했습니다: ' + err.message));
            });
        }

        function saveAdditivityForRow(row) {
            const logName = row.getAttribute('data-log-name');
            const additivity = row.querySelector('.additivity-select')?.value;
            if (!logName || !additivity) return;

            const label = additivity === 'Y' ? '예 (Y)' : '아니오 (N)';
            Toast.confirm(`[${logName}] Additivity를 "${label}"로 변경하시겠습니까?`, function () {
                fetch(API_BASE_URL + '/log-level/additivity', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ logName, additivity })
                })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            Toast.success(data.message || 'Additivity가 변경되었습니다');
                            load();
                        } else {
                            Toast.error(data.message || '변경 실패');
                        }
                    })
                    .catch(err => Toast.error('Additivity 변경 중 오류가 발생했습니다: ' + err.message));
            });
        }

        function exportCsv() {
            if (filteredLoggers.length === 0) {
                Toast.warning('출력할 데이터가 없습니다.');
                return;
            }
            const headers = ['Log Name', 'Level', 'Additivity', 'Appender'];
            const rows = filteredLoggers.map(l => [
                l.logName, l.logLevel || '', l.additivity || '', l.appender || ''
            ].map(v => `"${v.replace(/"/g, '""')}"`).join(','));
            const csv = '﻿' + [headers.join(','), ...rows].join('\r\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'log-level.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        function printTable() {
            if (filteredLoggers.length === 0) {
                Toast.warning('출력할 데이터가 없습니다.');
                return;
            }
            const columns = [
                { key: 'logName',    label: 'Log Name'   },
                { key: 'logLevel',   label: 'Level'      },
                { key: 'additivity', label: 'Additivity' },
                { key: 'appender',   label: 'Appender'   }
            ];
            PrintUtil.print({ title: '로그레벨 목록', columns, data: filteredLoggers });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function escapeAttr(str) {
            if (!str) return '';
            return str.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        return { init, load, search, changePage, exportCsv, printTable };
    })();

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function () { window.LogLevelManage.init(); });
    } else {
        window.LogLevelManage.init();
    }

    // 탭 재활성화 시 목록 최신화
    $('[data-tab-page]').off('tab:activated.logLevelManage').on('tab:activated.logLevelManage', function () {
        window.LogLevelManage.load();
    });
</script>
</body>
</html>
