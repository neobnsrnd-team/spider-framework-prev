<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- Batch App Manual Execution Modal Fragment -->
<div th:fragment="modal" id="batchExecModal" class="modal fade" tabindex="-1" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered sp-modal-xl">
    <div class="modal-content">
        <div class="modal-header d-flex justify-content-between align-items-center">
            <h5 class="modal-title">배치프로그램 수동 실행</h5>
            <button type="button" class="btn-exec-run" id="btnExecuteBatch" onclick="BatchExecModal.execute()" title="실행">
                <i class="bi bi-play-fill"></i>
            </button>
        </div>
        <div class="modal-body">
            <!-- 배치프로그램 정보 섹션 -->
            <div class="modal-section">
                <div class="section-header">
                    <i class="bi bi-caret-right-fill"></i>
                    <span>배치프로그램 정보</span>
                </div>

                <table class="batch-form-table readonly-table">
                    <colgroup>
                        <col class="col-w-pct-15">
                        <col class="col-w-pct-35">
                        <col class="col-w-pct-15">
                        <col class="col-w-pct-35">
                    </colgroup>
                    <tbody>
                        <tr>
                            <th>배치 APP ID</th>
                            <td id="execBatchAppId">-</td>
                            <th>선행 배치APP ID</th>
                            <td id="execPreBatchAppId">-</td>
                        </tr>
                        <tr>
                            <th>배치 APP명</th>
                            <td id="execBatchAppName">-</td>
                            <th>배치 APP FILE명</th>
                            <td id="execBatchFileName">-</td>
                        </tr>
                        <tr>
                            <th>배치 APP 설명</th>
                            <td id="execBatchAppDesc">-</td>
                            <th>CRON표현식</th>
                            <td id="execCronText">-</td>
                        </tr>
                        <tr>
                            <th>다중 WAS 실행여부</th>
                            <td><span class="readonly-select" id="execPerWasYn">-</span></td>
                            <th>배치 실행주기</th>
                            <td><span class="readonly-select" id="execBatchCycle">-</span></td>
                        </tr>
                        <tr>
                            <th>재실행 가능여부</th>
                            <td><span class="readonly-select" id="execRetryableYn">-</span></td>
                            <th>중요도</th>
                            <td><span class="readonly-select" id="execImportantType">-</span></td>
                        </tr>
                        <tr>
                            <th>관련 기관 ID</th>
                            <td><span class="readonly-select" id="execOrgId">선택 안 함</span></td>
                            <th>관련 거래 ID</th>
                            <td><span class="readonly-select" id="execTrxId">선택 안 함</span></td>
                        </tr>
                        <tr>
                            <th>기동수동구분</th>
                            <td><span class="readonly-select" id="execIoType">선택 안 함</span></td>
                            <th></th>
                            <td></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 실행 설정 섹션 -->
            <div class="modal-section mt-3">
                <div class="section-header">
                    <i class="bi bi-caret-right-fill"></i>
                    <span>실행 설정</span>
                </div>

                <table class="batch-form-table">
                    <tbody>
                        <tr>
                            <th>배치APP 파라미터</th>
                            <td colspan="3">
                                <input type="text"
                                       id="execParameters"
                                       class="form-control form-control-sm"
                                       maxlength="500"
                                       placeholder="ex: id=홍길동;pass=1111;date=20080101" />
                            </td>
                        </tr>
                        <tr>
                            <th>기준일 <span class="required">*</span></th>
                            <td>
                                <input type="date"
                                       id="execBatchDate"
                                       class="form-control form-control-sm"
                                       required />
                            </td>
                            <th>전체선택</th>
                            <td>
                                <input type="checkbox"
                                       id="execSelectAll"
                                       onchange="BatchExecModal.toggleSelectAll()" />
                                <label for="execSelectAll">모든 인스턴스 선택</label>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 등록된 WAS INSTANCE 정보 섹션 -->
            <div class="modal-section mt-3">
                <div class="section-header">
                    <i class="bi bi-caret-right-fill"></i>
                    <span>등록된 WAS INSTANCE 정보</span>
                </div>

                <div class="instance-checkbox-container" id="execInstanceList">
                    <!-- 동적으로 채워짐 -->
                    <div class="sp-empty-state">인스턴스 정보를 불러오는 중...</div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal"><i class="bi bi-x-lg"></i> 닫기</button>
        </div>
    </div>
    </div>
</div>

<!-- Batch Exec Modal Script -->
<th:block th:fragment="script">
<script>
    var BatchExecModal = {
        currentBatchApp: null,
        assignedInstances: [],

        open: function(batchAppId) {
            // 오늘 날짜를 기본값으로 설정 (toISOString은 UTC 기준이라 KST 오전 9시 이전 실행 시 전날 날짜가 반환됨 → 로컬 날짜 사용)
            const _d = new Date();
            const today = `${_d.getFullYear()}-${String(_d.getMonth() + 1).padStart(2, '0')}-${String(_d.getDate()).padStart(2, '0')}`;
            $('#execBatchDate').val(today);
            $('#execParameters').val('');
            $('#execSelectAll').prop('checked', false);
            // 이전 실행에서 disabled 상태가 잔류하는 경우 방어적 초기화
            $('#btnExecuteBatch').prop('disabled', false);

            // 배치 APP 상세 정보 로드
            this.loadBatchAppDetail(batchAppId);

            bootstrap.Modal.getOrCreateInstance(document.getElementById('batchExecModal')).show();
        },

        close: function() {
            // getInstance는 show() 이전 또는 dispose() 이후 null을 반환하므로 null 체크
            const el = document.getElementById('batchExecModal');
            const modal = el && bootstrap.Modal.getInstance(el);
            if (modal) modal.hide();
        },

        loadBatchAppDetail: function(batchAppId) {
            $.ajax({
                url: API_BASE_URL + '/batch/apps/' + encodeURIComponent(batchAppId),
                method: 'GET',
                success: (response) => {
                    if (response.success && response.data) {
                        const data = response.data;
                        this.currentBatchApp = data.batchApp;
                        this.assignedInstances = data.assignedInstances || [];

                        // 배치프로그램 정보 표시
                        $('#execBatchAppId').text(this.currentBatchApp.batchAppId || '-');
                        $('#execBatchAppName').text(this.currentBatchApp.batchAppName || '-');
                        $('#execBatchFileName').text(this.currentBatchApp.batchAppFileName || '-');
                        $('#execBatchAppDesc').text(this.currentBatchApp.batchAppDesc || '-');
                        $('#execCronText').text(this.currentBatchApp.cronText || '-');
                        $('#execPreBatchAppId').text(this.currentBatchApp.preBatchAppId || '-');
                        $('#execPerWasYn').text(this.getYnText(this.currentBatchApp.perWasYn, '다중', '단일'));
                        $('#execBatchCycle').text(this.getBatchCycleText(this.currentBatchApp.batchCycle));
                        $('#execRetryableYn').text(this.getYnText(this.currentBatchApp.retryableYn, '가능', '불가'));
                        $('#execImportantType').text(this.getImportantText(this.currentBatchApp.importantType));
                        $('#execOrgId').text(this.currentBatchApp.orgId || '선택 안 함');
                        $('#execTrxId').text(this.currentBatchApp.trxId || '선택 안 함');
                        $('#execIoType').text(this.getIoTypeText(this.currentBatchApp.ioType));

                        // 기존 파라미터가 있으면 기본값으로 설정
                        if (this.currentBatchApp.properties) {
                            $('#execParameters').val(this.currentBatchApp.properties);
                        }

                        // WAS 인스턴스 체크박스 렌더링
                        this.renderInstanceCheckboxes();
                    }
                },
                error: (xhr) => {
                    console.error('Failed to load batch app detail:', xhr);
                    Toast.error('배치 APP 정보를 불러오는데 실패했습니다.');
                    this.close();
                }
            });
        },

        renderInstanceCheckboxes: function() {
            const container = $('#execInstanceList');
            container.empty();

            if (!this.assignedInstances || this.assignedInstances.length === 0) {
                container.html('<div class="sp-empty-state">등록된 WAS 인스턴스가 없습니다.</div>');
                return;
            }

            this.assignedInstances.forEach(inst => {
                // 인스턴스 ID 첫 글자로 아이콘 타입 결정
                const firstChar = (inst.instanceId || '').charAt(0).toUpperCase();
                let iconClass = '';
                if (firstChar === 'B') {
                    iconClass = 'batch';
                } else if (firstChar === 'P') {
                    iconClass = 'prod';
                }

                const item = $(`
                    <div class="instance-checkbox-item" data-instance-id="${HtmlUtils.escape(inst.instanceId)}">
                        <input type="checkbox"
                               id="execInst_${HtmlUtils.escape(inst.instanceId)}"
                               value="${HtmlUtils.escape(inst.instanceId)}"
                               class="instance-checkbox" />
                        <div class="instance-icon ${iconClass}">
                            <i class="bi bi-hdd-rack"></i>
                        </div>
                        <span class="instance-id">${HtmlUtils.escape(inst.instanceId)}</span>
                    </div>
                `);

                // 클릭 이벤트
                item.on('click', function(e) {
                    if (e.target.type !== 'checkbox') {
                        const checkbox = $(this).find('input[type="checkbox"]');
                        checkbox.prop('checked', !checkbox.prop('checked'));
                    }
                    $(this).toggleClass('selected', $(this).find('input[type="checkbox"]').prop('checked'));
                    BatchExecModal.updateSelectAllState();
                });

                container.append(item);
            });
        },

        toggleSelectAll: function() {
            const isChecked = $('#execSelectAll').prop('checked');
            $('.instance-checkbox').prop('checked', isChecked);
            $('.instance-checkbox-item').toggleClass('selected', isChecked);
        },

        updateSelectAllState: function() {
            const total = $('.instance-checkbox').length;
            const checked = $('.instance-checkbox:checked').length;
            $('#execSelectAll').prop('checked', total > 0 && total === checked);
        },

        getSelectedInstanceIds: function() {
            return $('.instance-checkbox:checked').map(function() {
                return $(this).val();
            }).get();
        },

        validate: function() {
            const batchDate = $('#execBatchDate').val();
            if (!batchDate) {
                Toast.warning('기준일을 입력하세요.');
                $('#execBatchDate').focus();
                return false;
            }

            const selectedIds = this.getSelectedInstanceIds();
            if (selectedIds.length === 0) {
                Toast.warning('실행할 WAS 인스턴스를 선택하세요.');
                return false;
            }

            return true;
        },

        execute: function() {
            if (!this.validate()) {
                return;
            }

            const selectedIds = this.getSelectedInstanceIds();
            const batchDate = $('#execBatchDate').val().replace(/-/g, ''); // YYYY-MM-DD → YYYYMMDD

            Toast.confirm(`선택된 ${selectedIds.length}개의 WAS 인스턴스에서 배치를 실행하시겠습니까?\n\n` +
                         `배치APP ID: ${this.currentBatchApp.batchAppId}\n` +
                         `기준일: ${$('#execBatchDate').val()}\n` +
                         `인스턴스: ${selectedIds.join(', ')}`, () => {
                const requestData = {
                    batchAppId: this.currentBatchApp.batchAppId,
                    parameters: $('#execParameters').val().trim() || null,
                    batchDate: batchDate,
                    instanceIds: selectedIds
                };

                // 실행 버튼 비활성화
                $('#btnExecuteBatch').prop('disabled', true);

                $.ajax({
                    url: API_BASE_URL + '/batch/exec',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(requestData),
                    success: (response) => {
                        if (response.success) {
                            // 전체 성공: 성공 토스트 + 모달 닫기
                            Toast.success(response.message || '배치 실행이 완료되었습니다.');
                            this.close();
                        } else {
                            // 실패 인스턴스 목록 추출 (response.data에 포함)
                            const results = response.data || [];
                            const isAbnormal = r => r.resRtCode === '9';
                            const failedIds = results.filter(isAbnormal).map(r => r.instanceId).join(', ');
                            const msg = (response.message || '') + (failedIds ? ` [실패: ${failedIds}]` : '');

                            if (results.length > 0 && results.every(isAbnormal)) {
                                // 전체 실패: 에러 토스트, 모달 유지
                                Toast.error(msg || '배치 실행이 실패하였습니다. 실행 이력을 확인하세요.');
                            } else {
                                // 부분 실패: 경고 토스트, 모달 유지
                                Toast.warning(msg || '일부 배치 실행에 실패하였습니다. 실행 이력을 확인하세요.');
                            }
                        }
                    },
                    error: (xhr) => {
                        console.error('Failed to execute batch:', xhr);
                        const errorMsg = xhr.responseJSON?.message || '배치 실행 요청에 실패했습니다.';
                        Toast.error('실행 실패: ' + errorMsg);
                    },
                    complete: () => {
                        $('#btnExecuteBatch').prop('disabled', false);
                    }
                });
            });
        },

        getBatchCycleText: function(code) {
            switch(code) {
                case 'D': return '일간(D)';
                case 'W': return '주간(W)';
                case 'M': return '월간(M)';
                case 'Y': return '연간(Y)';
                case 'C': return 'CRON(C)';
                default: return code || '-';
            }
        },

        getImportantText: function(type) {
            switch(type) {
                case '1': return '높음(1)';
                case '2': return '보통(2)';
                case '3': return '낮음(3)';
                default: return type || '-';
            }
        },

        getYnText: function(yn, yesText, noText) {
            if (yn === 'Y') {
                return yesText + '(Y)';
            } else {
                return noText + '(N)';
            }
        },

        getIoTypeText: function(ioType) {
            switch(ioType) {
                case 'I': return '어뎁터(송신)';
                case 'O': return '리스너(수신)';
                default: return '선택 안 함';
            }
        }
    };
</script>
</th:block>
</body>
</html>
