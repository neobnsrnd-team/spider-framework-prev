<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="script">
<script th:inline="javascript">
    /*<![CDATA[*/
    // 쓰기 권한 여부 (Thymeleaf → JS)
    var HAS_WRITE = /*[[${userAuthorities != null && userAuthorities.contains('EMERGENCY_NOTICE:W')}]]*/ false;

    // 배포 상태 레이블·뱃지 매핑
    var DEPLOY_STATUS_MAP = {
        'DRAFT':    { label: '미배포',    badgeClass: 'bg-secondary' },
        'DEPLOYED': { label: '배포 중',   badgeClass: 'bg-success'   },
        'ENDED':    { label: '배포 종료', badgeClass: 'bg-danger'    }
    };

    /**
     * yyyyMMddHHmmss 14자리를 'yyyy-MM-dd HH:mm:ss'로 변환한다.
     * @param {string} raw
     * @returns {string}
     */
    function formatDtime(raw) {
        if (!raw || raw.length !== 14) return '-';
        return raw.substring(0, 4) + '-' + raw.substring(4, 6) + '-' + raw.substring(6, 8)
            + ' ' + raw.substring(8, 10) + ':' + raw.substring(10, 12) + ':' + raw.substring(12, 14);
    }

    window.EmergencyNoticeDeployPage = {
        /** 현재 배포 상태 ('DRAFT' | 'DEPLOYED' | 'ENDED') */
        currentStatus: 'DRAFT',

        /* ── 페이징·필터 상태 ───────────────────────────────────── */
        currentPage:   1,
        pageSize:      10,
        currentReason: '',   // '' = 전체 / '배포' / '배포 종료' / '내용 수정' / '설정 변경'

        init: function () {
            var self = this;
            this.load(1);

            /* 구분 필터 */
            var filterReason = document.getElementById('filterReason');
            if (filterReason) {
                filterReason.addEventListener('change', function () {
                    self.currentReason = this.value;
                    self.load(1);
                });
            }

            var btnReset = document.getElementById('btnResetFilter');
            if (btnReset) {
                btnReset.addEventListener('click', function () {
                    document.getElementById('filterReason').value = '';
                    self.currentReason = '';
                    self.load(1);
                });
            }

            if (HAS_WRITE) {
                document.getElementById('btnDeploy')
                        .addEventListener('click', function () { self.deploy(); });
                document.getElementById('btnEndDeploy')
                        .addEventListener('click', function () { self.endDeploy(); });
                document.getElementById('btnSaveSettings')
                        .addEventListener('click', function () { self.saveSettings(); });
            }
        },

        /**
         * 배포 상태 + 노출 설정 + 이력 조회.
         * @param {number} [page] 이동할 페이지 번호. 생략 시 현재 페이지 유지.
         */
        load: function (page) {
            if (page !== undefined) this.currentPage = page;
            var self = this;
            var params = { page: self.currentPage, pageSize: self.pageSize };
            if (self.currentReason) params.reason = self.currentReason;

            $.ajax({
                url:    API_BASE_URL + '/emergency-notice-deploys',
                method: 'GET',
                data:   params,
                success: function (res) {
                    if (res.success && res.data) {
                        self.currentStatus = res.data.deployStatus || 'DRAFT';
                        self.renderStatus(res.data);
                        self.renderSettings(res.data);
                        self.renderHistory(res.data.history || [], res.data.historyTotal || 0);
                        self.renderPagination(res.data.historyTotal || 0);
                    } else {
                        Toast.error('배포 상태를 불러오지 못했습니다.');
                    }
                },
                error: function (xhr) {
                    var msg = (xhr.responseJSON && xhr.responseJSON.message)
                            ? xhr.responseJSON.message
                            : '배포 상태를 불러오는 중 오류가 발생했습니다.';
                    Toast.error(msg);
                }
            });
        },

        /** 현재 배포 상태 영역 렌더링 */
        renderStatus: function (data) {
            var info = DEPLOY_STATUS_MAP[data.deployStatus] || { label: data.deployStatus, badgeClass: 'bg-secondary' };
            var badge = document.getElementById('deployStatusBadge');
            badge.textContent = info.label;
            badge.className   = 'badge fs-6 mt-1 ' + info.badgeClass;

            document.getElementById('startDtime').textContent = formatDtime(data.startDtime);
            document.getElementById('endDtime').textContent   = formatDtime(data.endDtime);

            // 배포 중일 때만 [배포 종료] 활성화, [배포]는 비활성화
            if (HAS_WRITE) {
                var btnDeploy    = document.getElementById('btnDeploy');
                var btnEndDeploy = document.getElementById('btnEndDeploy');
                var isDeployed   = data.deployStatus === 'DEPLOYED';
                btnDeploy.disabled    = isDeployed;
                btnEndDeploy.disabled = !isDeployed;
            }
        },

        /** 공지 노출 설정 토글 렌더링 */
        renderSettings: function (data) {
            if (!HAS_WRITE) return;
            var swCloseable = document.getElementById('switchCloseableYn');
            var swHideToday = document.getElementById('switchHideTodayYn');
            var syncNote    = document.getElementById('settingsSyncNote');

            if (swCloseable) swCloseable.checked = data.closeableYn !== 'N';
            if (swHideToday) swHideToday.checked = data.hideTodayYn !== 'N';

            // 배포 중이면 "즉시 반영" 안내 문구 표시
            if (syncNote) syncNote.style.display = (data.deployStatus === 'DEPLOYED') ? '' : 'none';
        },

        /**
         * 배포 이력 테이블 렌더링.
         *
         * 항상 pageSize(10)개 행 높이를 유지하기 위해,
         * 실제 데이터가 pageSize보다 적으면 visibility:hidden 필러 행을 추가한다.
         * 필러 행은 레이아웃 공간은 차지하지만 시각적으로는 보이지 않는다.
         *
         * @param {Array}  history    이력 목록 (DTO 배열)
         * @param {number} total      필터 적용 후 전체 건수 (totalCount 표시용)
         */
        renderHistory: function (history, total) {
            var self      = this;
            /* 행 높이(px) — Bootstrap 5 기본 패딩 기준 실측값 */
            var ROW_H     = 45;

            // 건수 표시 업데이트
            var countEl = document.getElementById('historyTotalCount');
            if (countEl) countEl.textContent = '총 ' + total + '건';

            var tbody = document.getElementById('historyTableBody');

            if (history.length === 0) {
                // 빈 상태: 10행 높이에 해당하는 단일 셀로 표시
                tbody.innerHTML = '<tr>'
                    + '<td colspan="5" class="text-center text-body-secondary"'
                    + ' style="height:' + (self.pageSize * ROW_H) + 'px; vertical-align:middle;">'
                    + '배포 이력이 없습니다.</td></tr>';
                return;
            }

            var rows = history.map(function (row) {
                return '<tr style="height:' + ROW_H + 'px;">'
                    + '<td class="text-center">'       + (row.version || '') + '</td>'
                    + '<td class="text-center">'       + HtmlUtils.escape(row.reason || '') + '</td>'
                    + '<td class="text-center small">' + formatDtime(row.lastUpdateDtime) + '</td>'
                    + '<td class="text-center small">' + HtmlUtils.escape(row.lastUpdateUserId || '') + '</td>'
                    + '<td style="padding-left:12px; overflow:hidden;">' + self.buildDetail(row) + '</td>'
                    + '</tr>';
            });

            // 데이터가 pageSize보다 적으면 빈 행으로 채워 세로 길이 고정
            var fillerCount = Math.max(0, self.pageSize - history.length);
            for (var i = 0; i < fillerCount; i++) {
                /* visibility:hidden — 레이아웃 공간 유지, 시각적으로 숨김 */
                rows.push('<tr style="height:' + ROW_H + 'px; visibility:hidden;">'
                    + '<td colspan="5"></td></tr>');
            }

            tbody.innerHTML = rows.join('');
        },

        /**
         * REASON에 따라 변경 상세 HTML을 생성한다.
         *
         * - 설정 변경: 닫기버튼·오늘하루 ON/OFF 뱃지
         * - 배포 / 배포 종료 / 내용 수정: 한국어 공지 제목 + 내용 미리보기
         *
         * @param {Object} row  이력 행 DTO
         * @returns {string}    안전한 HTML 문자열
         */
        buildDetail: function (row) {
            var reason = row.reason || '';

            /* 설정 변경 — 닫기버튼 / 오늘하루 ON/OFF 뱃지 */
            if (reason === '설정 변경') {
                var clBadge = (row.closeableYn === null || row.closeableYn === undefined)
                    ? ''
                    : (row.closeableYn !== 'N'
                        ? '<span class="badge bg-success-subtle text-success-emphasis border me-1">닫기버튼: ON</span>'
                        : '<span class="badge bg-danger-subtle text-danger-emphasis border me-1">닫기버튼: OFF</span>');
                var htBadge = (row.hideTodayYn === null || row.hideTodayYn === undefined)
                    ? ''
                    : (row.hideTodayYn !== 'N'
                        ? '<span class="badge bg-success-subtle text-success-emphasis border">오늘하루: ON</span>'
                        : '<span class="badge bg-danger-subtle text-danger-emphasis border">오늘하루: OFF</span>');
                return '<div class="d-flex align-items-center flex-wrap gap-1">' + clBadge + htBadge + '</div>';
            }

            /* 배포·배포종료·내용수정 — 한국어·영어 공지 내용 미리보기 */
            var titleKo   = row.titleKo   || '';
            var titleEn   = row.titleEn   || '';
            // _$BR 마커를 공백으로 치환하여 한 줄 미리보기로 표시
            var contentKo = (row.contentKo || '').replace(/_\$BR/g, ' ');
            var contentEn = (row.contentEn || '').replace(/_\$BR/g, ' ');

            if (!titleKo && !contentKo && !titleEn && !contentEn) {
                return '<span class="text-body-secondary small">(미작성)</span>';
            }

            var parts = [];
            if (titleKo) {
                parts.push('<span class="fw-semibold small text-body">'
                    + '<span class="badge bg-secondary-subtle text-secondary-emphasis border me-1" style="font-size:0.65em;">KO</span>'
                    + HtmlUtils.escape(this.truncate(titleKo, 28)) + '</span>');
            }
            if (contentKo) {
                parts.push('<span class="text-body-secondary small">'
                    + HtmlUtils.escape(this.truncate(contentKo, 48)) + '</span>');
            }
            if (titleEn) {
                parts.push('<span class="fw-semibold small text-body">'
                    + '<span class="badge bg-info-subtle text-info-emphasis border me-1" style="font-size:0.65em;">EN</span>'
                    + HtmlUtils.escape(this.truncate(titleEn, 28)) + '</span>');
            }
            if (contentEn) {
                parts.push('<span class="text-body-secondary small">'
                    + HtmlUtils.escape(this.truncate(contentEn, 48)) + '</span>');
            }
            return '<div class="d-flex flex-column gap-0">' + parts.join('') + '</div>';
        },

        /**
         * Bootstrap 5 페이징 UI를 렌더링한다.
         * 전체 페이지가 1이하이면 페이징을 숨긴다.
         * @param {number} total 필터 적용 후 전체 건수
         */
        renderPagination: function (total) {
            var self       = this;
            var totalPages = Math.ceil(total / this.pageSize);
            var current    = this.currentPage;
            var paginEl    = document.getElementById('historyPagination');

            if (totalPages <= 1) {
                paginEl.innerHTML = '';
                return;
            }

            // 현재 페이지 주변 최대 5개의 페이지 번호 표시
            var startPage = Math.max(1, current - 2);
            var endPage   = Math.min(totalPages, startPage + 4);
            if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

            var html = '<nav aria-label="이력 페이징"><ul class="pagination pagination-sm mb-0">';

            html += '<li class="page-item' + (current === 1 ? ' disabled' : '') + '">'
                  + '<a class="page-link" href="#" data-page="' + (current - 1) + '" aria-label="이전">&laquo;</a></li>';

            for (var i = startPage; i <= endPage; i++) {
                html += '<li class="page-item' + (i === current ? ' active' : '') + '">'
                      + '<a class="page-link" href="#" data-page="' + i + '">' + i + '</a></li>';
            }

            html += '<li class="page-item' + (current === totalPages ? ' disabled' : '') + '">'
                  + '<a class="page-link" href="#" data-page="' + (current + 1) + '" aria-label="다음">&raquo;</a></li>';

            html += '</ul></nav>';
            paginEl.innerHTML = html;

            // 페이지 링크 클릭 핸들러 바인딩
            paginEl.querySelectorAll('.page-link').forEach(function (el) {
                el.addEventListener('click', function (e) {
                    e.preventDefault();
                    var page = parseInt(this.getAttribute('data-page'));
                    if (!isNaN(page) && page >= 1 && page <= totalPages) {
                        self.load(page);
                    }
                });
            });
        },

        /**
         * 문자열을 최대 길이로 자른다. 초과 시 '…'을 붙인다.
         * @param {string} str
         * @param {number} max
         * @returns {string}
         */
        truncate: function (str, max) {
            if (!str) return '';
            return str.length > max ? str.substring(0, max) + '…' : str;
        },

        /** 노출 설정 저장 */
        saveSettings: function () {
            var swCloseable = document.getElementById('switchCloseableYn');
            var swHideToday = document.getElementById('switchHideTodayYn');
            var payload = {
                closeableYn: swCloseable && swCloseable.checked ? 'Y' : 'N',
                hideTodayYn: swHideToday && swHideToday.checked ? 'Y' : 'N'
            };
            var self = this;
            $.ajax({
                url:         API_BASE_URL + '/emergency-notice-deploys/settings',
                method:      'PATCH',
                contentType: 'application/json',
                data:        JSON.stringify(payload),
                success: function (res) {
                    if (res.success) {
                        Toast.success('설정이 저장되었습니다.');
                        self.load(1); // 설정 변경 이력이 맨 위에 추가되므로 1페이지로 이동
                    } else {
                        Toast.error(res.message || '설정 저장에 실패했습니다.');
                    }
                },
                error: function (xhr) {
                    var msg = (xhr.responseJSON && xhr.responseJSON.message)
                            ? xhr.responseJSON.message
                            : '설정 저장 중 오류가 발생했습니다.';
                    Toast.error(msg);
                }
            });
        },

        /** 배포 실행 */
        deploy: function () {
            if (!confirm('긴급공지를 배포하시겠습니까?\n현재 저장된 공지 내용이 Demo 앱에 노출됩니다.')) return;
            var self = this;
            $.ajax({
                url:    API_BASE_URL + '/emergency-notice-deploys/deploy',
                method: 'POST',
                success: function (res) {
                    if (res.success) {
                        Toast.success('긴급공지가 배포되었습니다.');
                        self.load(1); // 새 이력이 맨 위에 추가되므로 1페이지로 이동
                    } else {
                        Toast.error(res.message || '배포에 실패했습니다.');
                    }
                },
                error: function (xhr) {
                    var msg = (xhr.responseJSON && xhr.responseJSON.message)
                            ? xhr.responseJSON.message
                            : '배포 중 오류가 발생했습니다.';
                    Toast.error(msg);
                }
            });
        },

        /** 배포 종료 실행 */
        endDeploy: function () {
            if (!confirm('긴급공지 배포를 종료하시겠습니까?\nDemo 앱에서 공지가 숨겨집니다.')) return;
            var self = this;
            $.ajax({
                url:    API_BASE_URL + '/emergency-notice-deploys/end',
                method: 'POST',
                success: function (res) {
                    if (res.success) {
                        Toast.success('긴급공지 배포가 종료되었습니다.');
                        self.load(1); // 새 이력이 맨 위에 추가되므로 1페이지로 이동
                    } else {
                        Toast.error(res.message || '배포 종료에 실패했습니다.');
                    }
                },
                error: function (xhr) {
                    var msg = (xhr.responseJSON && xhr.responseJSON.message)
                            ? xhr.responseJSON.message
                            : '배포 종료 중 오류가 발생했습니다.';
                    Toast.error(msg);
                }
            });
        }
    };

    $(document).ready(function () {
        EmergencyNoticeDeployPage.init();

        // 캐시에서 복원 시(tab:activated) 긴급공지 배포 관리 최신화
        $('[data-tab-page]').off('tab:activated.emergencyNoticeDeploy').on('tab:activated.emergencyNoticeDeploy', function () {
            EmergencyNoticeDeployPage.load(1);
        });
    });
    /*]]>*/
</script>
</th:block>
</body>
</html>
