<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

    <input type="hidden" id="currentUserId" th:value="${currentUserId}">

    <!-- 그룹 탭 필터 -->
    <ul class="nav nav-tabs" id="workGroupTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" type="button" role="tab"
                    data-group-id=""
                    onclick="WorkListPage.switchGroup('')">전체</button>
        </li>
        <!-- 동적 그룹 탭 — JavaScript에서 주입 -->
    </ul>

    <!-- 리스트 헤더 -->
    <div class="page-header mt-3">
        <h4 class="page-title">
            <i class="bi bi-briefcase-fill text-primary"></i>
            나의 작업함
        </h4>
        <div class="toolbar">
            <div class="toolbar-left">
                <select id="limitRows" class="form-select form-select-sm sp-limit-select">
                    <option value="10">10</option>
                    <option value="20" selected>20</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
                <label class="form-label mb-0 small fw-medium fs-xs ms-1">건씩</label>
            </div>
            <div class="toolbar-right">
                <button class="btn btn-outline-secondary btn-sm" id="btnRefresh">
                    <i class="bi bi-arrow-clockwise"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- 테이블 컨테이너 (DataTable 컴포넌트로 동적 생성) -->
    <div id="tableContainer"></div>

    <!-- 페이지네이션 -->
    <th:block th:replace="~{fragments/page-content-layout :: pagination}" />

    <!-- 하단 버튼 -->
    <div th:replace="~{pages/worklist/worklist-list-buttons :: buttons}"></div>

    <!-- 스크립트 -->
    <th:block th:replace="~{pages/worklist/worklist-list-script :: script}"/>

</div>
</body>
</html>
