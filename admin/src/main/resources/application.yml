# ============================================
# Application Base Configuration
# ============================================
# Sensitive values are loaded from environment variables.
# See .env.example for required variables.
# ============================================

spring:
  config:
    import: classpath:menu-resource-permissions.yml, optional:file:.env[.properties]
  profiles:
    active: oracle # oracle 또는 mysql

  # H2 Console (로그 조회용 - 기본 활성화)
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false # 보안: 로컬만 접근

  # File Upload Configuration
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 150MB

  # Thymeleaf Configuration
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    mode: HTML

# Server Configuration
server:
  port: 8080
  servlet:
    session:
      timeout: 30m
      persistent: false
  error:
    include-stacktrace: never
    include-exception: false
    include-message: never
    include-binding-errors: never

# File Upload Path Configuration
# 환경에 따라 절대 경로 설정 가능 (예: /data/uploads, C:/uploads)
# 설정하지 않으면 기본값 ${user.dir}/uploads 사용
file:
  upload-dir: ${user.dir}/uploads

# XML Property Configuration
xml-property:
  directory: ${user.dir}/xml-properties

# Security Configuration
app:
  title: ${APP_TITLE:Neo Spider Admin}
  security:
    remember-me-key: ${REMEMBER_ME_KEY:admin-demo-remember-me-key}
    authority-source: ${AUTHORITY_SOURCE:user-menu}

# Log Destination Toggles
log:
  dest:
    console: ${LOG_DEST_CONSOLE:true}
    h2: ${LOG_DEST_H2:false}
    logstash: ${LOG_DEST_LOGSTASH:false}
    rdb:
      access: ${LOG_DEST_RDB_ACCESS:true}
      error: ${LOG_DEST_RDB_ERROR:true}

# Logging Configuration
logging:
  level:
    root: INFO
    com.example.admin_demo: INFO # 상세 로그 필요 시 DEBUG
    org.mybatis: INFO # SQL 확인 필요 시 DEBUG

# Menu Configuration
# 사이드바에서 숨길 메뉴 ID 목록 (DB 미변경, 이 프로젝트에서만 적용)
menu:
  hidden-menu-ids:
    #- acl_manage  # Framework 관리메뉴 (asis 메뉴  TODO 임시노출해제)
    - test # test 메뉴
    - testtest # test 메뉴
    - TTT2 # test 메뉴
    - test1 # test 메뉴
    - 테스트메뉴 # test 메뉴
    - v3_react_platform # ReactPlatform 메뉴 — DB는 유지(reactPlatform 프로젝트 사용), admin에서만 숨김 (Oracle)
    - v3_react_generate
    - v3_react_generate_his
    - v3_react_approval

# Demo 연동 Configuration (긴급공지 SSE Push, 미리보기)
demo:
  backend:
    url: ${DEMO_BACKEND_URL:http://localhost:3001}
    admin-secret: ${DEMO_BACKEND_ADMIN_SECRET:admin-secret}
  frontend:
    url: ${DEMO_FRONTEND_URL:http://localhost:5173}

# CMS Deploy Configuration
cms:
  app-base-url: ${CMS_APP_BASE_URL:/cms}
  #user-url: ${CMS_USER_URL:http://localhost:3000/}
  user-url: ${CMS_USER_URL:http://133.186.135.23:3001/}
  preview-url: ${CMS_PREVIEW_URL:http://localhost}
  deploy:
    # CMS push API — HTML 조립(ContentBuilder CSS·런타임, 에셋 경로 치환)·파일 저장·이력 기록을 CMS가 담당
    push-url: ${CMS_DEPLOY_PUSH_URL:http://133.186.135.23:3001/cms/api/deploy/push}
    secret: ${CMS_DEPLOY_SECRET:}
    # 배포 파일 URL 구성용 — 운영 환경에 따라 HTTPS 프로토콜 또는 다른 경로를 사용할 경우 변경
    deployed-protocol: ${CMS_DEPLOYED_PROTOCOL:http}
    deployed-path-prefix: ${CMS_DEPLOYED_PATH_PREFIX:/deployed}
    # 만료 배포용 HTML — CMS Next.js public/system/page-expired.html HTTP 직접 취득
    expired-html-url: ${CMS_DEPLOY_EXPIRED_HTML_URL:http://133.186.135.23:3001/cms/system/page-expired.html}
  # CMS Builder (미승인 이미지 업로드) — 내부망 서버-투-서버 호출 (Issue #65)
  # nginx 가 80 → CMS(Next.js) 업스트림으로 프록시하므로 외부에서는 포트 없이 접근한다.
  builder:
    base-url: ${CMS_BUILDER_BASE_URL:http://133.186.135.23}
    upload-path: ${CMS_BUILDER_UPLOAD_PATH:/cms/api/builder/upload}
    connect-timeout-seconds: ${CMS_BUILDER_CONNECT_TIMEOUT:5}
    read-timeout-seconds: ${CMS_BUILDER_READ_TIMEOUT:60}
    # 배포(deploy) 전용 — 파일 이동은 CMS 내부 I/O 라 수초 내 완료 기대, 짧게 둔다 (#55)
    deploy-connect-timeout-seconds: ${CMS_BUILDER_DEPLOY_CONNECT_TIMEOUT:5}
    deploy-read-timeout-seconds: ${CMS_BUILDER_DEPLOY_READ_TIMEOUT:10}
    # CMS /cms/api/assets/{id}/deploy 엔드포인트 인증 토큰 — 페이지 배포와 동일한 CMS DEPLOY_SECRET 사용
    deploy-secret: ${CMS_DEPLOY_SECRET:}

# Scheduling Configuration (배치 이력 정리 스케줄러)
scheduling:
  batch-his-cleanup:
    enabled: true
    cron: "0 0 2 * * ?" # 매일 새벽 2시 실행
    retention-days: 90 # 보관 기간 (일)
    strategy: DELETE # DELETE 또는 DROP_PARTITION (파티셔닝 적용 시)

# Batch WAS HTTP 통신 설정
# batch-was의 실행 중 배치 조회·강제 종료 API에 사용되는 HTTP 포트
# WasInstanceResponse.port(TCP 포트)와 별도로 관리한다
batch:
  was:
    http-port: ${BATCH_WAS_HTTP_PORT:8081}

# spider-link SQL Reload API 설정
spiderlink:
  reload-url: ${SPIDERLINK_RELOAD_URL:http://localhost:8082/api/internal/sql/reload}

# TCP 통신 설정
# Admin TCP 서버(9999), batch-was TCP 서버(9998), spider-link TCP 서버(9996) → demo/backend(9997)
tcp:
  server:
    port: ${TCP_SERVER_PORT:9999}
  batch-was:
    port: ${BATCH_WAS_TCP_PORT:9998}
  # 실제 대상은 spider-link(9996) — spider-link가 demo/backend(9997)로 프록시한다
  demo-backend:
    host: ${SPIDER_LINK_TCP_HOST:localhost}
    port: ${SPIDER_LINK_TCP_PORT:9996}
