spring:
  application:
    name: biz-auth
  config:
    import: optional:file:.env[.properties]
  main:
    # HTTP 서버 없이 순수 TCP 서버로 동작 (spring-boot-starter 전용)
    web-application-type: none
    keep-alive: true
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1

tcp:
  server:
    port: ${TCP_SERVER_PORT}
    handler-pool-size: ${TCP_SERVER_HANDLER_POOL_SIZE}
    queue-capacity: ${TCP_SERVER_QUEUE_CAPACITY}

mock:
  core:
    host: ${MOCK_CORE_HOST}
    port: ${MOCK_CORE_PORT}

app:
  org-id: ${APP_ORG_ID:DEMO}

logging:
  level:
    com.example.bizauth: DEBUG
