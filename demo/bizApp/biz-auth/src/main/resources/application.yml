spring:
  application:
    name: biz-auth
  config:
    import: optional:file:.env[.properties]
  main:
    # HTTP 서버 없이 순수 TCP 서버로 동작 (spring-boot-starter 전용)
    web-application-type: none
    keep-alive: true
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1

mybatis:
  # classpath*: 로 spider-link JAR 내부 XML까지 탐색
  mapper-locations: classpath*:mapper/oracle/**/*.xml

tcp:
  server:
    port: ${TCP_SERVER_PORT}
    handler-pool-size: ${TCP_SERVER_HANDLER_POOL_SIZE}
    queue-capacity: ${TCP_SERVER_QUEUE_CAPACITY}
  ext:
    # MetaDrivenCommandHandler B-type TcpCallBiz 가 호출할 외부시스템 (mock-core)
    # TCP_EXT_HOST 미설정 시 기존 MOCK_CORE_HOST 로 폴백하여 .env 호환성 유지
    host: ${TCP_EXT_HOST:${MOCK_CORE_HOST:localhost}}
    port: ${TCP_EXT_PORT:${MOCK_CORE_PORT:19300}}

logging:
  level:
    com.example.bizauth: DEBUG
    com.example.spiderlink: DEBUG
