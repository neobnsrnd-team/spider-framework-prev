<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="script">
<script th:inline="javascript">
    // ==================== CmsDeployPage ====================

    window.CmsDeployPage = {
        currentPage: 1,
        totalItems: 0,
        itemsPerPage: 10,
        canWrite: /*[[${userAuthorities != null && userAuthorities.contains('CMS:W')}]]*/ false,
        sortBy: null,
        sortDirection: null,

        // 배포 미리보기 래퍼 팝업 크기 — viewMode 무관 동일하게 큰 창으로 열고
        // 내부 디바이스 프레임이 viewMode 별 폭(모바일=390 / 웹=풀폭) 을 책임진다 (#278)
        PREVIEW_WINDOW_SIZE: { w: 1400, h: 900 },

        load: function(page) {
            if (page !== undefined) this.currentPage = page;
            const params = new URLSearchParams({
                page:   this.currentPage,
                size:   this.itemsPerPage,
                search: $('#filterSearch').val().trim(),
            });
            if (this.sortBy) {
                params.append('sortBy', this.sortBy);
                params.append('sortDirection', this.sortDirection);
            }

            fetch('/api/cms-admin/deployments/pages?' + params)
                .then(r => r.json())
                .then(res => {
                    if (!res.success) { Toast.error(res.message); return; }
                    const pageData = res.data;
                    this.totalItems = pageData.totalElements;
                    this.renderTable(pageData.content);
                    this.renderPagination();
                    this.updateSortIndicators();
                })
                .catch(() => Toast.error('목록 조회 중 오류가 발생했습니다.'));
        },

        attachSortHandlers: function() {
            $('#deployPageTable thead th[data-sort]').addClass('sortable cursor-pointer');
            $(document)
                .off('click.cmsDeploySort', '#deployPageTable thead th[data-sort]')
                .on('click.cmsDeploySort', '#deployPageTable thead th[data-sort]', function() {
                    const sortKey = $(this).data('sort');
                    if (!sortKey) return;

                    if (CmsDeployPage.sortBy === sortKey) {
                        if (CmsDeployPage.sortDirection === 'ASC') {
                            CmsDeployPage.sortDirection = 'DESC';
                        } else {
                            CmsDeployPage.sortBy = null;
                            CmsDeployPage.sortDirection = null;
                        }
                    } else {
                        CmsDeployPage.sortBy = sortKey;
                        CmsDeployPage.sortDirection = 'ASC';
                    }

                    CmsDeployPage.updateSortIndicators();
                    CmsDeployPage.load(1);
                });
        },

        updateSortIndicators: function() {
            const headers = $('#deployPageTable thead th.sortable');
            headers.removeClass('sort-asc sort-desc');
            if (!this.sortBy || !this.sortDirection) return;

            headers.filter(`[data-sort="${this.sortBy}"]`)
                .addClass(this.sortDirection === 'ASC' ? 'sort-asc' : 'sort-desc');
        },

        escapeJsStringArg: function(value) {
            return String(value || '')
                .replace(/\\/g, '\\\\')
                .replace(/'/g, "\\'")
                // onclick="..." 속성 컨텍스트에서 " 가 포함되면 HTML 속성이 조기에 닫히므로 &quot; 로 인코딩
                .replace(/"/g, '&quot;')
                .replace(/\r/g, '\\r')
                .replace(/\n/g, '\\n');
        },

        // 배포된 페이지를 디바이스 프레임 래퍼(/cms-admin/deployments/preview) 안에서 열기 (#278)
        // - mobile: 폰 프레임(390x844) 안에 iframe
        // - web/PC: 풀폭 iframe
        // 외부 배포 서버(nginx) 가 X-Frame-Options 미설정이라 cross-origin iframe 가능
        openDeployedPreview: function(url, viewMode) {
            const wrapperUrl = '/cms-admin/deployments/preview'
                + '?url=' + encodeURIComponent(url)
                + '&viewMode=' + encodeURIComponent(viewMode || '');
            const size = this.PREVIEW_WINDOW_SIZE;
            window.open(
                wrapperUrl,
                'cmsDeployPreview',
                `width=${size.w},height=${size.h},scrollbars=yes,resizable=yes`,
            );
        },

        renderTable: function(rows) {
            const $tbody = $('#deployPageTableBody');
            // canWrite: 배포·만료수동처리 2컬럼 + URL 1컬럼 추가 → 9컬럼 / 미권한: 7컬럼
            const colspan = this.canWrite ? 9 : 7;

            if (!rows || rows.length === 0) {
                $tbody.html(`<tr><td colspan="${colspan}" class="text-center py-4 text-body-secondary">조회된 데이터가 없습니다.</td></tr>`);
                return;
            }

            const html = rows.map(row => {
                const pid          = HtmlUtils.escape(row.pageId || '');
                const jsPageName   = this.escapeJsStringArg(row.pageName);
                const jsDeployedUrl = this.escapeJsStringArg(row.deployedUrl);
                // viewMode 는 배포 미리보기 창 크기 결정에 사용 (#278)
                const jsViewMode   = this.escapeJsStringArg(row.viewMode);

                // 노출기간 셀 — 만료된 경우 종료일 빨간색 + 만료 뱃지
                const beginStr = row.beginningDate || '-';
                const expiredBadge = row.isExpired === 'Y'
                    ? ' <span class="badge bg-danger ms-1" style="font-size:10px;">만료</span>'
                    : '';
                const endStr = row.expiredDate
                    ? (row.isExpired === 'Y'
                        ? `<span class="text-danger fw-semibold">${HtmlUtils.escape(row.expiredDate)}</span>${expiredBadge}`
                        : HtmlUtils.escape(row.expiredDate))
                    : '-';
                const periodCell = `<td class="small">${HtmlUtils.escape(beginStr)} ~ ${endStr}</td>`;

                // 배포 미리보기: 앵커(target=_blank) → 버튼(window.open) 으로 변경
                // viewMode 에 맞춘 창 크기로 노출되도록 openDeployedPreview() 위임 (#278)
                const previewBtn = row.deployedUrl
                    ? `<button type="button" class="btn btn-outline-info btn-xs"
                               onclick="CmsDeployPage.openDeployedPreview('${jsDeployedUrl}', '${jsViewMode}')">
                           <i class="bi bi-box-arrow-up-right"></i> 보기
                       </button>`
                    : '<span class="text-body-secondary small">-</span>';
                const deployedUrlCell = row.deployedUrl
                    ? `<td class="small">
                           <div class="text-break">
                               <div class="mb-1">
                                   <a href="${HtmlUtils.escape(row.deployedUrl)}" target="_blank" rel="noopener">
                                       ${HtmlUtils.escape(row.deployedUrl)}
                                   </a>
                               </div>
                               <button type="button"
                                       class="btn btn-outline-secondary btn-xs"
                                        onclick="CmsDeployPage.copyUrl('${jsDeployedUrl}')">
                                   URL 복사
                               </button>
                           </div>
                       </td>`
                    : '<td class="text-center text-body-secondary small">-</td>';

                const deployBtn = this.canWrite
                    ? `<td class="text-center">
                           <button class="btn btn-primary btn-xs"
                                    onclick="CmsDeployPage.confirmPush('${pid}', '${jsPageName}')">
                               <i class="bi bi-send"></i> 배포
                           </button>
                       </td>`
                    : '';

                // 만료수동처리 버튼 — isExpired='Y' AND isPublic='Y' 인 경우에만 표시
                const expireBtn = this.canWrite
                    ? `<td class="text-center">
                           ${row.isExpired === 'Y' && row.isPublic === 'Y'
                               ? `<button class="btn btn-outline-danger btn-xs"
                                           onclick="CmsDeployPage.confirmExpirePush('${pid}', '${jsPageName}')">
                                      <i class="bi bi-slash-circle"></i> 만료처리
                                  </button>`
                               : '<span class="text-body-secondary small">-</span>'}
                       </td>`
                    : '';

                return `<tr>
                    <td class="small">${pid}</td>
                    <td>${HtmlUtils.escape(row.pageName || '')}</td>
                    <td>${HtmlUtils.escape(row.createUserName || '')}</td>
                    ${periodCell}
                    ${deployBtn}
                    <td class="text-center">${previewBtn}</td>
                    ${deployedUrlCell}
                    ${expireBtn}
                    <td class="text-center">
                        <button class="btn btn-outline-secondary btn-xs"
                                onclick="CmsDeployPage.openHistoryModal('${pid}', '${jsPageName}')">
                            <i class="bi bi-clock-history"></i> 이력
                        </button>
                    </td>
                </tr>`;
            }).join('');

            $tbody.html(html);
        },

        renderPagination: function() {
            const totalPages = Math.ceil(this.totalItems / this.itemsPerPage);
            const pagination = $('#pagination');
            pagination.empty();

            pagination.append(`
                <li class="page-item ${this.currentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="CmsDeployPage.changePage(1); return false;"><i class="bi bi-chevron-double-left"></i></a>
                </li>
                <li class="page-item ${this.currentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="CmsDeployPage.changePage(${this.currentPage - 1}); return false;"><i class="bi bi-chevron-left"></i></a>
                </li>
            `);

            const maxButtons = 5;
            let startPage = Math.max(1, this.currentPage - Math.floor(maxButtons / 2));
            let endPage   = Math.min(totalPages, startPage + maxButtons - 1);
            if (endPage - startPage + 1 < maxButtons) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }

            for (let i = startPage; i <= endPage; i++) {
                pagination.append(`
                    <li class="page-item ${i === this.currentPage ? 'active' : ''}">
                        <a class="page-link" href="#" onclick="CmsDeployPage.changePage(${i}); return false;">${i}</a>
                    </li>
                `);
            }

            pagination.append(`
                <li class="page-item ${this.currentPage === totalPages || totalPages === 0 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="CmsDeployPage.changePage(${this.currentPage + 1}); return false;"><i class="bi bi-chevron-right"></i></a>
                </li>
                <li class="page-item ${this.currentPage === totalPages || totalPages === 0 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="CmsDeployPage.changePage(${totalPages}); return false;"><i class="bi bi-chevron-double-right"></i></a>
                </li>
            `);

            const start = this.totalItems === 0 ? 0 : (this.currentPage - 1) * this.itemsPerPage + 1;
            const end   = Math.min(this.currentPage * this.itemsPerPage, this.totalItems);
            $('#pageInfo').text(`${start} - ${end} of ${this.totalItems} items`);
        },

        changePage: function(page) {
            const totalPages = Math.ceil(this.totalItems / this.itemsPerPage);
            if (page < 1 || page > totalPages) return;
            this.currentPage = page;
            this.load();
        },

        reset: function() {
            $('#filterSearch').val('');
            this.sortBy = null;
            this.sortDirection = null;
            this.updateSortIndicators();
            this.itemsPerPage = parseInt($('#limitRows').val()) || 10;
            this.load(1);
        },

        // ── 배포 실행 ──

        confirmPush: function(pageId, pageName) {
            if (!confirm(`[${pageName}] 페이지를 배포하시겠습니까?`)) return;

            fetch('/api/cms-admin/deployments/push', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pageId }),
            })
                .then(r => r.json())
                .then(res => {
                    if (res.success) {
                        Toast.success(res.message);
                        this.load();
                    } else {
                        Toast.error(res.message);
                    }
                })
                .catch(() => Toast.error('배포 중 오류가 발생했습니다.'));
        },

        // ── 만료수동처리 배포 ──

        confirmExpirePush: function(pageId, pageName) {
            if (!confirm(`[${pageName}] 만료페이지를 배포하시겠습니까?`)) return;

            fetch('/api/cms-admin/deployments/push-expired', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pageId }),
            })
                .then(r => r.json())
                .then(res => {
                    if (res.success) {
                        Toast.success(res.message);
                        this.load();
                    } else {
                        Toast.error(res.message);
                    }
                })
                .catch(() => Toast.error('만료 배포 중 오류가 발생했습니다.'));
        },

        // ── 배포이력 상세 모달 ──

        openHistoryModal: function(pageId, pageName) {
            $('#historyModalPageInfo').text(`페이지: ${pageName} (${pageId})`);
            $('#historyModalTableBody').html(
                '<tr><td colspan="5" class="text-center text-body-secondary">불러오는 중...</td></tr>'
            );
            new bootstrap.Modal('#historyModal').show();

            const params = new URLSearchParams({ pageId, page: 1, size: 50 });
            fetch('/api/cms-admin/deployments?' + params)
                .then(r => r.json())
                .then(res => {
                    if (!res.success) {
                        $('#historyModalTableBody').html(
                            '<tr><td colspan="5" class="text-center text-danger">이력 조회 실패</td></tr>'
                        );
                        return;
                    }
                    const rows = res.data.content;
                    if (!rows || rows.length === 0) {
                        $('#historyModalTableBody').html(
                            '<tr><td colspan="5" class="text-center text-body-secondary">배포 이력이 없습니다.</td></tr>'
                        );
                        return;
                    }
                    const html = rows.map(row => `
                        <tr>
                            <td>${HtmlUtils.escape(row.instanceName || row.instanceId || '')}</td>
                            <td class="small text-break">${HtmlUtils.escape(row.fileId || '')}</td>
                            <td class="text-end small">${CmsDeployPage.formatSize(row.fileSize)}</td>
                            <td>${HtmlUtils.escape(row.lastModifierId || '')}</td>
                            <td class="small">${CmsDeployPage.formatDtime(row.lastModifiedDtime)}</td>
                        </tr>
                    `).join('');
                    $('#historyModalTableBody').html(html);
                })
                .catch(() => {
                    $('#historyModalTableBody').html(
                        '<tr><td colspan="5" class="text-center text-danger">이력 조회 중 오류가 발생했습니다.</td></tr>'
                    );
                });
        },

        // ── 유틸 ──

        formatDtime: function(s) {
            if (!s || s.length < 14) return s || '-';
            return s.substring(0, 4) + '-' + s.substring(4, 6) + '-' + s.substring(6, 8) + ' '
                 + s.substring(8, 10) + ':' + s.substring(10, 12) + ':' + s.substring(12, 14);
        },

        formatSize: function(bytes) {
            if (bytes == null) return '-';
            if (bytes >= 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            if (bytes >= 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return bytes + ' B';
        },

        copyUrl: function(url) {
            if (!url) {
                Toast.warning('복사할 URL이 없습니다.');
                return;
            }

            navigator.clipboard.writeText(url)
                .then(() => Toast.success('URL이 복사되었습니다.'))
                .catch(() => Toast.error('URL 복사에 실패했습니다.'));
        },
    };

    // ==================== 이벤트 바인딩 ====================

    $(document).ready(function() {
        CmsDeployPage.itemsPerPage = parseInt($('#limitRows').val()) || 10;
        CmsDeployPage.attachSortHandlers();
        CmsDeployPage.load(1);

        $('#limitRows').on('change', function() {
            CmsDeployPage.itemsPerPage = parseInt($(this).val()) || 10;
            CmsDeployPage.load(1);
        });

        $('#btnRefresh').on('click', function() { CmsDeployPage.load(); });
    });
</script>
</th:block>
</body>
</html>
