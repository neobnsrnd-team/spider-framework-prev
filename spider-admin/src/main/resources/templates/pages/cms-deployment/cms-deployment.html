<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

    <!-- 검색조건 헤더 -->
    <div class="page-header">
        <h4 class="page-title">
            <i class="bi bi-exclamation-circle-fill text-danger"></i>
            검색조건
        </h4>
    </div>

    <!-- 검색 영역 -->
    <div class="card border p-2 mb-3">
        <div class="d-flex flex-wrap align-items-center gap-2 mb-1">
            <input type="text" id="filterSearch" class="form-control form-control-sm flex-fixed-200"
                   placeholder="페이지명 또는 작성자"
                   onkeypress="if(event.key === 'Enter') CmsDeployPage.load(1)">

            <div class="flex-grow-1"></div>

            <select id="limitRows" class="form-select form-select-sm sp-limit-select">
                <option value="10" selected>10</option>
                <option value="20">20</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
            <label class="form-label mb-0 small fw-medium ms-1 me-2 fs-xs">건씩</label>

            <button class="btn btn-primary btn-sm" onclick="CmsDeployPage.load(1)">
                <i class="bi bi-search"></i> 조회
            </button>
            <button class="btn btn-outline-secondary btn-sm" onclick="CmsDeployPage.reset()">초기화</button>
        </div>
    </div>

    <!-- 리스트 헤더 -->
    <div class="page-header mt-3">
        <h4 class="page-title">
            <i class="bi bi-exclamation-circle-fill text-danger"></i>
            배포 관리
        </h4>
        <div class="page-header-actions">
            <button class="btn btn-outline-secondary btn-sm" id="btnRefresh">
                <i class="bi bi-arrow-clockwise"></i> 새로고침
            </button>
        </div>
    </div>

    <!--<div class="alert alert-info py-2 small" role="alert">
        <strong>CMS 리소스 경계</strong>
        이 화면은 승인완료 페이지 HTML의 배포 실행과 배포이력 조회만 제공합니다.
        이미지 업로드, 삭제, 폴더 생성 같은 리소스 파일 관리는 spider-admin에서 수행하지 않습니다.
    </div> -->

    <!-- 테이블 -->
    <div th:replace="~{pages/cms-deployment/cms-deployment-table :: table}"></div>

    <!-- 페이지네이션 -->
    <div th:replace="~{fragments/page-content-layout :: pagination}"></div>

    <!-- ==================== 배포이력 상세 모달 ==================== -->
    <div class="modal fade" id="historyModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">배포이력 상세</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-body-secondary small mb-2" id="historyModalPageInfo"></p>
                    <div class="table-responsive">
                        <table class="table table-sm table-hover sp-data-grid">
                            <thead class="table-light">
                                <tr>
                                    <th class="col-w-120">서버명</th>
                                    <th>파일 ID</th>
                                    <th class="col-w-90">파일 크기</th>
                                    <th class="col-w-90">배포자</th>
                                    <th class="col-w-150">배포 일시</th>
                                </tr>
                            </thead>
                            <tbody id="historyModalTableBody">
                                <tr>
                                    <td colspan="5" class="text-center text-body-secondary">불러오는 중...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 스크립트 -->
    <th:block th:replace="~{pages/cms-deployment/cms-deployment-script :: script}"/>

</div>
</body>
</html>
