<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <!-- Include Page Content Layout Styles -->

    <!-- Search Section Header -->
    <div class="page-header">
        <h4 class="page-title">
            <i class="bi bi-exclamation-circle-fill text-danger"></i>
            검색조건
        </h4>
    </div>

    <!-- Search Box -->
    <div id="searchContainer"></div>

    <!-- List Section Header + Toolbar -->
    <div class="d-flex align-items-center justify-content-between mt-3">
        <div class="page-header mb-0">
            <h4 class="page-title">
                <i class="bi bi-exclamation-circle-fill text-danger"></i>
                리스트
            </h4>
        </div>
        <div th:replace="~{fragments/page-content-layout :: toolbar}"></div>
    </div>

    <!-- Table Container (동적 생성) -->
    <div id="tableContainer"></div>

    <!-- Pagination -->
    <th:block th:replace="~{fragments/page-content-layout :: pagination}" />

    <!-- Detail Modal -->
    <div th:replace="~{pages/user-page-log/user-page-log-table :: modal}"></div>

    <!-- AdminActionLog Script -->
    <th:block th:replace="~{pages/user-page-log/user-page-log-script :: script}" />
</div>
</body>
</html>
