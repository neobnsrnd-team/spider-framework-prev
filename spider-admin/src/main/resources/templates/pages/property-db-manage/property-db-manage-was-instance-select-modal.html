<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="modal">
    <!-- WAS 인스턴스 선택 Modal -->
    <div class="modal fade" id="wasInstanceSelectModal" tabindex="-1" aria-labelledby="wasInstanceSelectModalLabel" aria-hidden="true">
        <div class="modal-dialog sp-modal-sm">
            <div class="modal-content">
                <!-- Modal Header -->
                <div class="modal-header">
                    <h5 class="modal-title" id="wasInstanceSelectModalLabel">
                        <i class="bi bi-hdd-rack"></i> 적용할 WAS 인스턴스 선택
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <!-- Modal Body -->
                <div class="modal-body">
                    <div class="table-responsive sp-scrollable">
                        <table class="table table-sm table-hover sp-data-grid" id="wasInstanceSelectTable">
                            <thead class="table-light">
                                <tr>
                                    <th class="col-w-40 text-center">
                                        <input type="checkbox" id="selectAllWasInstances" onchange="WasInstanceSelectModal.toggleSelectAll(this)">
                                    </th>
                                    <th class="col-w-150">인스턴스ID</th>
                                    <th>인스턴스명</th>
                                </tr>
                            </thead>
                            <tbody id="wasInstanceSelectTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Modal Footer -->
                <div class="modal-footer justify-content-end">
                    <button type="button" class="btn btn-success btn-sm" onclick="WasInstanceSelectModal.backup()">
                        <i class="bi bi-download"></i> 백업
                    </button>
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">
                        <i class="bi bi-x-lg"></i> 닫기
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:fragment="script">
<script>
    const WasInstanceSelectModal = {
        currentPropertyGroupId: null,
        wasInstances: [],

        // 모달 열기
        open: function(propertyGroupId) {
            this.currentPropertyGroupId = propertyGroupId;
            this.loadWasInstances();

            const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById('wasInstanceSelectModal'));
            modal.show();
        },

        // WAS 인스턴스 목록 로드
        loadWasInstances: function() {
            $.ajax({
                url: API_BASE_URL + '/was/property/instances',
                method: 'GET',
                success: (response) => {
                    if (response.success && response.data) {
                        this.wasInstances = response.data;
                    } else {
                        this.wasInstances = [];
                    }
                    this.renderInstances();
                },
                error: (xhr) => {
                    console.error('Failed to load WAS instances:', xhr);
                    Toast.error('WAS 인스턴스 목록을 불러오는데 실패했습니다.');
                    this.wasInstances = [];
                    this.renderInstances();
                }
            });
        },

        // 인스턴스 목록 렌더링
        renderInstances: function() {
            const tbody = $('#wasInstanceSelectTableBody');
            tbody.empty();

            if (!this.wasInstances || this.wasInstances.length === 0) {
                tbody.append(`
                    <tr>
                        <td colspan="3" class="text-center text-muted py-3">
                            등록된 WAS 인스턴스가 없습니다.
                        </td>
                    </tr>
                `);
                return;
            }

            this.wasInstances.forEach((inst, index) => {
                tbody.append(`
                    <tr>
                        <td class="text-center">
                            <input type="checkbox" class="was-instance-checkbox" data-instance-id="${HtmlUtils.escape(inst.instanceId)}">
                        </td>
                        <td>${HtmlUtils.escape(inst.instanceId)}</td>
                        <td>${HtmlUtils.escape(inst.instanceName || '')}</td>
                    </tr>
                `);
            });
        },

        // 전체 선택/해제
        toggleSelectAll: function(checkbox) {
            $('.was-instance-checkbox').prop('checked', checkbox.checked);
        },

        // 백업 실행
        backup: function() {
            // 선택된 인스턴스 수집
            const selectedIds = [];
            $('.was-instance-checkbox:checked').each(function() {
                selectedIds.push($(this).data('instance-id'));
            });

            if (selectedIds.length === 0) {
                Toast.warning('백업할 WAS 인스턴스를 선택해주세요.');
                return;
            }

            const instanceListStr = selectedIds.join(' | ');
            Toast.confirm(this.currentPropertyGroupId + '의 WAS(' + instanceListStr + ')별 설정 정보를 백업 하시겠습니까?', () => {
                const reason = prompt('백업사유를 입력 해주세요');
                if (reason === null) {
                    return;
                }
                if (!reason || reason.trim() === '') {
                    Toast.warning('백업사유를 입력해주세요.');
                    return;
                }

                $.ajax({
                    url: API_BASE_URL + '/was/property/groups/' + this.currentPropertyGroupId + '/backup',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        instanceIds: selectedIds,
                        reason: reason.trim()
                    }),
                    success: (response) => {
                        if (response.success) {
                            Toast.success('백업이 완료되었습니다.');
                            // 모달 닫기
                            const modal = bootstrap.Modal.getInstance(document.getElementById('wasInstanceSelectModal'));
                            if (modal) {
                                modal.hide();
                            }
                        } else {
                            Toast.error('백업 중 오류가 발생했습니다: ' + (response.message || ''));
                        }
                    },
                    error: (xhr) => {
                        console.error('Failed to backup WAS properties:', xhr);
                        const errorMessage = xhr.responseJSON?.message || '백업 중 오류가 발생했습니다.';
                        Toast.error(errorMessage);
                    }
                });
            });
        },

    };
</script>
</th:block>
</body>
</html>
