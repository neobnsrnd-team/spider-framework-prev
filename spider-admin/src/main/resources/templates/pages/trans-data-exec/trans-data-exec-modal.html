<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="modal">
    <!-- TransData Detail Modal -->
    <div class="modal fade" id="transDataModal" tabindex="-1" aria-labelledby="transDataModalLabel" aria-hidden="true"
         data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered modal-lg sp-modal-lg">
            <div class="modal-content">
                <!-- Modal Header -->
                <div class="modal-header py-2">
                    <h5 class="modal-title" id="transDataModalLabel">이행 상세 정보</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <!-- Modal Body -->
                <div class="modal-body sp-scrollable">
                    <!-- Section: 이행 실행 요약 -->
                    <div class="modal-section-title">
                        <i class="bi bi-info-circle text-primary"></i>
                        <span>이행 실행 정보</span>
                    </div>

                    <div class="mb-3">
                        <!-- Row 1: 이행순번, 이행결과 -->
                        <div class="row g-3 mb-2">
                            <div class="col-md-6 form-group-row">
                                <label class="form-label small mb-1 label-attached-h">이행순번</label>
                                <input type="text" class="form-control form-control-sm input-attached" id="modalTranSeq" readonly>
                            </div>
                            <div class="col-md-6 form-group-row">
                                <label class="form-label small mb-1 label-attached-h">이행결과</label>
                                <input type="text" class="form-control form-control-sm input-attached" id="modalTranResult" readonly>
                            </div>
                        </div>

                        <!-- Row 2: 이행사유 -->
                        <div class="row g-3 mb-2">
                            <div class="col-12 form-group-row-stretch">
                                <label class="form-label small mb-1 label-attached">이행사유</label>
                                <textarea class="form-control form-control-sm textarea-attached" id="modalTranReason" rows="2" readonly></textarea>
                            </div>
                        </div>

                    </div>

                    <!-- Section: 이행 상세 이력 -->
                    <div class="modal-section-title section-title-spaced">
                        <i class="bi bi-list-ul text-info"></i>
                        <span>이행 상세 이력</span>
                    </div>

                    <!-- 검색 필터 영역 -->
                    <div class="card border p-2 mb-3 search-filter-row">
                        <div class="d-flex flex-wrap align-items-center gap-2 mb-1">
                            <div class="col-auto search-filter-item">
                                <label class="form-label mb-0 small fw-medium">이행결과</label>
                                <select id="modalSearchTranResult" class="form-select form-select-sm w-100px">
                                    <option value="">전체</option>
                                    <option th:each="result : ${T(com.example.admin_demo.domain.transdata.enums.TranResult).values()}"
                                            th:value="${result.code}"
                                            th:text="${result.description}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-auto search-filter-item">
                                <label class="form-label mb-0 small fw-medium">이행유형</label>
                                <select id="modalSearchTranType" class="form-select form-select-sm w-120">
                                    <option value="">전체</option>
                                    <option th:each="type : ${T(com.example.admin_demo.domain.transdata.enums.TranType).values()}"
                                            th:value="${type.code}"
                                            th:text="${type.description}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-auto search-filter-item">
                                <label class="form-label mb-0 small fw-medium">페이지 크기</label>
                                <select id="modalLimitRows" class="form-select form-select-sm w-80">
                                    <option value="10">10</option>
                                    <option value="20">20</option>
                                    <option value="50">50</option>
                                </select>
                            </div>
                            <div class="col-auto search-filter-item">
                                <button type="button" class="btn btn-sm btn-primary" onclick="TransData.searchHis()">
                                    <i class="bi bi-search"></i> 조회
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-sm table-hover sp-data-grid" id="transDataHisTable">
                            <thead class="table-light">
                            <tr>
                                <th class="col-w-pct-15" data-modal-sort="tranType">이행유형 <span data-modal-sort-indicator="tranType"></span></th>
                                <th class="col-w-pct-20" data-modal-sort="tranId">이행ID <span data-modal-sort-indicator="tranId"></span></th>
                                <th class="col-w-pct-25" data-modal-sort="tranName">이행명 <span data-modal-sort-indicator="tranName"></span></th>
                                <th class="col-w-pct-20" data-modal-sort="tranTime">이행시각 <span data-modal-sort-indicator="tranTime"></span></th>
                                <th class="col-w-pct-20" data-modal-sort="tranResult">이행결과 <span data-modal-sort-indicator="tranResult"></span></th>
                            </tr>
                            </thead>
                            <tbody id="transDataHisTableBody">
                            <!-- JavaScript로 동적 렌더링 -->
                            </tbody>
                        </table>
                    </div>

                    <!-- 모달 내 페이지네이션 -->
                    <div class="modal-paging-row">
                        <span id="modalPageInfo" class="page-info-text"></span>
                        <nav>
                            <ul class="pagination pagination-sm mb-0" id="modalPagination">
                            </ul>
                        </nav>
                    </div>
                </div>

                <!-- Modal Footer -->
                <div class="modal-footer py-2">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">
                        <i class="bi bi-x-lg"></i> 닫기
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 실패 상세 모달 (중첩 모달) -->
    <div id="transFailModal" class="modal fade" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered sp-modal-md">
            <div class="modal-content">
        <div class="modal-header py-2">
            <span>실패 상세 정보</span>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <div class="modal-body">
            <!-- 섹션 제목 + UID Generator 버튼 -->
            <div class="fail-detail-header">
                <div class="modal-section-title m-0">
                    <i class="bi bi-exclamation-triangle-fill text-danger"></i>
                    <span>이행 실패 원인</span>
                </div>
                <button type="button" class="btn btn-sm btn-primary" id="btnUidGenerator" onclick="TransData.openUidGenerator()">
                    <i class="bi bi-key"></i> UID Generator
                </button>
            </div>

            <div class="mb-3">
                <!-- Row 1: 실패사유 -->
                <div class="row g-3 mb-2">
                    <div class="col-12">
                        <label class="form-label small mb-1">실패사유</label>
                        <textarea class="form-control form-control-sm textarea-readonly" id="failModalTranFailReason" rows="6" readonly></textarea>
                    </div>
                </div>

                <!-- Row 2: 실패SQL -->
                <div class="row g-3 mb-2">
                    <div class="col-12">
                        <label class="form-label small mb-1">실패SQL</label>
                        <textarea class="form-control form-control-sm textarea-readonly textarea-code" id="failModalTranFailSql" rows="10" readonly></textarea>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal-footer py-2 modal-actions">
            <div class="modal-actions-left"></div>
            <div class="modal-actions-right">
                <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">
                    <i class="bi bi-x-lg"></i> 닫기
                </button>
            </div>
        </div>
            </div>
        </div>
    </div>

    <!-- UID Generator 모달 (중첩 모달) -->
    <div id="uidGeneratorModal" class="modal fade" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered sp-modal-xs">
            <div class="modal-content">
        <div class="modal-header py-2">
            <span>UID Generator</span>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
            <div class="mb-3">
                <div class="row g-3 mb-2">
                    <div class="col-12 form-group-row">
                        <label class="form-label small mb-1 label-attached-h">일련번호</label>
                        <input type="text" class="form-control form-control-sm uid-value-input" id="uidGeneratorValue" readonly>
                        <button type="button" class="btn btn-sm btn-outline-secondary btn-attached-right" onclick="TransData.copyUid()">
                            <i class="bi bi-clipboard"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer py-2 modal-actions">
            <div class="modal-actions-left"></div>
            <div class="modal-actions-right">
                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="TransData.refreshUid()">
                    <i class="bi bi-arrow-clockwise"></i> 재생성
                </button>
                <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">
                    <i class="bi bi-x-lg"></i> 닫기
                </button>
            </div>
        </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
