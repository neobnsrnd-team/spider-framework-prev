<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- TransData Search Fragment -->
<div th:fragment="search" class="card border p-2 mb-3">
    <div class="d-flex flex-wrap align-items-center gap-2 mb-1">
        <!-- Left Side Components -->
        <label class="form-label mb-0 small fw-medium fs-xs">사용자ID</label>
        <input type="text" id="searchUserId" class="form-control form-control-sm flex-fixed-150"
               placeholder="사용자ID 입력"
               onkeypress="if(event.key === 'Enter') TransData.search()">

        <label class="form-label mb-0 small fw-medium ms-2 fs-xs">이행결과</label>
        <select id="searchTranResult" class="form-select form-select-sm flex-fixed-120">
            <option value="">전체</option>
            <option th:each="result : ${T(com.example.admin_demo.domain.transdata.enums.TranResult).values()}"
                    th:value="${result.code}"
                    th:text="${result.description}">
            </option>
        </select>

        <!-- Spacer to push right side to the end -->
        <div class="flex-grow-1"></div>

        <!-- Right Side Components -->
        <select id="limitRows" class="form-select form-select-sm sp-limit-select">
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="200">200</option>
            <option value="1000">1000</option>
        </select>
        <label class="form-label mb-0 small fw-medium ms-1 me-2 fs-xs">건씩</label>

        <button class="btn btn-primary btn-sm" onclick="TransData.search()">
            <i class="bi bi-search"></i> 조회
        </button>
    </div>
</div>
</body>
</html>
