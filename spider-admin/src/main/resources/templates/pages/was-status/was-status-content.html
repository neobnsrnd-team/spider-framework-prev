<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

    <!-- Search Section Header -->
    <div class="page-header">
        <h4 class="page-title">
            <i class="bi bi-exclamation-circle-fill text-danger"></i>
            검색조건
        </h4>
    </div>

    <!-- Search Box -->
    <div th:replace="~{pages/was-status/was-status-search :: search}"></div>

    <!-- List Section Header -->
    <div class="page-header mt-3">
        <h4 class="page-title">
            <i class="bi bi-exclamation-circle-fill text-danger"></i>
            리스트
        </h4>
    </div>

    <!-- Toolbar -->
    <div th:replace="~{fragments/page-content-layout :: toolbar}"></div>

    <!-- Table -->
    <div th:replace="~{pages/was-status/was-status-table :: table}"></div>

    <!-- Pagination -->
    <div th:replace="~{fragments/page-content-layout :: pagination}"></div>

    <!-- Bottom Action Buttons -->
    <div th:replace="~{pages/was-status/was-status-buttons :: buttons}"></div>

    <!-- Modal -->
    <div th:replace="~{pages/was-status/was-status-modal :: modal}"></div>

    <!-- 권한 변수 (JS) -->
    <script th:inline="javascript">
        var was_gateway_status_write = /*[[${userAuthorities != null and userAuthorities.contains('WAS_GATEWAY_STATUS:W')}]]*/ false;
    </script>

    <!-- Script -->
    <th:block th:replace="~{pages/was-status/was-status-script :: script}" />
</div>
</body>
</html>
