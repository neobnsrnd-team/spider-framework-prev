<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="search" class="card border p-2 mb-3">
    <div class="d-flex flex-wrap align-items-center gap-2 mb-1 justify-content-between">
        <div class="d-flex align-items-center gap-2 flex-grow-1">
            <label class="form-label mb-0 small fw-medium">검색조건</label>
            <select id="gatewaySearchField" class="form-select form-select-sm w-140">
                <option value="gwName" selected>G/W 명</option>
                <option value="gwId">GATEWAY ID</option>
            </select>
            <input id="gatewaySearchValue" type="text" class="form-control form-control-sm w-220"
                   placeholder="검색어 입력" />

            <label class="form-label mb-0 small fw-medium ms-2">어댑터/리스너</label>
            <select id="gatewayIoType" class="form-select form-select-sm w-140">
                <option value="" selected>전체</option>
                <option value="O">어댑터(송신)</option>
                <option value="I">리스너(수신)</option>
            </select>
        </div>

        <div class="d-flex align-items-center gap-8px flex-shrink-0">
            <select id="gatewayPageSize" class="form-select form-select-sm sp-limit-select">
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
            <span class="fs-xs text-body-secondary">건씩</span>
            <button type="button" class="btn btn-sm btn-primary" onclick="GatewayList.load(1)">조회</button>
        </div>
    </div>
</div>
</body>
</html>
