<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

    <!-- Search Section Header -->
    <div class="page-header">
        <h4 class="page-title">
            <i class="bi bi-exclamation-circle-fill text-danger"></i>
            검색조건
        </h4>
    </div>

    <!-- Search Container (동적 생성) -->
    <div id="searchContainer"></div>

    <!-- List Section Header -->
    <div class="page-header mt-3">
        <h4 class="page-title">
            <i class="bi bi-exclamation-circle-fill text-danger"></i>
            리스트
        </h4>

        <!-- Toolbar -->
        <th:block th:replace="~{fragments/page-content-layout :: toolbar}" />
    </div>

    <!-- Table Container (동적 생성) -->
    <div id="tableContainer"></div>

    <!-- Pagination -->
    <th:block th:replace="~{fragments/page-content-layout :: pagination}" />

    <!-- Bottom Action Buttons -->
    <div th:replace="~{pages/sqlquery-manage/sqlquery-manage-buttons :: buttons}"></div>

    <!-- SqlQuery Modal -->
    <div th:replace="~{pages/sqlquery-manage/sqlquery-modal :: modal}"></div>

    <!-- SqlQuery Test Modal -->
    <div th:replace="~{pages/sqlquery-manage/sqlquery-test-modal :: modal}"></div>

    <!-- SqlQuery Restore Modal -->
    <div th:replace="~{pages/sqlquery-manage/sqlquery-restore-modal :: modal}"></div>

    <!-- WAS Reload Modal (공용 컴포넌트) -->
    <div th:replace="~{modals/was-reload-modal :: modal}"></div>

    <!-- Page Script -->
    <th:block th:replace="~{pages/sqlquery-manage/sqlquery-manage-script :: script}" />

</div>
</body>
</html>
