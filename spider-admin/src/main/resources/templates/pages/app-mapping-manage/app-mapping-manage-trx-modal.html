<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="trxModal">
    <div id="appMappingTrxModal" class="modal fade" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered sp-modal-md">
            <div class="modal-content">
        <div class="modal-header py-2">
            <span>거래조회</span>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <div class="modal-body">
            <div class="card border p-2 mb-2">
                <div class="d-flex flex-wrap align-items-center gap-2 mb-1 justify-content-between">
                    <div class="d-flex align-items-center gap-2 flex-grow-1">
                        <label class="form-label mb-0 small fw-medium">검색조건</label>
                        <select id="trxSearchField" class="form-select form-select-sm flex-fixed-120">
                            <option value="trxId">거래ID</option>
                            <option value="trxName">거래명</option>
                        </select>
                        <input id="trxSearchValue" type="text" class="form-control form-control-sm col-w-200"
                               onkeypress="if(event.key==='Enter'){AppMappingTrxModal.search();}">
                    </div>

                    <div class="d-flex align-items-center gap-2 flex-shrink-0">
                        <select id="trxPageSize" class="form-select form-select-sm sp-limit-select">
                            <option value="10" selected>10</option>
                            <option value="20">20</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                        <span class="fs-sm sp-search-label">건씩</span>
                        <button type="button" class="btn btn-sm btn-primary" onclick="AppMappingTrxModal.search()">
                            조회
                        </button>
                    </div>
                </div>
            </div>

            <div class="page-header mb-2">
                <h4 class="page-title">
                    <i class="bi bi-exclamation-circle-fill text-danger"></i>
                    리스트
                </h4>
            </div>

            <div class="table-responsive">
                <table class="table table-sm table-hover sp-data-grid">
                    <thead class="table-light">
                    <tr>
                        <th class="col-w-160">거래ID</th>
                        <th>거래명</th>
                    </tr>
                    </thead>
                    <tbody id="appMappingTrxTableBody">
                    <tr>
                        <td colspan="2" class="text-center py-4 text-body-secondary">
                            조회된 데이터가 없습니다.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination-container py-2">
                <nav>
                    <ul class="pagination pagination-sm" id="appMappingTrxPagination"></ul>
                </nav>
                <div class="pagination-info">
                    <span id="appMappingTrxPageInfo">0 - 0 of 0 items</span>
                </div>
            </div>
        </div>

        <div class="modal-footer py-2">
            <button class="btn btn-xs btn-outline-secondary" data-bs-dismiss="modal"><i class="bi bi-x-lg"></i> 닫기</button>
        </div>
            </div>
        </div>
    </div>
</div>

<!-- Styles extracted to app.css -->
<th:block th:fragment="styles">
</th:block>
</body>
</html>
