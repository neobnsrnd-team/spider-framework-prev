<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

    <!-- 페이지 헤더 -->
    <div class="page-header">
        <h4 class="page-title">
            <i class="bi bi-file-earmark-code"></i> XML Property 관리
        </h4>
    </div>

    <!-- 파일 목록 섹션 -->
    <div class="card mb-3">
        <div class="card-header d-flex align-items-center justify-content-between small fw-semibold">
            <span class="d-flex align-items-center gap-2">
                <i class="bi bi-play-fill"></i> 리스트
            </span>
            <div class="d-flex gap-2">
                <button class="btn btn-xs btn-primary" id="btnReloadAll">
                    <i class="bi bi-arrow-clockwise"></i> Reload All
                </button>
                <button th:if="${userAuthorities != null and userAuthorities.contains('XML_PROPERTY:W')}"
                        class="btn btn-xs btn-success" id="btnAddFile">
                    <i class="bi bi-plus-lg"></i> 등록
                </button>
            </div>
        </div>
        <table class="sp-data-grid">
            <thead>
            <tr>
                <th class="sortable" onclick="XmlPropertyPage.sortBy('fileName')">
                    Property 파일 <span class="sort-icon" id="sortIconFileName">⇅</span>
                </th>
                <th class="sortable" onclick="XmlPropertyPage.sortBy('description')">
                    프로퍼티 설명 <span class="sort-icon" id="sortIconDescription">⇅</span>
                </th>
                <th class="col-w-90">Reload</th>
                <th class="col-w-60">삭제</th>
            </tr>
            </thead>
            <tbody id="xmlPropFileTableBody">
            <!-- JS로 동적 렌더링 -->
            </tbody>
        </table>
    </div>

    <!-- 상세/편집 모달 (Modal.js 동적 생성) -->
    <div id="xmlPropDetailContainer"></div>

    <!-- 파일 등록 모달 + 삭제 확인 모달 -->
    <div th:replace="~{pages/xml-property-manage/xml-property-manage-modal :: modals}"></div>

    <!-- WAS 선택 Reload 모달 (공용 컴포넌트) -->
    <div th:replace="~{modals/was-reload-modal :: modal}"></div>

    <!-- Script -->
    <th:block th:replace="~{pages/xml-property-manage/xml-property-manage-script :: script}" />
</div>
</body>
</html>
