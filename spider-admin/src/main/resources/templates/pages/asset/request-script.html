<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="script">
<script th:inline="javascript">
/*<![CDATA[*/
    window.HAS_CMS_WRITE = /*[[${userAuthorities != null && userAuthorities.contains('CMS:W')}]]*/ false;
/*]]>*/
</script>
<script>
    window.CmsAssetRequestPage = {
        currentPage: 1,
        totalItems: 0,
        itemsPerPage: 10,
        sortBy: null,
        sortDirection: null,
        categoryOptionsLoaded: false,
        categoryMap: { COMMON: '공통', CARD: '카드', LOAN: '여신', DEPOSIT: '수신' },
        PLACEHOLDER_SRC: '/images/asset-placeholder.svg',

        STATE_BADGE: {
            WORK: '<span class="badge bg-secondary">작업중</span>',
            PENDING: '<span class="badge bg-warning text-dark">승인대기</span>',
            APPROVED: '<span class="badge bg-success">승인완료</span>',
            REJECTED: '<span class="badge bg-danger">반려</span>',
        },

        load: function(page) {
            if (page !== undefined) this.currentPage = page;
            const params = new URLSearchParams({
                page: this.currentPage,
                size: this.itemsPerPage,
                assetState: $('#filterAssetState').val(),
                businessCategory: ($('#filterBusinessCategory').val() || '').trim(),
                search: $('#filterSearch').val().trim(),
            });
            if (this.sortBy) {
                params.append('sortBy', this.sortBy);
                params.append('sortDirection', this.sortDirection);
            }

            fetch('/api/cms-admin/asset-requests?' + params)
                .then(r => r.json())
                .then(res => {
                    if (!res.success) { Toast.error(res.message); return; }
                    const pageData = res.data;
                    this.totalItems = pageData.totalElements;
                    this.renderTable(pageData.content);
                    this.renderPagination();
                    this.updateSortIndicators();
                })
                .catch(() => Toast.error('목록 조회 중 오류가 발생했습니다.'));
        },

        loadCategories: function() {
            if (this.categoryOptionsLoaded) return Promise.resolve();

            return fetch('/api/cms-admin/asset-categories')
                .then(r => r.json())
                .then(res => {
                    if (!res.success || !Array.isArray(res.data)) return;

                    const searchSelect = $('#filterBusinessCategory');
                    const uploadSelect = $('#assetUploadCategory');

                    searchSelect.find('option:not(:first)').remove();
                    uploadSelect.empty();

                    res.data.forEach(item => {
                        this.categoryMap[item.code] = item.codeName;
                        searchSelect.append(`<option value="${HtmlUtils.escape(item.code)}">${HtmlUtils.escape(item.codeName)}</option>`);
                        uploadSelect.append(`<option value="${HtmlUtils.escape(item.code)}">${HtmlUtils.escape(item.codeName)}</option>`);
                    });

                    uploadSelect.val('COMMON');
                    this.categoryOptionsLoaded = true;
                })
                .catch(() => {});
        },

        attachSortHandlers: function() {
            $('#assetRequestTable thead th[data-sort]').addClass('sortable cursor-pointer');
            $(document)
                .off('click.cmsAssetRequestSort', '#assetRequestTable thead th[data-sort]')
                .on('click.cmsAssetRequestSort', '#assetRequestTable thead th[data-sort]', function() {
                    const sortKey = $(this).data('sort');
                    if (!sortKey) return;

                    if (CmsAssetRequestPage.sortBy === sortKey) {
                        if (CmsAssetRequestPage.sortDirection === 'ASC') {
                            CmsAssetRequestPage.sortDirection = 'DESC';
                        } else {
                            CmsAssetRequestPage.sortBy = null;
                            CmsAssetRequestPage.sortDirection = null;
                        }
                    } else {
                        CmsAssetRequestPage.sortBy = sortKey;
                        CmsAssetRequestPage.sortDirection = 'ASC';
                    }

                    CmsAssetRequestPage.updateSortIndicators();
                    CmsAssetRequestPage.load(1);
                });
        },

        updateSortIndicators: function() {
            const headers = $('#assetRequestTable thead th.sortable');
            headers.removeClass('sort-asc sort-desc');
            if (!this.sortBy || !this.sortDirection) return;

            headers.filter(`[data-sort="${this.sortBy}"]`)
                .addClass(this.sortDirection === 'ASC' ? 'sort-asc' : 'sort-desc');
        },

        renderTable: function(rows) {
            const $tbody = $('#assetRequestTableBody');
            if (!rows || rows.length === 0) {
                $tbody.html('<tr><td colspan="7" class="text-center py-4 text-body-secondary">조회된 데이터가 없습니다.</td></tr>');
                return;
            }

            const html = rows.map(row => {
                const badge = this.STATE_BADGE[row.assetState] || HtmlUtils.escape(row.assetState || '');
                const aid = HtmlUtils.escape(row.assetId);
                const fileSize = this._formatFileSize(row.fileSize);
                const categoryName = row.businessCategoryName || this.categoryMap[row.businessCategory] || row.businessCategory || '-';

                let tdAction = '-';
                if (window.HAS_CMS_WRITE) {
                    const btnDelete = `<button class="btn btn-outline-danger btn-xs" onclick="CmsAssetRequestPage.deleteAsset('${aid}')">삭제</button>`;
                    if (row.assetState === 'WORK') {
                        const btnRequest = `<button class="btn btn-primary btn-xs" onclick="CmsAssetRequestPage.requestApproval('${aid}')">승인요청</button>`;
                        tdAction = `<div class="d-inline-flex gap-1 text-nowrap">${btnRequest}${btnDelete}</div>`;
                    } else if (row.assetState === 'REJECTED') {
                        tdAction = btnDelete;
                    }
                }

                return `<tr>
                    <td class="text-center">
                        <img src="/api/cms-admin/asset-approvals/${aid}/image"
                             alt="${HtmlUtils.escape(row.assetName || '')}" class="asset-thumb"
                             onerror="this.onerror=null;this.src='${this.PLACEHOLDER_SRC}'"/>
                    </td>
                    <td>${HtmlUtils.escape(row.assetName || '')}</td>
                    <td>${HtmlUtils.escape(categoryName)}</td>
                    <td class="small">
                        <div>${HtmlUtils.escape(row.mimeType || '-')}</div>
                        <div class="text-body-secondary">${fileSize}</div>
                    </td>
                    <td class="text-center">${badge}</td>
                    <td class="text-center small">${HtmlUtils.escape(row.createDate || '-')}</td>
                    <td class="text-center">${tdAction}</td>
                </tr>`;
            }).join('');

            $tbody.html(html);
        },

        renderPagination: function() {
            const totalPages = Math.ceil(this.totalItems / this.itemsPerPage);
            const pagination = $('#pagination');
            pagination.empty();

            pagination.append(`
                <li class="page-item ${this.currentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="CmsAssetRequestPage.changePage(1); return false;"><i class="bi bi-chevron-double-left"></i></a>
                </li>
                <li class="page-item ${this.currentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="CmsAssetRequestPage.changePage(${this.currentPage - 1}); return false;"><i class="bi bi-chevron-left"></i></a>
                </li>
            `);

            const maxButtons = 5;
            let startPage = Math.max(1, this.currentPage - Math.floor(maxButtons / 2));
            let endPage = Math.min(totalPages, startPage + maxButtons - 1);
            if (endPage - startPage + 1 < maxButtons) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }

            for (let i = startPage; i <= endPage; i++) {
                pagination.append(`
                    <li class="page-item ${i === this.currentPage ? 'active' : ''}">
                        <a class="page-link" href="#" onclick="CmsAssetRequestPage.changePage(${i}); return false;">${i}</a>
                    </li>
                `);
            }

            pagination.append(`
                <li class="page-item ${this.currentPage === totalPages || totalPages === 0 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="CmsAssetRequestPage.changePage(${this.currentPage + 1}); return false;"><i class="bi bi-chevron-right"></i></a>
                </li>
                <li class="page-item ${this.currentPage === totalPages || totalPages === 0 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="CmsAssetRequestPage.changePage(${totalPages}); return false;"><i class="bi bi-chevron-double-right"></i></a>
                </li>
            `);

            const start = this.totalItems === 0 ? 0 : (this.currentPage - 1) * this.itemsPerPage + 1;
            const end = Math.min(this.currentPage * this.itemsPerPage, this.totalItems);
            $('#pageInfo').text(`${start} - ${end} of ${this.totalItems} items`);
        },

        changePage: function(page) {
            const totalPages = Math.ceil(this.totalItems / this.itemsPerPage);
            if (page < 1 || page > totalPages) return;
            this.currentPage = page;
            this.load();
        },

        reset: function() {
            $('#filterAssetState').val('');
            $('#filterBusinessCategory').val('');
            $('#filterSearch').val('');
            this.sortBy = null;
            this.sortDirection = null;
            this.updateSortIndicators();
            this.itemsPerPage = parseInt($('#limitRows').val()) || 10;
            this.load(1);
        },

        requestApproval: function(assetId) {
            if (!confirm('해당 이미지를 승인 요청하시겠습니까?')) return;

            fetch(`/api/cms-admin/asset-requests/${encodeURIComponent(assetId)}/request`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
            })
                .then(r => r.json())
                .then(res => {
                    if (res.success) { Toast.success(res.message); this.load(); }
                    else { Toast.error(res.message); }
                })
                .catch(() => Toast.error('승인 요청 처리 중 오류가 발생했습니다.'));
        },

        deleteAsset: function(assetId) {
            if (!confirm('해당 이미지를 삭제하시겠습니까?\n삭제 후에는 복구할 수 없습니다.')) return;

            fetch(`/api/cms-admin/asset-requests/${encodeURIComponent(assetId)}`, {
                method: 'DELETE',
            })
                .then(r => r.json().then(body => ({ status: r.status, body })))
                .then(({ status, body }) => {
                    if (status >= 200 && status < 300 && body.success) {
                        Toast.success(body.message || '이미지가 삭제되었습니다.');
                        this.load();
                    } else {
                        Toast.error(body.message || '이미지 삭제 중 오류가 발생했습니다.');
                    }
                })
                .catch(() => Toast.error('이미지 삭제 중 오류가 발생했습니다.'));
        },

        _formatFileSize: function(bytes) {
            if (bytes == null) return '-';
            const units = ['B', 'KB', 'MB', 'GB'];
            let idx = 0;
            let value = bytes;
            while (value >= 1024 && idx < units.length - 1) {
                value /= 1024;
                idx++;
            }
            return value.toFixed(idx === 0 ? 0 : 1) + ' ' + units[idx];
        },
    };

    $(document).ready(function() {
        CmsAssetRequestPage.itemsPerPage = parseInt($('#limitRows').val()) || 10;
        CmsAssetRequestPage.attachSortHandlers();
        CmsAssetRequestPage.loadCategories().finally(() => CmsAssetRequestPage.load(1));

        $('#limitRows').on('change', function() {
            CmsAssetRequestPage.itemsPerPage = parseInt($(this).val()) || 10;
            CmsAssetRequestPage.load(1);
        });

        if (window.HAS_CMS_WRITE) {
            CmsAssetUploadModal.init();
        }
    });

    window.CmsAssetUploadModal = {
        MAX_FILE_SIZE: 20 * 1024 * 1024,
        ALLOWED_MIME: ['image/png', 'image/jpeg', 'image/gif', 'image/webp'],
        selectedFile: null,

        init: function() {
            this._bindOpenButton();
            this._bindDropzone();
            this._bindFileInput();
            this._bindSubmit();
            this._bindClear();
        },

        _bindOpenButton: function() {
            $(document).off('click.assetUploadOpen', '#btnOpenAssetUpload')
                .on('click.assetUploadOpen', '#btnOpenAssetUpload', () => this.open());
        },

        _bindDropzone: function() {
            const $dz = $('#assetUploadDropzone');
            $dz.off('click.assetUpload').on('click.assetUpload', () => {
                const input = document.getElementById('assetUploadFileInput');
                if (input) input.click();
            });
            $dz.off('dragover.assetUpload').on('dragover.assetUpload', (e) => {
                e.preventDefault();
                e.stopPropagation();
                $dz.addClass('is-dragover');
            });
            $dz.off('dragleave.assetUpload').on('dragleave.assetUpload', () => $dz.removeClass('is-dragover'));
            $dz.off('drop.assetUpload').on('drop.assetUpload', (e) => {
                e.preventDefault();
                e.stopPropagation();
                $dz.removeClass('is-dragover');
                const files = e.originalEvent.dataTransfer && e.originalEvent.dataTransfer.files;
                if (files && files.length > 0) {
                    this._onFileSelected(files[0]);
                }
            });
        },

        _bindFileInput: function() {
            $('#assetUploadFileInput').off('change.assetUpload').on('change.assetUpload', (e) => {
                if (e.target.files && e.target.files.length > 0) {
                    this._onFileSelected(e.target.files[0]);
                }
            });
        },

        _bindSubmit: function() {
            $('#btnAssetUploadSubmit').off('click.assetUpload').on('click.assetUpload', () => this._submit());
        },

        _bindClear: function() {
            $('#btnAssetUploadClear').off('click.assetUpload').on('click.assetUpload', () => this._clearFile());
        },

        open: function() {
            this._clearFile();
            $('#assetUploadName').val('');
            $('#assetUploadCategory').val('COMMON');
            $('#assetUploadDesc').val('');
            new bootstrap.Modal('#assetUploadModal').show();
        },

        _onFileSelected: function(file) {
            if (!this.ALLOWED_MIME.includes(file.type)) {
                Toast.error('지원되지 않는 파일 형식입니다. (PNG, JPG, JPEG, GIF, WebP)');
                return;
            }
            if (file.size > this.MAX_FILE_SIZE) {
                Toast.error('파일 크기는 20MB 이하로 업로드해 주세요.');
                return;
            }

            this.selectedFile = file;
            $('#assetUploadPreviewWrap').removeClass('d-none');
            $('#assetUploadPreviewName').text(file.name);
            $('#assetUploadPreviewSize').text(this._formatSize(file.size));
            $('#assetUploadPreviewType').text(file.type);

            // 파일 선택 시 이미지명 input에 원본 파일명 자동 채우기 (사용자가 직접 수정 가능)
            $('#assetUploadName').val(file.name);

            const reader = new FileReader();
            reader.onload = (ev) => $('#assetUploadPreview').attr('src', ev.target.result);
            reader.readAsDataURL(file);

            $('#btnAssetUploadSubmit').prop('disabled', false);
        },

        _clearFile: function() {
            this.selectedFile = null;
            $('#assetUploadFileInput').val('');
            $('#assetUploadPreviewWrap').addClass('d-none');
            $('#assetUploadPreview').attr('src', '');
            // 파일 초기화 시 이미지명도 함께 초기화
            $('#assetUploadName').val('');
            $('#btnAssetUploadSubmit').prop('disabled', true);
        },

        _submit: function() {
            if (!this.selectedFile) {
                Toast.warning('업로드할 파일을 선택해 주세요.');
                return;
            }

            // 이미지명: 사용자 입력값 우선, 비어 있으면 원본 파일명 사용
            const inputName = $('#assetUploadName').val().trim();
            const assetName = inputName || this.selectedFile.name;

            const fd = new FormData();
            fd.append('file', this.selectedFile);
            // 원본 파일의 확장자를 보존하여 확장자 위장 방지
            const ext = this.selectedFile.name.includes('.')
                ? '.' + this.selectedFile.name.split('.').pop()
                : '';
            const nameWithoutExt = assetName.endsWith(ext) ? assetName : assetName.replace(/\.[^.]+$/, '') + ext;
            fd.append('assetName', nameWithoutExt || this.selectedFile.name);
            fd.append('businessCategory', (($('#assetUploadCategory').val() || 'COMMON').trim() || 'COMMON'));

            const desc = $('#assetUploadDesc').val().trim();
            if (desc) fd.append('assetDesc', desc);

            this._setSubmitting(true);

            fetch('/api/cms-admin/asset-uploads', {
                method: 'POST',
                body: fd,
            })
                .then(r => r.json().then(body => ({ status: r.status, body })))
                .then(({ status, body }) => {
                    if (status >= 200 && status < 300 && body.success) {
                        Toast.success(body.message || '업로드가 완료되었습니다.');
                        bootstrap.Modal.getInstance('#assetUploadModal').hide();
                        CmsAssetRequestPage.load(1);
                    } else {
                        Toast.error(body.message || '업로드 처리 중 오류가 발생했습니다.');
                    }
                })
                .catch(() => Toast.error('업로드 처리 중 오류가 발생했습니다.'))
                .finally(() => this._setSubmitting(false));
        },

        _setSubmitting: function(submitting) {
            $('#btnAssetUploadSubmit').prop('disabled', submitting || !this.selectedFile);
            $('#assetUploadSpinner').toggleClass('d-none', !submitting);
        },

        _formatSize: function(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        },
    };
</script>
</th:block>
</body>
</html>
