<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="script">
<script th:inline="javascript">
window.OrgCodePage = {
    // 페이지 상태
    currentPage: 1,
    totalPages: 1,
    totalItems: 0,
    pageSize: 10,
    searchOrgId: '',
    searchCodeGroupId: '',
    // 정렬 상태
    sortField: null,
    sortDir: null,
    currentData: [],
    // 팝업 상태
    popupOrgId: '',
    popupCodeGroupId: '',
    popupOrgName: '',
    popupCodeGroupName: '',
    popupRows: [],
    popupSortField: null,
    popupSortDir: null,
    modalMode: 'register',  // 'register' | 'edit'

    init() {
        this.loadOrgs();
        this.loadCodeGroups();
        this.bindEvents();
        this.search();
    },

    bindEvents() {
        // 등록 버튼
        document.getElementById('btnOrgCodeRegister').addEventListener('click', () => this.openRegisterModal());

        // 모달 닫기 (btnCloseOrgCodeModal handled by data-bs-dismiss="modal")
        document.getElementById('btnCancelOrgCode').addEventListener('click', () => this.closeModal());

        // 팝업 저장
        document.getElementById('btnSaveOrgCode').addEventListener('click', () => this.saveAll());

        // 팝업 선택행 삭제
        document.getElementById('btnDeleteSelected').addEventListener('click', () => this.deleteSelected());

        // 팝업 전체 체크박스
        document.getElementById('popupCheckAll').addEventListener('change', (e) => {
            document.querySelectorAll('#orgCodePopupTbody .popup-row-check').forEach(cb => {
                cb.checked = e.target.checked;
            });
        });

        // 팝업 기관/코드그룹 드롭다운 변경
        document.getElementById('modalOrgSelect').addEventListener('change', () => {
            const sel = document.getElementById('modalOrgSelect');
            this.popupOrgId = sel.value;
            this.popupOrgName = sel.selectedOptions[0]?.text || sel.value;
            this.loadPopupData();
        });
        document.getElementById('modalCodeGroupSelect').addEventListener('change', () => {
            const sel = document.getElementById('modalCodeGroupSelect');
            this.popupCodeGroupId = sel.value;
            this.popupCodeGroupName = sel.selectedOptions[0]?.text || sel.value;
            this.loadPopupData();
        });

        // 메인 테이블 정렬 — 이벤트 위임
        document.querySelector('#orgCodeTable thead').addEventListener('click', (e) => {
            const th = e.target.closest('th[data-sort]');
            if (th) this.sortBy(th.dataset.sort);
        });

        // 팝업 테이블 정렬 — 이벤트 위임
        document.querySelector('#orgCodePopupTable thead').addEventListener('click', (e) => {
            const th = e.target.closest('th[data-sort]');
            if (th) this.popupSortBy(th.dataset.sort);
        });

        // 팝업 그리드 인풋 이벤트 위임
        document.getElementById('orgCodePopupTbody').addEventListener('input', (e) => {
            const input = e.target;
            const tr = input.closest('tr');
            if (!tr) return;
            const rowIdx = parseInt(tr.dataset.rowIdx);
            if (isNaN(rowIdx)) return;
            const row = this.popupRows[rowIdx];
            if (!row) return;

            if (input.classList.contains('popup-org-code')) {
                const newVal = input.value.trim();
                if (row.existingMapping) {
                    if (newVal === '') {
                        row.crudType = 'D';
                        tr.classList.add('deleted');
                        tr.classList.remove('changed');
                    } else if (newVal !== row.oldOrgCode) {
                        row.crudType = 'U';
                        row.orgCode = newVal;
                        tr.classList.add('changed');
                        tr.classList.remove('deleted');
                    } else {
                        row.crudType = 'N';
                        row.orgCode = newVal;
                        tr.classList.remove('changed', 'deleted');
                    }
                } else {
                    if (newVal !== '') {
                        row.crudType = 'C';
                        row.orgCode = newVal;
                        tr.classList.add('changed');
                        tr.classList.remove('deleted');
                    } else {
                        row.crudType = 'N';
                        row.orgCode = '';
                        tr.classList.remove('changed', 'deleted');
                    }
                }
                this._updateCrudCell(tr, row.crudType);
            } else if (input.classList.contains('popup-priority')) {
                row.priority = input.value.trim() || '1';
                if (row.existingMapping && row.crudType === 'N') {
                    row.crudType = 'U';
                    tr.classList.add('changed');
                }
                this._updateCrudCell(tr, row.crudType);
            }
        });

        // 건씩 변경
        document.getElementById('limitRows').addEventListener('change', (e) => {
            this.pageSize = parseInt(e.target.value) || 20;
            this.search(1);
        });

        // 엑셀/출력/새로고침
        document.getElementById('btnExcel').addEventListener('click', () => this.exportExcel());
        document.getElementById('btnPrint').addEventListener('click', () => this.print());
        document.getElementById('btnRefresh').addEventListener('click', () => this.search(this.currentPage));
    },

    _updateCrudCell(tr, crudType) {
        const cell = tr.querySelector('.crud-cell');
        if (!cell) return;
        const labels = { C: '생성', U: '수정', D: '삭제' };
        cell.textContent = labels[crudType] || '';
        cell.className = 'crud-cell' + (crudType !== 'N' ? ' crud-' + crudType : '');
    },

    // ────────────────────────────────────────────
    // 드롭다운 로드
    // ────────────────────────────────────────────

    loadOrgs() {
        $.ajax({
            url: API_BASE_URL + '/orgs/list',
            method: 'GET',
            success: (response) => {
                if (response.success && response.data) {
                    const mainSel = document.getElementById('orgCodeOrgSelect');
                    const modalSel = document.getElementById('modalOrgSelect');
                    response.data.forEach(org => {
                        const text = org.orgName ? (org.orgId + ' - ' + org.orgName) : org.orgId;
                        mainSel.appendChild(new Option(text, org.orgId));
                        modalSel.appendChild(new Option(text, org.orgId));
                    });
                }
            },
            error: (xhr) => console.error('기관 목록 조회 실패:', xhr)
        });
    },

    loadCodeGroups() {
        $.ajax({
            url: API_BASE_URL + '/code-groups',
            method: 'GET',
            success: (response) => {
                if (response.success && response.data) {
                    const mainSel = document.getElementById('orgCodeGroupSelect');
                    const modalSel = document.getElementById('modalCodeGroupSelect');
                    response.data.forEach(g => {
                        const text = g.codeGroupName ? (g.codeGroupId + ' - ' + g.codeGroupName) : g.codeGroupId;
                        mainSel.appendChild(new Option(text, g.codeGroupId));
                        modalSel.appendChild(new Option(text, g.codeGroupId));
                    });
                }
            },
            error: (xhr) => console.error('코드그룹 목록 조회 실패:', xhr)
        });
    },

    // ────────────────────────────────────────────
    // 메인: 목록 조회
    // ────────────────────────────────────────────

    search(page) {
        this.searchOrgId = document.getElementById('orgCodeOrgSelect').value;
        this.searchCodeGroupId = document.getElementById('orgCodeGroupSelect').value;
        this.currentPage = page || 1;

        $.ajax({
            url: API_BASE_URL + '/org-codes',
            method: 'GET',
            data: {
                orgId: this.searchOrgId || '',
                codeGroupId: this.searchCodeGroupId || '',
                page: this.currentPage,
                size: this.pageSize
            },
            success: (response) => {
                if (response.success && response.data != null) {
                    this.currentData = response.data.content || [];
                    this.totalItems = response.data.totalElements || 0;
                    this.totalPages = response.data.totalPages || 1;
                } else {
                    this.currentData = [];
                    this.totalItems = 0;
                    this.totalPages = 1;
                }
                this.renderList(this.currentData);
                this.renderPagination();
            },
            error: (xhr) => {
                console.error('코드 맵핑 목록 조회 실패:', xhr);
                Toast.error(xhr.responseJSON?.message || '조회 중 오류가 발생했습니다.');
            }
        });
    },

    // ────────────────────────────────────────────
    // 정렬
    // ────────────────────────────────────────────

    _getSortedData(rows) {
        if (!this.sortField || !this.sortDir) return rows;
        return [...rows].sort((a, b) => {
            const va = (a[this.sortField] ?? '').toString().toLowerCase();
            const vb = (b[this.sortField] ?? '').toString().toLowerCase();
            // 숫자형 필드(priority)는 숫자 비교
            if (this.sortField === 'priority') {
                const na = parseFloat(a[this.sortField]) || 0;
                const nb = parseFloat(b[this.sortField]) || 0;
                return this.sortDir === 'asc' ? na - nb : nb - na;
            }
            if (va < vb) return this.sortDir === 'asc' ? -1 : 1;
            if (va > vb) return this.sortDir === 'asc' ? 1 : -1;
            return 0;
        });
    },

    sortBy(field) {
        if (this.sortField !== field) {
            this.sortField = field;
            this.sortDir = 'asc';
        } else if (this.sortDir === 'asc') {
            this.sortDir = 'desc';
        } else {
            this.sortField = null;
            this.sortDir = null;
        }
        this.updateSortIcons();
        this.renderList(this.currentData);
    },

    updateSortIcons() {
        document.querySelectorAll('#orgCodeTable thead th.sortable').forEach(th => {
            th.classList.remove('sort-asc', 'sort-desc');
            if (th.dataset.sort === this.sortField) {
                th.classList.add(this.sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
            }
        });
    },

    // ────────────────────────────────────────────
    // 팝업 정렬
    // ────────────────────────────────────────────

    popupSortBy(field) {
        if (this.popupSortField !== field) {
            this.popupSortField = field;
            this.popupSortDir = 'asc';
        } else if (this.popupSortDir === 'asc') {
            this.popupSortDir = 'desc';
        } else {
            this.popupSortField = null;
            this.popupSortDir = null;
        }
        this.renderPopupGrid(this.popupRows);
    },

    updatePopupSortIcons() {
        document.querySelectorAll('#orgCodePopupTable thead th.sortable').forEach(th => {
            th.classList.remove('sort-asc', 'sort-desc');
            if (th.dataset.sort === this.popupSortField) {
                th.classList.add(this.popupSortDir === 'asc' ? 'sort-asc' : 'sort-desc');
            }
        });
    },

    _getSortedPopupIndices(rows) {
        const indices = rows.map((_, i) => i);
        if (!this.popupSortField || !this.popupSortDir) return indices;
        const field = this.popupSortField;
        const dir = this.popupSortDir;

        return indices.sort((a, b) => {
            const ra = rows[a], rb = rows[b];
            let va, vb;

            if (field === 'crudType') {
                const order = { N: 0, C: 1, U: 2, D: 3 };
                va = order[ra.crudType] ?? 0;
                vb = order[rb.crudType] ?? 0;
            } else if (field === 'priority') {
                va = parseFloat(ra.priority) || 0;
                vb = parseFloat(rb.priority) || 0;
            } else {
                va = (ra[field] ?? '').toString().toLowerCase();
                vb = (rb[field] ?? '').toString().toLowerCase();
            }

            if (va < vb) return dir === 'asc' ? -1 : 1;
            if (va > vb) return dir === 'asc' ? 1 : -1;
            return 0;
        });
    },

    // ────────────────────────────────────────────
    // 렌더링
    // ────────────────────────────────────────────

    renderList(rows) {
        const tbody = document.getElementById('orgCodeTableBody');
        const sorted = this._getSortedData(rows);
        if (!sorted || sorted.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="sp-empty-state">등록된 맵핑이 없습니다</td></tr>';
            return;
        }
        tbody.innerHTML = sorted.map((r, idx) => `
            <tr data-row-idx="${idx}" onclick="OrgCodePage.openEditModal(${idx})">
                <td>${HtmlUtils.escape(r.codeGroupId)}</td>
                <td>${HtmlUtils.escape(r.codeGroupName || '')}</td>
                <td>${HtmlUtils.escape(r.code)}</td>
                <td>${HtmlUtils.escape(r.codeName || '')}</td>
                <td>${HtmlUtils.escape(r.orgCode)}</td>
                <td class="text-center">${HtmlUtils.escape(r.priority || '1')}</td>
                <td>${HtmlUtils.escape(r.orgName || r.orgId)}</td>
            </tr>`).join('');
    },

    renderPagination() {
        const totalPages = this.totalPages || 1;
        const total = this.totalItems || 0;

        const pagination = document.getElementById('pagination');
        pagination.innerHTML = '';

        const addLi = (html, disabled, active) => {
            const li = document.createElement('li');
            li.className = 'page-item' + (disabled ? ' disabled' : '') + (active ? ' active' : '');
            li.innerHTML = html;
            pagination.appendChild(li);
        };

        const cp = this.currentPage;
        addLi(`<a class="page-link" href="#" onclick="OrgCodePage.search(1);return false;"><i class="bi bi-chevron-double-left"></i></a>`, cp === 1);
        addLi(`<a class="page-link" href="#" onclick="OrgCodePage.search(${cp - 1});return false;"><i class="bi bi-chevron-left"></i></a>`, cp === 1);

        const maxBtns = 5;
        let start = Math.max(1, cp - Math.floor(maxBtns / 2));
        let end = Math.min(totalPages, start + maxBtns - 1);
        if (end - start + 1 < maxBtns) start = Math.max(1, end - maxBtns + 1);

        for (let i = start; i <= end; i++) {
            addLi(`<a class="page-link" href="#" onclick="OrgCodePage.search(${i});return false;">${i}</a>`, false, i === cp);
        }

        addLi(`<a class="page-link" href="#" onclick="OrgCodePage.search(${cp + 1});return false;"><i class="bi bi-chevron-right"></i></a>`, cp === totalPages || totalPages === 0);
        addLi(`<a class="page-link" href="#" onclick="OrgCodePage.search(${totalPages});return false;"><i class="bi bi-chevron-double-right"></i></a>`, cp === totalPages || totalPages === 0);

        const s = total === 0 ? 0 : (cp - 1) * this.pageSize + 1;
        const e = Math.min(cp * this.pageSize, total);
        document.getElementById('pageInfo').textContent = `${s} - ${e} of ${total} items`;
    },

    // ────────────────────────────────────────────
    // 팝업: 열기/닫기
    // ────────────────────────────────────────────

    openRegisterModal() {
        this.modalMode = 'register';
        this.popupRows = [];
        this.popupOrgId = '';
        this.popupCodeGroupId = '';
        this.popupOrgName = '';
        this.popupCodeGroupName = '';
        this.popupSortField = null;
        this.popupSortDir = null;

        document.getElementById('ocModalTitle').textContent = '코드 맵핑 등록';
        document.getElementById('oc-modal-select-row').classList.remove('d-hidden');
        document.getElementById('oc-modal-info-row').classList.add('d-hidden');
        document.getElementById('modalOrgSelect').value = '';
        document.getElementById('modalCodeGroupSelect').value = '';
        document.getElementById('popupCheckAll').checked = false;
        document.getElementById('orgCodePopupTbody').innerHTML =
            '<tr><td colspan="9" class="sp-empty-state">기관과 코드그룹을 선택하세요</td></tr>';

        bootstrap.Modal.getOrCreateInstance(document.getElementById('orgCodeRegisterModal')).show();
    },

    openEditModal(idx) {
        const sorted = this._getSortedData(this.currentData);
        const r = sorted[idx];
        if (!r) return;

        this.modalMode = 'edit';
        this.popupRows = [];
        this.popupOrgId = r.orgId;
        this.popupCodeGroupId = r.codeGroupId;
        this.popupOrgName = r.orgName || r.orgId;
        this.popupCodeGroupName = r.codeGroupName || r.codeGroupId;
        this.popupSortField = null;
        this.popupSortDir = null;

        document.getElementById('ocModalTitle').textContent = '코드 맵핑 수정';
        document.getElementById('oc-modal-select-row').classList.add('d-hidden');
        document.getElementById('oc-modal-info-row').classList.remove('d-hidden');
        document.getElementById('oc-modal-org-label').textContent = this.popupOrgName;
        document.getElementById('oc-modal-cg-label').textContent = this.popupCodeGroupName;
        document.getElementById('popupCheckAll').checked = false;
        document.getElementById('orgCodePopupTbody').innerHTML =
            '<tr><td colspan="9" class="sp-empty-state">데이터 로딩 중...</td></tr>';

        bootstrap.Modal.getOrCreateInstance(document.getElementById('orgCodeRegisterModal')).show();
        this.loadPopupData();
    },

    closeModal() {
        bootstrap.Modal.getInstance(document.getElementById('orgCodeRegisterModal')).hide();
        document.getElementById('popupCheckAll').checked = false;
    },

    // ────────────────────────────────────────────
    // 팝업: 데이터 로드
    // ────────────────────────────────────────────

    loadPopupData() {
        if (!this.popupOrgId || !this.popupCodeGroupId) {
            document.getElementById('orgCodePopupTbody').innerHTML =
                '<tr><td colspan="9" class="sp-empty-state">기관과 코드그룹을 선택하세요</td></tr>';
            return;
        }

        $.ajax({
            url: API_BASE_URL + '/org-codes/popup-data',
            method: 'GET',
            data: { codeGroupId: this.popupCodeGroupId, orgId: this.popupOrgId },
            success: (response) => {
                if (response.success && response.data != null) {
                    this.popupRows = response.data.map(r => ({
                        code: r.code,
                        codeName: r.codeName,
                        orgCode: r.orgCode || '',
                        oldOrgCode: r.orgCode || '',
                        priority: r.priority || '1',
                        crudType: 'N',
                        existingMapping: r.existingMapping || false
                    }));
                    this.renderPopupGrid(this.popupRows);
                }
            },
            error: (xhr) => {
                console.error('팝업 데이터 조회 실패:', xhr);
                Toast.error(xhr.responseJSON?.message || '조회 중 오류가 발생했습니다.');
            }
        });
    },

    renderPopupGrid(rows) {
        const tbody = document.getElementById('orgCodePopupTbody');
        if (!rows || rows.length === 0) {
            tbody.innerHTML = '<tr><td colspan="9" class="sp-empty-state">코드가 없습니다</td></tr>';
            this.updatePopupSortIcons();
            return;
        }
        const sortedIndices = this._getSortedPopupIndices(rows);
        const cgId = HtmlUtils.escape(this.popupCodeGroupId);
        const cgName = HtmlUtils.escape(this.popupCodeGroupName);
        const orgName = HtmlUtils.escape(this.popupOrgName);
        const crudLabels = { C: '생성', U: '수정', D: '삭제' };
        tbody.innerHTML = sortedIndices.map(idx => {
            const r = rows[idx];
            const crudLabel = crudLabels[r.crudType] || '';
            const crudClass = r.crudType !== 'N' ? ' crud-' + r.crudType : '';
            const rowClass = r.crudType === 'D' ? 'deleted' : (r.crudType === 'C' || r.crudType === 'U') ? 'changed' : '';
            return `
            <tr data-row-idx="${idx}" data-code="${HtmlUtils.escape(r.code)}"${rowClass ? ' class="' + rowClass + '"' : ''}>
                <td class="text-center"><input type="checkbox" class="popup-row-check"></td>
                <td class="crud-cell${crudClass}">${crudLabel}</td>
                <td>${cgId}</td>
                <td>${cgName}</td>
                <td>${HtmlUtils.escape(r.code)}</td>
                <td>${HtmlUtils.escape(r.codeName)}</td>
                <td>${orgName}</td>
                <td>
                    <input type="text" class="popup-priority sp-oc-popup-priority"
                           value="${HtmlUtils.escape(r.priority || '1')}">
                </td>
                <td>
                    <input type="text" class="popup-org-code${r.existingMapping ? ' sp-oc-popup-orgcode-existing' : ''}"
                           value="${HtmlUtils.escape(r.orgCode)}"
                           placeholder="기관코드 입력">
                </td>
            </tr>`;
        }).join('');
        this.updatePopupSortIcons();
    },

    deleteSelected() {
        document.querySelectorAll('#orgCodePopupTbody tr').forEach(tr => {
            const cb = tr.querySelector('.popup-row-check');
            if (!cb || !cb.checked) return;
            const rowIdx = parseInt(tr.dataset.rowIdx);
            if (isNaN(rowIdx)) return;
            const row = this.popupRows[rowIdx];
            if (!row) return;

            if (row.existingMapping) {
                row.crudType = 'D';
                tr.classList.add('deleted');
                tr.classList.remove('changed');
                this._updateCrudCell(tr, 'D');
            } else {
                row.crudType = 'N';
                row.orgCode = '';
                tr.classList.remove('changed', 'deleted');
                const input = tr.querySelector('.popup-org-code');
                if (input) input.value = '';
                this._updateCrudCell(tr, 'N');
            }
            cb.checked = false;
        });
        document.getElementById('popupCheckAll').checked = false;
    },

    // ────────────────────────────────────────────
    // 팝업: 저장
    // ────────────────────────────────────────────

    saveAll() {
        if (!this.popupOrgId) {
            Toast.warning('기관을 선택해주세요.');
            return;
        }
        if (!this.popupCodeGroupId) {
            Toast.warning('코드그룹을 선택해주세요.');
            return;
        }

        const changedRows = this.popupRows
            .filter(r => r.crudType === 'C' || r.crudType === 'U' || r.crudType === 'D')
            .map(r => ({
                crudType: r.crudType,
                code: r.code,
                orgCode: r.orgCode,
                oldOrgCode: r.oldOrgCode,
                priority: r.priority || '1'
            }));

        if (changedRows.length === 0) {
            Toast.warning('변경된 내용이 없습니다.');
            return;
        }

        $.ajax({
            url: API_BASE_URL + '/org-codes',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({
                orgId: this.popupOrgId,
                codeGroupId: this.popupCodeGroupId,
                rows: changedRows
            }),
            success: (response) => {
                if (response.success) {
                    Toast.success('저장되었습니다.');
                    this.closeModal();
                    this.search(1);
                } else {
                    Toast.error(response.message || '저장에 실패했습니다.');
                }
            },
            error: (xhr) => {
                Toast.error(xhr.responseJSON?.message || '저장 중 오류가 발생했습니다.');
            }
        });
    },

    // ────────────────────────────────────────────
    // 엑셀 / 출력
    // ────────────────────────────────────────────

    exportExcel() {
        if (!this.currentData || this.currentData.length === 0) {
            Toast.warning('다운로드할 데이터가 없습니다.');
            return;
        }
        const params = new URLSearchParams();
        const orgId = document.getElementById('orgCodeOrgSelect')?.value || '';
        const codeGroupId = document.getElementById('orgCodeGroupSelect')?.value || '';
        if (orgId) params.set('orgId', orgId);
        if (codeGroupId) params.set('codeGroupId', codeGroupId);
        if (this.sortField) {
            params.set('sortBy', this.sortField);
            params.set('sortDirection', this.sortDir || 'ASC');
        }
        const qs = params.toString();
        window.location.href = '/api/org-codes/export' + (qs ? '?' + qs : '');
    },

    print() {
        const columns = [
            { key: 'codeGroupId', label: '코드그룹ID' },
            { key: 'codeGroupName', label: '코드그룹명' },
            { key: 'code', label: '표준코드' },
            { key: 'codeName', label: '표준코드명' },
            { key: 'orgCode', label: '기관코드' },
            { key: 'priority', label: '우선순위' },
            { key: 'orgId', label: '기관' }
        ];
        const data = this._getSortedData(this.currentData);
        PrintUtil.print({ title: '기관코드맵핑 목록', columns: columns, data: data });
    }
};

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => OrgCodePage.init());
} else {
    OrgCodePage.init();
}

// 캐시에서 복원 시(tab:activated) 기관코드맵핑 목록 최신화
$('[data-tab-page]').off('tab:activated.codeMapping').on('tab:activated.codeMapping', function () {
    OrgCodePage.search();
});
</script>
</th:block>
</body>
</html>
