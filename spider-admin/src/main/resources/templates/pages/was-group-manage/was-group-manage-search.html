<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="search" class="card border p-2 mb-3">
    <div class="d-flex flex-wrap align-items-center gap-2 mb-1 sp-search-row">
        <div class="d-flex align-items-center gap-2 sp-search-fields">
            <div class="sp-search-field-group">
                <label class="form-label mb-0 small fw-medium">WAS 그룹명</label>
                <select id="groupNameSearchType" class="form-select form-select-sm sp-search-type-select">
                    <option value="like">포함</option>
                    <option value="equal">일치</option>
                    <option value="start">시작</option>
                </select>
                <input type="text" id="groupName" class="form-control form-control-sm sp-search-input" />
            </div>

            <div class="sp-search-field-group">
                <label class="form-label mb-0 small fw-medium">WAS 그룹ID</label>
                <select id="groupIdSearchType" class="form-select form-select-sm sp-search-type-select">
                    <option value="like">포함</option>
                    <option value="equal">일치</option>
                    <option value="start">시작</option>
                </select>
                <input type="text" id="groupId" class="form-control form-control-sm sp-search-input" />
            </div>
        </div>

        <div class="d-flex align-items-center gap-2 sp-search-actions">
            <select id="limitRows" class="form-select form-select-sm sp-limit-select">
                <option value="10" selected>10</option>
                <option value="20">20</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
            <span class="sp-search-suffix">건씩</span>
            <button type="button" class="btn btn-sm btn-primary" onclick="FWKM0190.loadWasGroups()">조회</button>
        </div>
    </div>

    <div class="d-flex flex-wrap align-items-center gap-2 mb-1">
        <div class="d-flex align-items-center gap-2 sp-search-fields">
            <div class="sp-search-field-group">
                <label class="form-label mb-0 small fw-medium">WAS 그룹설명</label>
                <select id="groupDescSearchType" class="form-select form-select-sm sp-search-type-select">
                    <option value="like">포함</option>
                    <option value="equal">일치</option>
                    <option value="start">시작</option>
                </select>
                <input type="text" id="groupDesc" class="form-control form-control-sm sp-search-input" />
            </div>
        </div>
    </div>
</div>
</body>
</html>
