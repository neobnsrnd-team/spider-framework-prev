<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="mappingModal">
    <div id="mappingModal" class="modal fade" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered sp-modal-md">
            <div class="modal-content">
        <div class="modal-header py-2">
            <span id="mappingModalTitle">리스너-커넥터 매핑 등록</span>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <div class="modal-body">
            <input type="hidden" id="modalMode" value="create" />
            <input type="hidden" id="originalListenerGwId" value="" />
            <input type="hidden" id="originalListenerSystemId" value="" />
            <input type="hidden" id="originalIdentifier" value="" />

            <div class="card border p-2 mb-2">
                <div class="d-flex flex-wrap align-items-center gap-2 mb-1">
                    <div class="col-auto flex-grow-1 gap-2">
                        <label class="form-label mb-0 small fw-medium required">리스너 GATEWAY</label>
                        <select id="modalListenerGwId" class="form-select form-select-sm col-w-300">
                            <option value="">선택하세요</option>
                        </select>
                    </div>
                    <div class="col-auto flex-grow-1 gap-2">
                        <label class="form-label mb-0 small fw-medium required">리스너 SYSTEM_ID</label>
                        <select id="modalListenerSystemId" class="form-select form-select-sm col-w-250">
                            <option value="">선택하세요</option>
                        </select>
                    </div>
                </div>

                <div class="d-flex flex-wrap align-items-center gap-2 mb-1">
                    <div class="col-auto flex-grow-1 gap-2">
                        <label class="form-label mb-0 small fw-medium required">응답커넥터 GATEWAY</label>
                        <select id="modalConnectorGwId" class="form-select form-select-sm col-w-300">
                            <option value="">선택하세요</option>
                        </select>
                    </div>
                    <div class="col-auto flex-grow-1 gap-2">
                        <label class="form-label mb-0 small fw-medium required">응답커넥터 SYSTEM_ID</label>
                        <select id="modalConnectorSystemId" class="form-select form-select-sm col-w-250">
                            <option value="">선택하세요</option>
                        </select>
                    </div>
                </div>

                <div class="d-flex flex-wrap align-items-center gap-2 mb-1">
                    <div class="col-auto flex-grow-1 gap-2" style="flex-basis:0">
                        <label class="form-label mb-0 small fw-medium required">식별자</label>
                        <input id="modalIdentifier" type="text" class="form-control form-control-sm"
                               maxlength="100" placeholder="필수">
                    </div>
                    <div class="col-auto flex-grow-1 gap-2" style="flex-basis:0">
                        <label class="form-label mb-0 small fw-medium">설명</label>
                        <input id="modalDescription" type="text" class="form-control form-control-sm"
                               maxlength="200" placeholder="선택">
                    </div>
                </div>
            </div>
        </div>

        <div class="modal-footer py-2 modal-actions">
            <div class="modal-actions-left">
                <button type="button" class="btn btn-danger btn-sm d-hidden" id="modalDeleteBtn"
                        th:if="${userAuthorities != null and userAuthorities.contains('LISTENER_CONNECTOR_MAPPING:W')}"
                        onclick="ListenerConnectorMappingModal.deleteCurrent()">
                    <i class="bi bi-trash"></i> 삭제
                </button>
            </div>
            <div class="modal-actions-right">
                <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">
                    <i class="bi bi-x-lg"></i> 닫기
                </button>
                <button type="button" class="btn btn-primary btn-sm" id="modalSaveBtn"
                        th:if="${userAuthorities != null and userAuthorities.contains('LISTENER_CONNECTOR_MAPPING:W')}"
                        onclick="ListenerConnectorMappingModal.save()">
                    <i class="bi bi-floppy"></i> 저장
                </button>
            </div>
        </div>
            </div>
        </div>
    </div>
</div>

<!-- Styles extracted to app.css -->
<th:block th:fragment="styles">
</th:block>
</body>
</html>
