                                    <button class="sp-compare-instance-btn">${instance2}</button>
                                </div>
                                <div class="sp-compare-footer-right">
                                    <button onclick="copyDifferentProps('${instance1}', '${instance2}')" class="sp-compare-copy-btn"><i class="bi bi-clipboard"></i> 선택복사</button>

                    tbody.append(`

            function closeOriginalCompareModal() {
                $('#compareResultModal').remove();
            }
            
            function copyDifferentProps(src, tgt) {
                const data = $('#compareResultModal').data('compareData');
                const diffItems = data.items.filter(i => i.compareResult === 'DIFFERENT');
                if (diffItems.length === 0) { Toast.warning('다른 항목이 없습니다.'); return; }
                Toast.confirm(`${diffItems.length}개의 다른 항목을 ${tgt}로 복사하시겠습니까?`, function() {
                    const groups = [...new Set(diffItems.map(i => i.propertyGroupId))];
                    copyPropsAPI(src, tgt, groups, true);
                });
            }
            
            function copyAllProps(src, tgt) {
                const data = $('#compareResultModal').data('compareData');
                Toast.confirm(`모든 프로퍼티를 ${tgt}로 복사하시겠습니까?`, function() {
                    const groups = [...new Set(data.items.map(i => i.propertyGroupId))];
                    copyPropsAPI(src, tgt, groups, true);
                });
            }
            
            function copyPropsAPI(src, tgt, groups, overwrite) {
                const reason = prompt('복사 사유 (선택):') || '프로퍼티 비교 후 복사';
                $.ajax({
                    url: '/api/was/property/copy',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({sourceInstanceId: src, targetInstanceId: tgt, propertyGroupIds: groups, overwrite: overwrite, reason: reason}),
                    success: function(r) {
                        Toast.success(`${r.data}개 복사 완료`);
                        const cur = $('#sectionInstanceId').val();
                        if (cur) loadPropertyData(cur);
                        closeOriginalCompareModal();
                    },
                    error: function(x) { Toast.error('복사 실패: ' + (x.responseJSON?.message || '오류')); }
                });
            }
            
            function exportOriginalCompareResult() {
                const data = $('#compareResultModal').data('compareData');
                let csv = '\ufeff프로퍼티그룹ID,프로퍼티ID,초기값,비교결과,' + data.instance2 + ' 설정값,' + data.instance1 + ' 설정값\n';
                data.items.forEach(i => {
                    csv += `"${i.propertyGroupId}","${i.propertyId}","${i.defaultValue}","${i.compareResult === 'DIFFERENT' ? '다름' : '-'}","${i.value2 || 'NO DATA'}","${i.value1 || 'NO DATA'}"\n`;
                });
                const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `WAS_Compare_${data.instance1}_vs_${data.instance2}.csv`;
                link.click();
            }

            // Pool Status
            let currentPoolInstanceId = null;

            function showPoolStatus(instanceId) {
                currentPoolInstanceId = instanceId;
                const modal = new bootstrap.Modal(document.getElementById('poolStatusModal'));
                modal.show();
                loadPoolStatus(instanceId);
            }

            function refreshPoolStatus() {
                if (currentPoolInstanceId) loadPoolStatus(currentPoolInstanceId);
            }

            function loadPoolStatus(instanceId) {
                const body = $('#poolStatusModalBody');
                body.html('<div class="text-center py-3"><i class="bi bi-arrow-repeat sp-spin"></i> 조회 중...</div>');
                $.ajax({
                    url: `/api/was/instance/${instanceId}/pool-status`,
                    method: 'GET',
                    success: function(response) { renderPoolStatus(response.data); },
                    error: function(xhr) {
                        body.html(`<div class="alert alert-danger"><i class="bi bi-exclamation-triangle-fill"></i> ${xhr.responseJSON?.message || '풀 현황 조회에 실패했습니다.'}</div>`);
                    }
                });
            }

            function renderPoolStatus(data) {
                const body = $('#poolStatusModalBody');
                if (!data || !data.success) {
                    body.html(`<div class="alert alert-warning"><i class="bi bi-exclamation-triangle-fill"></i> ${data?.errorMessage || '풀 현황 조회 실패'}</div>`);
                    return;
                }
                const pools = data.pools || {};
                const entries = Object.entries(pools);
                if (entries.length === 0) {
                    body.html('<div class="text-muted text-center py-3"><i class="bi bi-info-circle"></i> 등록된 소켓 풀이 없습니다.</div>');
                    return;
                }
                let rows = '';
                entries.forEach(([key, pool]) => {
                    const usageRate = pool.maxActive > 0 ? Math.round((pool.active / pool.maxActive) * 100) : 0;
                    const barClass = usageRate >= 80 ? 'bg-danger' : usageRate >= 50 ? 'bg-warning' : 'bg-success';
                    rows += `<tr>
                        <td>${key}</td>
                        <td class="text-center ${pool.active > 0 ? 'fw-bold text-primary' : ''}">${pool.active}</td>
                        <td class="text-center">${pool.idle}</td>
                        <td class="text-center">${pool.total}</td>
                        <td class="text-center">${pool.maxActive}</td>
                        <td><div class="d-flex align-items-center gap-1">
                            <div class="progress flex-grow-1" style="height:12px;"><div class="progress-bar ${barClass}" style="width:${usageRate}%"></div></div>
                            <small>${usageRate}%</small>
                        </div></td>
                    </tr>`;
                });
                body.html(`
                    <p class="mb-2 text-body-secondary small">인스턴스: <strong>${data.instanceId}</strong> (${data.instanceName || '-'})</p>
                    <div class="table-responsive">
                        <table class="table table-sm table-bordered">
                            <thead class="table-light">
                                <tr>
                                    <th>대상 (host:port)</th>
                                    <th class="text-center">Active</th>
                                    <th class="text-center">Idle</th>
                                    <th class="text-center">Total</th>
                                    <th class="text-center">Max</th>
                                    <th>사용률</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                `);
            }

            window.showPoolStatus = showPoolStatus;
            window.refreshPoolStatus = refreshPoolStatus;

            window.showPropertySection = showPropertySection;
            window.closePropertySection = closePropertySection;
            window.addPropertyRow = addPropertyRow;
            window.deleteSelectedProperties = deleteSelectedProperties;
            window.changePropertyPage = changePropertyPage;
            window.savePropertiesSection = savePropertiesSection;
            window.exportPropertiesSection = exportPropertiesSection;
            window.printPropertiesSection = printPropertiesSection;
            window.togglePropertySection = togglePropertySection;
            window.compareAllProperties = compareAllProperties;
            window.compareSelectedProperties = compareSelectedProperties;
            window.showOriginalCompareModal = showOriginalCompareModal;
            window.closeOriginalCompareModal = closeOriginalCompareModal;
            window.copyDifferentProps = copyDifferentProps;
            window.copyAllProps = copyAllProps;
            window.exportOriginalCompareResult = exportOriginalCompareResult;
        })();
    </script>
</div>
</body>
</html>
