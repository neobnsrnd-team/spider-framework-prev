<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <!-- Include Page Content Layout Styles -->

    <!-- Search Section Header -->
    <div class="page-header">
        <h4 class="page-title">
            <i class="bi bi-exclamation-circle-fill text-danger"></i>
            검색조건
        </h4>
    </div>

    <!-- Search Box -->
    <div th:replace="~{pages/was-instance/was-instance-search :: search}"></div>

    <!-- List Section Header + Toolbar -->
    <div class="page-header mt-3">
        <h4 class="page-title">
            <i class="bi bi-exclamation-circle-fill text-danger"></i>
            리스트
        </h4>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary btn-sm" onclick="addInstanceRow()"
                    th:if="${userAuthorities != null and userAuthorities.contains('WAS_INSTANCE:W')}">
                <i class="bi bi-plus-lg"></i> 행 추가
            </button>
            <button class="btn btn-outline-secondary btn-sm" onclick="deleteSelectedRows()"
                    th:if="${userAuthorities != null and userAuthorities.contains('WAS_INSTANCE:W')}">
                <i class="bi bi-trash"></i> 선택행 삭제
            </button>
        </div>
    </div>

    <!-- Table -->
    <div class="table-responsive">
        <table class="table table-sm table-hover sp-data-grid" id="wasInstanceTable">
            <colgroup>
                <col class="col-w-40">
                <col class="col-w-80">
                <col class="col-w-120">
                <col class="col-w-150">
                <col class="col-w-250">
                <col class="col-w-120">
                <col class="col-w-80">
                <col class="col-w-100">
                <col class="col-w-120">
                <col class="col-w-120">
                <col class="col-w-100">
            </colgroup>
            <thead class="table-light">
            <tr>
                <th><input type="checkbox" id="selectAllInstances"></th>
                <th>CRUD</th>
                <th class="sortable" data-sort="instanceId">인스턴스ID</th>
                <th class="sortable" data-sort="instanceName">인스턴스명</th>
                <th class="sortable" data-sort="instanceDesc">인스턴스 설명</th>
                <th class="sortable" data-sort="ip">IP</th>
                <th class="sortable" data-sort="port">PORT</th>
                <th class="sortable" data-sort="instanceType">유형</th>
                <th class="sortable" data-sort="operModeType">운영모드</th>
                <th>프로퍼티</th>
                <th>풀 현황</th>
            </tr>
            </thead>
            <tbody id="wasInstanceTableBody">
            <tr>
                <td colspan="11" class="text-center py-4 text-body-secondary">
                    데이터를 불러오는 중...
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div th:replace="~{fragments/page-content-layout :: pagination}"></div>

    <!-- Bottom Action Buttons -->
    <div class="bottom-actions">
        <div class="bottom-actions-left">
        </div>
        <div class="bottom-actions-right">
            <button class="btn btn-primary btn-sm" onclick="saveAllChanges()"
                    th:if="${userAuthorities != null and userAuthorities.contains('WAS_INSTANCE:W')}">
                <i class="bi bi-floppy"></i> 변경사항 저장
            </button>
        </div>
    </div>

    <!-- Property Section (Modal Overlay) -->
    <div id="propertyModalBackdrop" class="sp-property-backdrop"></div>
    <div id="propertySection" class="property-section">
        <!-- Section Title -->
        <div class="sp-property-section-title" id="propertySectionTitle">
            프로퍼티 정보
        </div>

        <!-- Scrollable Content -->
        <div class="sp-property-section-content">
            <!-- Section 1: 정보 조회 | 복제 -->
            <div class="collapsible-section">
                <div class="collapsible-header" onclick="togglePropertySection(this)">
                    <h4 class="sp-collapsible-heading">
                        <span class="bi bi-exclamation-lg sp-collapsible-icon">!</span>
                        정보 조회 | 복제
                    </h4>
                    <span class="collapsible-toggle">
                        <i class="bi bi-chevron-down"></i>
                    </span>
                </div>
                <div class="collapsible-content">
                    <div class="sp-form-row">
                        <label class="sp-form-row-label">WAS 인스턴스</label>
                        <select id="sectionInstanceId" class="sp-property-form-select">
                            <option value="">선택</option>
                        </select>
                    </div>
                    <div class="sp-form-row-last">
                        <label class="sp-form-row-label">프로퍼티그룹ID</label>
                        <select id="sectionPropertyGroup" class="sp-property-form-select">
                            <option value="">선택 안 함</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Section 2: 프로퍼티 리스트 -->
            <div class="collapsible-section collapsible-section-flex">
                <div class="collapsible-header" onclick="togglePropertySection(this)">
                    <h4 class="sp-collapsible-heading">
                        <span class="bi bi-exclamation-lg sp-collapsible-icon">!</span>
                        프로퍼티 리스트
                    </h4>
                    <span class="collapsible-toggle">
                        <i class="bi bi-chevron-down"></i>
                    </span>
                </div>
                <div class="collapsible-content">
                    <div class="sp-property-list-header">
                        <div class="sp-property-list-actions">
                            <button onclick="exportPropertiesSection()" class="sp-property-action-btn">
                                <i class="bi bi-file-earmark-excel"></i> 엑셀
                            </button>
                            <button onclick="printPropertiesSection()" class="sp-property-action-btn">
                                <i class="bi bi-printer"></i> 출력
                            </button>
                        </div>
                        <div class="sp-property-list-actions">
                            <select id="propertyPageSize" class="form-select form-select-sm sp-limit-select">
                                <option value="10" selected>10</option>
                                <option value="20">20</option>
                                <option value="50">50</option>
                                <option value="100">100</option>
                            </select>
                            <button onclick="addPropertyRow()" class="sp-property-action-btn"
                                    th:if="${userAuthorities != null and userAuthorities.contains('PROPERTY_DB:W')}">
                                <i class="bi bi-plus-lg"></i> 행추가
                            </button>
                            <button onclick="deleteSelectedProperties()" class="sp-property-action-btn"
                                    th:if="${userAuthorities != null and userAuthorities.contains('PROPERTY_DB:W')}">
                                <i class="bi bi-trash"></i> 선택행삭제
                            </button>
                        </div>
                    </div>
                    <div class="sp-property-table-wrapper">
                        <table class="sp-property-data-table" id="propertySectionTable">
                            <colgroup>
                                <col class="col-w-40">
                                <col class="col-w-70">
                                <col class="col-w-150">
                                <col class="col-w-250">
                                <col class="col-w-150">
                                <col class="col-w-150">
                                <col>
                            </colgroup>
                            <thead>
                            <tr>
                                <th><input type="checkbox" id="selectAllPropertiesSection"></th>
                                <th>CRUD</th>
                                <th class="sortable" data-sort="propertyGroupId">프로퍼티그룹ID</th>
                                <th class="sortable" data-sort="propertyId">프로퍼티ID</th>
                                <th class="sortable" data-sort="defaultValue">초기값</th>
                                <th class="sortable" data-sort="propertyValue">설정된 값</th>
                                <th class="sortable" data-sort="propertyDesc">특이사항</th>
                            </tr>
                            </thead>
                            <tbody id="propertySectionTableBody">
                            <tr>
                                <td colspan="7" class="text-center py-4 text-body-secondary">
                                    프로퍼티 정보를 불러오는 중...
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <span id="propertyPageInfo" class="text-body-secondary small"></span>
                        <nav>
                            <ul class="pagination pagination-sm mb-0" id="propertyPagination"></ul>
                        </nav>
                    </div>
                </div>
            </div>

        </div>

        <!-- Footer -->
        <div class="sp-property-section-footer">
            <!-- 왼쪽: WAS2I 비교 -->
            <div class="sp-footer-left">
                <label class="sp-footer-label">
                    <i class="bi bi-arrow-left-right"></i>WAS2I 비교
                </label>
                <select id="was2iSelectInstance" class="sp-footer-select">
                    <option value="">WAS선택</option>
                </select>
                <button onclick="compareAllProperties()" class="btn btn-primary">
                    <i class="bi bi-list-ul"></i> 전체 비교
                </button>
                <button onclick="compareSelectedProperties()" class="btn btn-primary">
                    <i class="bi bi-funnel"></i> 부분 비교
                </button>
            </div>

            <!-- 오른쪽: 액션 버튼 -->
            <div class="sp-footer-right">
                <button class="btn btn-outline-dark" onclick="savePropertiesSection()">
                    <i class="bi bi-floppy"></i> 변경사항 저장
                </button>
                <button class="btn btn-outline-secondary" onclick="closePropertySection()">
                    <i class="bi bi-x-lg"></i> 닫기
                </button>
            </div>
        </div>
    </div>

    <!-- Pool Status Modal -->
    <div class="modal fade" id="poolStatusModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-bar-chart-fill"></i> AP 서버 소켓 풀 현황</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="poolStatusModalBody"></div>
                <div class="modal-footer">
                    <button class="btn btn-outline-primary btn-sm" onclick="refreshPoolStatus()">
                        <i class="bi bi-arrow-repeat"></i> 새로고침
                    </button>
                    <button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">닫기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // WAS Instance Table Script
        (function() {
            let currentPage = 1;
            let totalItems = 0;
            let itemsPerPage = 20;
            let sortBy = null;
            let sortDirection = null;
            let allInstances = [];
            let filteredInstances = [];
            let currentSectionProperties = [];

            const INSTANCE_TYPE_LABELS = {
                '1': 'WEB',
                '2': 'AP',
                '3': '통합'
            };

            const OPER_MODE_LABELS = {
                'D': '개발 서버',
                'R': '운영 서버',
                'T': '테스트 서버'
            };

            $(document).ready(function() {
                initFilters();
                bindSortEvents();
                loadWasInstances(true);

                $('#limitRows').change(function() {
                    itemsPerPage = parseInt($(this).val()) || 20;
                    currentPage = 1;
                    loadWasInstances(true);
                });

                const refreshBtn = document.getElementById('btnRefresh');
                if (refreshBtn) {
                    refreshBtn.addEventListener('click', () => loadWasInstances(false));
                }
                
                // 전체 선택 체크박스
                $('#selectAllInstances').change(function() {
                    $('input[name="instanceCheck"]').prop('checked', $(this).prop('checked'));
                });
            });

            function initFilters() {
                const typeSelect = $('#instanceTypeFilter');
                if (typeSelect.length && typeSelect.find('option').length <= 1) {
                    typeSelect.append('<option value="1">WEB</option>');
                    typeSelect.append('<option value="2">AP</option>');
                    typeSelect.append('<option value="3">통합</option>');
                }

                const modeSelect = $('#operModeTypeFilter');
                if (modeSelect.length && modeSelect.find('option').length <= 1) {
                    modeSelect.append('<option value="D">개발 서버</option>');
                    modeSelect.append('<option value="R">운영 서버</option>');
                    modeSelect.append('<option value="T">테스트 서버</option>');
                }
            }

            function bindSortEvents() {
                $('#wasInstanceTable thead th[data-sort]').each(function() {
                    const $th = $(this);
                    $th.addClass('sortable');
                    $th.on('click', function() {
                        const key = $th.data('sort');
                        if (!key) return;
                        if (sortBy === key) {
                            if (sortDirection === 'ASC') {
                                sortDirection = 'DESC';
                            } else if (sortDirection === 'DESC') {
                                sortBy = null;
                                sortDirection = null;
                            } else {
                                sortDirection = 'ASC';
                            }
                        } else {
                            sortBy = key;
                            sortDirection = 'ASC';
                        }
                        updateSortIndicators();
                        // 정렬 조건이 변경되었으므로 서버에서 다시 데이터 로드
                        loadWasInstances(false);
                    });
                });
            }

            function fetchJson(url) {
                return $.ajax({
                    url: url,
                    method: 'GET'
                }).then(response => response);
            }

            function loadWasInstances(resetPage) {
                if (resetPage) {
                    currentPage = 1;
                }

                // 검색 조건 수집
                const instanceName = $('#instanceName').val() || '';
                const instanceTypeFilter = $('#instanceTypeFilter').val() || '';
                const operModeFilter = $('#operModeTypeFilter').val() || '';

                // 페이지네이션 파라미터 구성
                const params = new URLSearchParams({
                    page: String(currentPage),
                    size: String(itemsPerPage)
                });

                if (instanceName) params.set('instanceName', instanceName);
                if (instanceTypeFilter) params.set('instanceType', instanceTypeFilter);
                if (operModeFilter) params.set('operModeType', operModeFilter);
                if (sortBy) params.set('sortBy', sortBy);
                if (sortDirection) params.set('sortDirection', sortDirection);

                // 서버 사이드 페이지네이션 API 호출
                fetchJson(`/api/was/instance/page?${params.toString()}`)
                    .then(response => {
                        const pageData = response.data || response;
                        allInstances = pageData.content || [];
                        totalItems = pageData.totalElements || 0;
                        filteredInstances = allInstances;

                        renderPage();
                    })
                    .catch(err => {
                        console.error('WAS 인스턴스 로드 실패:', err);
                        const tbody = $('#wasInstanceTableBody');
                        tbody.empty();
                        tbody.append(`
                            <tr>
                                <td colspan="11" class="text-center py-4 text-danger">
                                    데이터를 불러오는데 실패했습니다.
                                </td>
                            </tr>
                        `);
                    });
            }

            function applyFiltersAndRender() {
                loadWasInstances(true);
            }

            function normalizeInstanceType(value) {
                if (value === null || value === undefined) return '';
                const val = String(value).trim();
                if (!val) return '';
                if (val === '1' || val.toUpperCase() === 'WEB') return '1';
                if (val === '2' || val.toUpperCase() === 'AP') return '2';
                if (val === '3' || val === '통합') return '3';
                return val;
            }

            function normalizeOperMode(value) {
                if (value === null || value === undefined) return '';
                const val = String(value).trim();
                if (!val) return '';
                const upper = val.toUpperCase();
                if (upper === 'D' || upper === 'DEV' || val === '개발' || val === '개발 서버' || val === '1') return 'D';
                if (upper === 'R' || upper === 'PRD' || val === '운영' || val === '운영 서버' || val === '2') return 'R';
                if (upper === 'T' || upper === 'TEST' || val === '테스트' || val === '테스트 서버' || val === '3') return 'T';
                return upper;
            }

            function getInstanceTypeLabel(value) {
                const code = normalizeInstanceType(value);
                return INSTANCE_TYPE_LABELS[code] || (value ? String(value) : '-');
            }

            function getOperModeLabel(value) {
                const code = normalizeOperMode(value);
                return OPER_MODE_LABELS[code] || (value ? String(value) : '-');
            }

            function renderPage() {
                // 서버 사이드 페이지네이션 사용 시 정렬은 서버에서 처리됨
                // 클라이언트 사이드에서는 받은 데이터를 그대로 렌더링
                renderWasInstanceTable(filteredInstances);
                renderPagination();
                updateSortIndicators();
            }

            function getSortedInstances(instances) {
                if (!sortBy || !sortDirection) {
                    return instances || [];
                }
                const direction = sortDirection === 'DESC' ? -1 : 1;
                const rows = [...(instances || [])];
                return rows.sort((a, b) => {
                    const aVal = getSortValue(a, sortBy);
                    const bVal = getSortValue(b, sortBy);
                    return compareValues(aVal, bVal) * direction;
                });
            }

            function getSortValue(instance, key) {
                if (!instance) return '';
                switch (key) {
                    case 'instanceType':
                        return getInstanceTypeLabel(instance.instanceType);
                    case 'operModeType':
                        return getOperModeLabel(instance.operModeType);
                    case 'port':
                        return toNumber(instance.port);
                    default:
                        return instance[key] ?? '';
                }
            }

            function compareValues(aVal, bVal) {
                const aEmpty = aVal === null || aVal === undefined || aVal === '';
                const bEmpty = bVal === null || bVal === undefined || bVal === '';
                if (aEmpty && bEmpty) return 0;
                if (aEmpty) return 1;
                if (bEmpty) return -1;
                if (typeof aVal === 'number' && typeof bVal === 'number') {
                    return aVal - bVal;
                }
                return String(aVal).localeCompare(String(bVal), 'ko', { numeric: true, sensitivity: 'base' });
            }

            function toNumber(value) {
                if (value === null || value === undefined || value === '') return null;
                const num = Number(value);
                return Number.isNaN(num) ? null : num;
            }

            function updateSortIndicators() {
                const headers = $('#wasInstanceTable thead th.sortable');
                headers.removeClass('sort-asc sort-desc');
                if (!sortBy || !sortDirection) return;
                headers.filter(`[data-sort="${sortBy}"]`)
                    .addClass(sortDirection === 'ASC' ? 'sort-asc' : 'sort-desc');
            }

            function renderWasInstanceTable(instances) {
                const tbody = $('#wasInstanceTableBody');
                tbody.empty();

                if (!instances || instances.length === 0) {
                    tbody.append(`
                        <tr>
                            <td colspan="11" class="text-center py-4 text-body-secondary">
                                조회된 데이터가 없습니다.
                            </td>
                        </tr>
                    `);
                    return;
                }

                instances.forEach(instance => {
                    const isNew = instance.__isNew === true || instance.isNew === true;
                    const isModified = instance.__modified === true;
                    const instanceTypeText = getInstanceTypeLabel(instance.instanceType);
                    const operModeText = getOperModeLabel(instance.operModeType);

                    const row = $('<tr></tr>');
                    row.data('original', instance); // 원본 데이터 저장
                    row.data('modified', isModified);
                    row.data('isNew', isNew);
                    if (isNew) {
                        row.addClass('row-new');
                    } else if (isModified) {
                        row.addClass('row-modified');
                    }
                    
                    // 첫 번째 컬럼: 체크박스
                    const checkboxTd = $('<td class="text-center"></td>');
                    const checkValue = instance.instanceId || '';
                    checkboxTd.html(`<input type="checkbox" name="instanceCheck" value="${checkValue}" data-instance-id="${checkValue}">`);
                    row.append(checkboxTd);
                    
                    // CRUD 컬럼
                    const crudTd = $('<td class="text-center"></td>');
                    if (isNew) {
                        const deleteBtn = $('<button class="btn-crud-icon" title="삭제"><i class="bi bi-trash"></i></button>');
                        deleteBtn.click(function(e) {
                            e.stopPropagation();
                            Toast.confirm('이 행을 삭제하시겠습니까?', function() {
                                allInstances = allInstances.filter(item => item !== instance);
                                applyFiltersAndRender();
                            });
                        });
                        crudTd.append(deleteBtn);
                    } else {
                        const editBtn = $('<button class="btn-crud-icon" title="수정"><i class="bi bi-pencil"></i></button>');
                        editBtn.click(function(e) {
                            e.stopPropagation();
                            editInstance(instance.instanceId);
                        });
                        crudTd.append(editBtn);
                    }
                    row.append(crudTd);
                    
                    // 데이터 컬럼 - 편집 가능하도록 수정
                    // 인스턴스ID (신규일 때만 편집)
                    if (isNew) {
                        const instanceIdTd = $(`<td class="editable-text sp-editable-new-bg" data-field="instanceId">${instance.instanceId || '-'}</td>`);
                        makeTextCellEditable(instanceIdTd, row);
                        row.append(instanceIdTd);
                    } else {
                        row.append(`<td class="non-editable">${instance.instanceId || '-'}</td>`);
                    }
                    
                    // 인스턴스명 (편집 가능)
                    const instanceNameTd = $(`<td class="editable-text" data-field="instanceName">${instance.instanceName || '-'}</td>`);
                    makeTextCellEditable(instanceNameTd, row);
                    row.append(instanceNameTd);
                    
                    // 인스턴스 설명 (편집 가능)
                    const instanceDescTd = $(`<td class="editable-text" data-field="instanceDesc">${instance.instanceDesc || '-'}</td>`);
                    makeTextCellEditable(instanceDescTd, row);
                    row.append(instanceDescTd);
                    
                    // IP (편집 가능)
                    const ipTd = $(`<td class="editable-text" data-field="ip">${instance.ip || '-'}</td>`);
                    makeTextCellEditable(ipTd, row);
                    row.append(ipTd);
                    
                    // PORT (편집 가능)
                    const portTd = $(`<td class="editable-text" data-field="port">${instance.port || '-'}</td>`);
                    makeTextCellEditable(portTd, row);
                    row.append(portTd);
                    
                    // 유형 (드롭다운 편집)
                    const typeTd = $(`<td class="editable-select text-center" data-field="instanceType">${instanceTypeText}</td>`);
                    makeSelectCellEditable(typeTd, row, [
                        {value: '1', text: 'WEB'},
                        {value: '2', text: 'AP'},
                        {value: '3', text: '통합'}
                    ], normalizeInstanceType(instance.instanceType));
                    row.append(typeTd);
                    
                    // 운영모드 (드롭다운 편집)
                    const modeTd = $(`<td class="editable-select text-center" data-field="operModeType">${operModeText}</td>`);
                    makeSelectCellEditable(modeTd, row, [
                        {value: 'D', text: '개발 서버'},
                        {value: 'R', text: '운영 서버'},
                        {value: 'T', text: '테스트 서버'}
                    ], normalizeOperMode(instance.operModeType));
                    row.append(modeTd);
                    
                    // 프로퍼티 버튼
                    const propertyTd = $('<td class="text-center"></td>');
                    if (isNew) {
                        propertyTd.text('-');
                    } else {
                        const propertyBtn = $('<button class="btn-property">WAS 프로퍼티</button>');
                        propertyBtn.click(function(e) {
                            e.stopPropagation();
                            showPropertySection(instance.instanceId);
                        });
                        propertyTd.append(propertyBtn);
                    }
                    row.append(propertyTd);

                    // 풀 현황 버튼 (AP 인스턴스만)
                    const poolTd = $('<td class="text-center"></td>');
                    if (!isNew && normalizeInstanceType(instance.instanceType) === '2') {
                        const poolBtn = $('<button class="btn-property">풀 현황</button>');
                        poolBtn.click(function(e) {
                            e.stopPropagation();
                            showPoolStatus(instance.instanceId);
                        });
                        poolTd.append(poolBtn);
                    } else {
                        poolTd.text('-');
                    }
                    row.append(poolTd);

                    tbody.append(row);
                });
            }
            
            // 텍스트 셀 편집 가능하게 만들기
            function makeTextCellEditable(cell, row) {
                cell.dblclick(function() {
                    const currentValue = $(this).text();
                    const displayValue = currentValue === '-' ? '' : currentValue;
                    const field = $(this).data('field');
                    
                    const input = $(`<input type="text" class="editable-cell sp-editable-cell-input" value="${displayValue}">`);
                    
                    $(this).html(input);
                    input.focus().select();
                    
                    // Enter 키로 저장
                    input.keypress(function(e) {
                        if (e.which === 13) {
                            saveCell($(this), cell, row, field);
                        }
                    });
                    
                    // 포커스 잃으면 저장
                    input.blur(function() {
                        saveCell($(this), cell, row, field);
                    });
                });
            }
            
            // 드롭다운 셀 편집 가능하게 만들기
            function makeSelectCellEditable(cell, row, options, currentValue) {
                cell.dblclick(function() {
                    const field = $(this).data('field');
                    
                    let selectHtml = '<select class="editable-cell sp-editable-cell-input">';
                    options.forEach(opt => {
                        const selected = opt.value === currentValue ? 'selected' : '';
                        selectHtml += `<option value="${opt.value}" ${selected}>${opt.text}</option>`;
                    });
                    selectHtml += '</select>';
                    
                    const originalText = $(this).text();
                    $(this).html(selectHtml);
                    
                    const select = $(this).find('select');
                    select.focus();
                    
                    // 변경 시 저장
                    select.change(function() {
                        saveSelectCell($(this), cell, row, field, options);
                    });
                    
                    // 포커스 잃으면 저장
                    select.blur(function() {
                        saveSelectCell($(this), cell, row, field, options);
                    });
                });
            }
            
            // 텍스트 셀 저장
            function saveCell(input, cell, row, field) {
                const newValue = input.val().trim();
                const originalData = row.data('original');
                const oldValue = originalData[field];
                
                cell.text(newValue || '-');
                
                // 값이 변경되었으면 행 하이라이트
                if (newValue !== oldValue) {
                    row.addClass('row-modified');
                    // 원본 데이터도 업데이트
                    originalData[field] = newValue;
                    originalData.__modified = true;
                    row.data('modified', true);
                }
            }
            
            // 드롭다운 셀 저장
            function saveSelectCell(select, cell, row, field, options) {
                const newValue = select.val();
                const originalData = row.data('original');
                const oldValue = originalData[field];
                
                // 선택된 값의 텍스트 찾기
                const selectedOption = options.find(opt => opt.value === newValue);
                const displayText = selectedOption ? selectedOption.text : '-';
                
                cell.text(displayText);
                
                // 값이 변경되었으면 행 하이라이트
                if (newValue !== oldValue) {
                    row.addClass('row-modified');
                    // 원본 데이터도 업데이트
                    originalData[field] = newValue;
                    originalData.__modified = true;
                    row.data('modified', true);
                }
            }

            function renderPagination() {
                const totalPages = Math.ceil(totalItems / itemsPerPage);
                const pagination = $('#pagination');
                pagination.empty();
                currentPage = totalPages === 0 ? 1 : Math.min(Math.max(currentPage, 1), totalPages);

                const startItem = totalItems === 0 ? 0 : (currentPage - 1) * itemsPerPage + 1;
                const endItem = totalItems === 0 ? 0 : Math.min(currentPage * itemsPerPage, totalItems);
                const pageInfo = $('#pageInfo');
                if (pageInfo.length) {
                    pageInfo.text(`${startItem} - ${endItem} of ${totalItems} items`);
                }

                const maxButtons = 5;
                let startPage = Math.max(1, currentPage - Math.floor(maxButtons / 2));
                let endPage = Math.min(totalPages, startPage + maxButtons - 1);

                if (endPage - startPage + 1 < maxButtons) {
                    startPage = Math.max(1, endPage - maxButtons + 1);
                }

                let html = `
                    <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                        <a class="page-link" href="#" onclick="changePage(1); return false;">
                            <i class="bi bi-chevron-double-left"></i>
                        </a>
                    </li>
                    <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                        <a class="page-link" href="#" onclick="changePage(${currentPage - 1}); return false;">
                            <i class="bi bi-chevron-left"></i>
                        </a>
                    </li>
                `;

                for (let i = startPage; i <= endPage; i++) {
                    html += `
                        <li class="page-item ${i === currentPage ? 'active' : ''}">
                            <a class="page-link" href="#" onclick="changePage(${i}); return false;">${i}</a>
                        </li>
                    `;
                }

                html += `
                    <li class="page-item ${currentPage === totalPages || totalPages === 0 ? 'disabled' : ''}">
                        <a class="page-link" href="#" onclick="changePage(${currentPage + 1}); return false;">
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </li>
                    <li class="page-item ${currentPage === totalPages || totalPages === 0 ? 'disabled' : ''}">
                        <a class="page-link" href="#" onclick="changePage(${totalPages}); return false;">
                            <i class="bi bi-chevron-double-right"></i>
                        </a>
                    </li>
                `;

                pagination.html(html);
            }

            function changePage(page) {
                const totalPages = Math.ceil(totalItems / itemsPerPage);
                if (page < 1 || page > totalPages) return;
                currentPage = page;
                loadWasInstances(false);
            }

            function editInstance(instanceId) {
                const row = $(`#wasInstanceTableBody tr`).filter(function() {
                    return $(this).find('input[name="instanceCheck"]').data('instance-id') === instanceId;
                }).first();
                if (!row.length) {
                    Toast.warning('편집할 인스턴스를 찾을 수 없습니다.');
                    return;
                }
                row.addClass('row-editing');
                const firstEditable = row.find('td.editable-text[data-field="instanceName"]').first();
                if (firstEditable.length) {
                    firstEditable.dblclick();
                }
            }

            function exportExcel() {
                const params = new URLSearchParams();
                const instanceName = $('#instanceName').val() || '';
                const instanceTypeFilter = $('#instanceTypeFilter').val() || '';
                const operModeFilter = $('#operModeTypeFilter').val() || '';
                if (instanceName) params.set('instanceName', instanceName);
                if (instanceTypeFilter) params.set('instanceType', instanceTypeFilter);
                if (operModeFilter) params.set('operModeType', operModeFilter);
                if (sortBy) params.set('sortBy', sortBy);
                if (sortDirection) params.set('sortDirection', sortDirection);
                const qs = params.toString();
                window.location.href = '/api/was/instance/export' + (qs ? '?' + qs : '');
            }

            function printList() {
                const columns = [
                    { key: 'instanceId', label: '인스턴스ID' },
                    { key: 'instanceName', label: '인스턴스명' },
                    { key: 'instanceDesc', label: '인스턴스 설명' },
                    { key: 'ip', label: 'IP' },
                    { key: 'port', label: 'Port' }
                ];
                PrintUtil.print({ title: 'WAS 인스턴스 목록', columns: columns, data: filteredInstances });
            }
            
            function addInstanceRow() {
                // 새 행 데이터
                const newInstance = {
                    instanceId: '',
                    instanceName: '',
                    instanceDesc: '',
                    ip: '',
                    port: '8080',
                    instanceType: '1',
                    operModeType: 'D',
                    __isNew: true,
                    __modified: true
                };
                allInstances = [newInstance, ...(allInstances || [])];
                renderWasInstanceTable(allInstances);
                setTimeout(() => {
                    const firstRow = $('#wasInstanceTableBody tr').first();
                    const instanceIdTd = firstRow.find('td.editable-text[data-field="instanceId"]').first();
                    if (instanceIdTd.length) {
                        instanceIdTd.dblclick();
                    }
                }, 0);
            }
            
            function deleteSelectedRows() {
                const selected = $('input[name="instanceCheck"]:checked');
                if (selected.length === 0) {
                    Toast.warning('삭제할 행을 선택해주세요.');
                    return;
                }

                selected.each(function() {
                    const row = $(this).closest('tr');
                    const data = row.data('original');

                    if (row.data('isNew')) {
                        // 신규 행은 즉시 DOM에서 제거
                        allInstances = allInstances.filter(item => item !== data);
                        row.remove();
                    } else {
                        // 기존 행은 삭제 마킹 (변경사항 저장 시 일괄 처리)
                        data.__deleted = true;
                        data.__modified = false;
                        row.removeClass('row-modified row-new').addClass('row-deleted sp-row-crud-deleted');
                        // CRUD 컬럼에 삭제 뱃지 표시
                        row.find('td:eq(1)').html('<span class="badge bg-danger">삭제</span>');
                        // 편집 비활성화
                        row.find('.editable-text, .editable-select').off('dblclick');
                        row.find('input[type="checkbox"]').prop('checked', false);
                    }
                });

                $('#selectAllInstances').prop('checked', false);
            }

            function saveAllChanges() {
                const changedRows = $('#wasInstanceTableBody tr.row-modified, #wasInstanceTableBody tr.row-new, #wasInstanceTableBody tr.row-deleted');

                if (changedRows.length === 0) {
                    Toast.warning('변경된 내용이 없습니다.');
                    return;
                }

                const requests = [];
                let hasError = false;

                changedRows.each(function() {
                    const row = $(this);
                    const data = row.data('original');

                    if (data.__deleted) {
                        requests.push({ ...buildInstancePayload(data), crud: 'D' });
                    } else if (row.data('isNew')) {
                        const payload = buildInstancePayload(data);
                        if (!payload.instanceId) {
                            Toast.warning('인스턴스 ID를 입력해주세요.');
                            hasError = true;
                            return false;
                        }
                        requests.push({ ...payload, crud: 'C' });
                    } else {
                        requests.push({ ...buildInstancePayload(data), crud: 'U' });
                    }
                });

                if (hasError || requests.length === 0) return;

                Toast.confirm(`${requests.length}개의 인스턴스를 저장하시겠습니까?`, function() {
                    $.ajax({
                        url: '/api/was/instance/batch',
                        method: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify(requests),
                        success: function(response) {
                            const count = response.data || 0;
                            Toast.success(count + '개의 인스턴스가 처리되었습니다.');
                            loadWasInstances(false);
                        },
                        error: function(xhr) {
                            const msg = xhr.responseJSON?.message || '저장 중 오류가 발생했습니다.';
                            Toast.error(msg);
                        }
                    });
                });
            }

            function buildInstancePayload(data) {
                return {
                    instanceId: data.instanceId || '',
                    instanceName: data.instanceName || '',
                    instanceDesc: data.instanceDesc || '',
                    ip: data.ip || '',
                    port: data.port || '',
                    instanceType: normalizeInstanceType(data.instanceType),
                    operModeType: normalizeOperMode(data.operModeType)
                };
            }

            // Expose functions to window
            window.loadWasInstances = loadWasInstances;
            window.changePage = changePage;
            window.editInstance = editInstance;
            window.exportExcel = exportExcel;
            window.printList = printList;
            window.addInstanceRow = addInstanceRow;
            window.deleteSelectedRows = deleteSelectedRows;
            window.saveAllChanges = saveAllChanges;
        })();

        // Property Section Script
        (function() {
            // 프로퍼티 페이지네이션/정렬 상태
            let propCurrentPage = 1;
            let propPageSize = 10;
            let propSortBy = null;
            let propSortDirection = null;
            let propTotalItems = 0;

            // 기존 프로퍼티 변경 추적 (index → {crud, propertyValue, propertyDesc})
            let propertyChanges = {};
            // 원본 프로퍼티 데이터
            let originalProperties = [];
            // 새로 추가된 행 관리 배열
            let newPropertyRows = [];
            // 프로퍼티 그룹 캐시
            let cachedPropertyGroups = null;
            // 그룹별 프로퍼티 캐시
            let cachedPropertiesByGroup = {};

            // 캐시 무효화 함수
            function invalidateAllPropertyCache() {
                cachedPropertyGroups = null;
                cachedPropertiesByGroup = {};
            }

            function showPropertySection(instanceId) {
                // 캐시 무효화 (다른 화면에서 변경된 데이터 반영)
                invalidateAllPropertyCache();

                // 상태 초기화
                propCurrentPage = 1;
                propSortBy = null;
                propSortDirection = null;

                // Show backdrop + section via CSS class toggle
                $('#propertyModalBackdrop').addClass('show');
                $('#propertySection').addClass('active');

                // Update content
                $('#propertySectionTitle').text(instanceId + ' 프로퍼티 정보');

                // Load all instances for dropdown
                loadInstanceDropdown(instanceId);

                // Load property data
                loadPropertyData(instanceId, true);

                // 그룹 드롭다운은 전체 목록으로 초기화
                loadPropertyGroupDropdown(instanceId);

                // 정렬 클릭 이벤트 바인딩
                bindPropertySortEvents();

                // 페이지 사이즈 변경
                $('#propertyPageSize').off('change').on('change', function() {
                    propPageSize = parseInt($(this).val());
                    propCurrentPage = 1;
                    const instId = $('#sectionInstanceId').val();
                    loadPropertyData(instId, true);
                });
            }

            function loadInstanceDropdown(selectedInstanceId) {
                $.ajax({
                    url: '/api/was/instance',
                    method: 'GET',
                    success: function(response) {
                        const instances = response.data || response.content || response;

                        // 정보 조회 드롭다운
                        const dropdown = $('#sectionInstanceId');
                        dropdown.empty();

                        instances.forEach(instance => {
                            const selected = instance.instanceId === selectedInstanceId ? 'selected' : '';
                            dropdown.append(`<option value="${instance.instanceId}" ${selected}>${instance.instanceId}</option>`);
                        });

                        // WAS2I 비교 드롭다운
                        const compareDropdown = $('#was2iSelectInstance');
                        if (compareDropdown.length > 0) {
                            compareDropdown.empty();
                            compareDropdown.append('<option value="">WAS선택</option>');
                            instances.forEach(instance => {
                                if (instance.instanceId !== selectedInstanceId) {
                                    compareDropdown.append(`<option value="${instance.instanceId}">${instance.instanceId}</option>`);
                                }
                            });
                        }

                        // 인스턴스 변경 이벤트
                        dropdown.off('change').on('change', function() {
                            const newInstanceId = $(this).val();
                            // 그룹별 프로퍼티 캐시 무효화
                            cachedPropertiesByGroup = {};
                            $('#propertySectionTitle').text(newInstanceId + ' 프로퍼티 정보');
                            loadPropertyGroupDropdown(newInstanceId);
                            loadPropertyData(newInstanceId, true);
                        });
                    },
                    error: function(xhr) {
                        console.error('인스턴스 목록 로드 실패:', xhr);
                    }
                });
            }

            function loadPropertyData(instanceId, resetPage) {
                if (resetPage) propCurrentPage = 1;

                const tbody = $('#propertySectionTableBody');
                tbody.empty();
                tbody.append(`
                    <tr>
                        <td colspan="7" class="text-center py-4 text-body-secondary">
                            <i class="bi bi-arrow-repeat sp-spin"></i> 프로퍼티 정보를 불러오는 중...
                        </td>
                    </tr>
                `);

                const selectedGroup = $('#sectionPropertyGroup').val() || '';
                const params = new URLSearchParams({
                    page: String(propCurrentPage),
                    size: String(propPageSize)
                });
                if (selectedGroup) params.set('propertyGroupId', selectedGroup);
                if (propSortBy) params.set('sortBy', propSortBy);
                if (propSortDirection) params.set('sortDirection', propSortDirection);

                $.ajax({
                    url: `/api/was/property/instance/${instanceId}/page?${params.toString()}`,
                    method: 'GET',
                    success: function(response) {
                        const pageData = response.data || {};
                        const properties = pageData.content || [];
                        propTotalItems = pageData.totalElements || 0;

                        renderPropertySectionTable(properties);
                        renderPropertyPagination();
                        updatePropertySortIndicators();
                    },
                    error: function() {
                        tbody.empty();
                        tbody.append(`
                            <tr>
                                <td colspan="7" class="text-center py-4 text-danger">
                                    <i class="bi bi-exclamation-triangle-fill"></i>
                                    프로퍼티 정보를 불러오는데 실패했습니다.
                                </td>
                            </tr>
                        `);
                    }
                });
            }

            function renderPropertyPagination() {
                const totalPages = Math.ceil(propTotalItems / propPageSize);
                const pagination = $('#propertyPagination');
                pagination.empty();
                propCurrentPage = totalPages === 0 ? 1 : Math.min(Math.max(propCurrentPage, 1), totalPages);

                const startItem = propTotalItems === 0 ? 0 : (propCurrentPage - 1) * propPageSize + 1;
                const endItem = propTotalItems === 0 ? 0 : Math.min(propCurrentPage * propPageSize, propTotalItems);
                $('#propertyPageInfo').text(`${startItem} - ${endItem} / ${propTotalItems}건`);

                if (totalPages <= 1) return;

                const maxButtons = 5;
                let startPage = Math.max(1, propCurrentPage - Math.floor(maxButtons / 2));
                let endPage = Math.min(totalPages, startPage + maxButtons - 1);
                if (endPage - startPage + 1 < maxButtons) {
                    startPage = Math.max(1, endPage - maxButtons + 1);
                }

                let html = `
                    <li class="page-item ${propCurrentPage === 1 ? 'disabled' : ''}">
                        <a class="page-link" href="#" onclick="changePropertyPage(1); return false;">
                            <i class="bi bi-chevron-double-left"></i></a></li>
                    <li class="page-item ${propCurrentPage === 1 ? 'disabled' : ''}">
                        <a class="page-link" href="#" onclick="changePropertyPage(${propCurrentPage - 1}); return false;">
                            <i class="bi bi-chevron-left"></i></a></li>
                `;
                for (let i = startPage; i <= endPage; i++) {
                    html += `<li class="page-item ${i === propCurrentPage ? 'active' : ''}">
                        <a class="page-link" href="#" onclick="changePropertyPage(${i}); return false;">${i}</a></li>`;
                }
                html += `
                    <li class="page-item ${propCurrentPage === totalPages ? 'disabled' : ''}">
                        <a class="page-link" href="#" onclick="changePropertyPage(${propCurrentPage + 1}); return false;">
                            <i class="bi bi-chevron-right"></i></a></li>
                    <li class="page-item ${propCurrentPage === totalPages ? 'disabled' : ''}">
                        <a class="page-link" href="#" onclick="changePropertyPage(${totalPages}); return false;">
                            <i class="bi bi-chevron-double-right"></i></a></li>
                `;
                pagination.html(html);
            }

            function changePropertyPage(page) {
                const totalPages = Math.ceil(propTotalItems / propPageSize);
                if (page < 1 || page > totalPages) return;
                propCurrentPage = page;
                const instanceId = $('#sectionInstanceId').val();
                loadPropertyData(instanceId, false);
            }

            function updatePropertySortIndicators() {
                $('#propertySectionTable thead th[data-sort]').each(function() {
                    const $th = $(this);
                    $th.find('.sort-indicator').remove();
                    if ($th.data('sort') === propSortBy && propSortDirection) {
                        const icon = propSortDirection === 'ASC' ? 'bi-caret-up-fill' : 'bi-caret-down-fill';
                        $th.append(` <i class="bi ${icon} sort-indicator"></i>`);
                    }
                });
            }

            function loadPropertyGroupDropdown(instanceId) {
                // 전체 데이터에서 그룹 목록을 가져오기 위해 비페이지네이션 API 사용
                $.ajax({
                    url: `/api/was/property/instance/${instanceId}`,
                    method: 'GET',
                    success: function(response) {
                        const properties = response.data || [];
                        const propertyGroups = new Set();
                        properties.forEach(prop => {
                            const groupId = prop.propertyGroupId || prop.PROPERTYGROUPID;
                            if (groupId) propertyGroups.add(groupId);
                        });

                        const dropdown = $('#sectionPropertyGroup');
                        dropdown.empty();
                        dropdown.append('<option value="">전체</option>');
                        Array.from(propertyGroups).sort().forEach(groupId => {
                            dropdown.append(`<option value="${groupId}">${groupId}</option>`);
                        });

                        // 그룹 변경 → 서버 재조회
                        dropdown.off('change').on('change', function() {
                            propCurrentPage = 1;
                            loadPropertyData(instanceId, true);
                        });
                    }
                });
            }

            function bindPropertySortEvents() {
                $('#propertySectionTable thead th[data-sort]').off('click').on('click', function() {
                    const key = $(this).data('sort');
                    if (!key) return;

                    if (propSortBy === key) {
                        if (propSortDirection === 'ASC') {
                            propSortDirection = 'DESC';
                        } else if (propSortDirection === 'DESC') {
                            propSortBy = null;
                            propSortDirection = null;
                        } else {
                            propSortDirection = 'ASC';
                        }
                    } else {
                        propSortBy = key;
                        propSortDirection = 'ASC';
                    }

                    propCurrentPage = 1;
                    const instanceId = $('#sectionInstanceId').val();
                    loadPropertyData(instanceId, true);
                });
            }

            function renderPropertySectionTable(properties) {
                // 정규화된 데이터 저장
                originalProperties = (properties || []).map(prop => ({
                    instanceId: prop.instanceId || '',
                    propertyGroupId: prop.propertyGroupId || '',
                    propertyId: prop.propertyId || '',
                    propertyValue: prop.propertyValue || '',
                    propertyDesc: prop.propertyDesc || '',
                    defaultValue: prop.defaultValue || 'USE_DEFAULT',
                    propertyName: prop.propertyName || '',
                    curVersion: prop.curVersion || 1
                }));

                // 인쇄용 정규화 데이터 저장
                currentSectionProperties = originalProperties.map(p => ({
                    propertyGroupId: p.propertyGroupId,
                    propertyId: p.propertyId,
                    defaultValue: p.defaultValue,
                    propertyValue: p.propertyValue,
                    propertyDesc: p.propertyDesc
                }));

                // 변경 추적 초기화
                propertyChanges = {};

                const tbody = $('#propertySectionTableBody');
                tbody.empty();

                if (!originalProperties || originalProperties.length === 0) {
                    tbody.append(`
                        <tr>
                            <td colspan="7" class="text-center py-4 text-body-secondary">
                                <i class="bi bi-info-circle"></i> 이 인스턴스에는 등록된 프로퍼티가 없습니다.
                            </td>
                        </tr>
                    `);
                    return;
                }

                let validPropertiesCount = 0;

                originalProperties.forEach((prop, index) => {
                    if (!prop.propertyGroupId || !prop.propertyId) return;

                    validPropertiesCount++;

                    const isModified = prop.propertyValue && prop.propertyValue !== prop.defaultValue && prop.propertyValue !== 'USE_DEFAULT';

                    const row = `
                        <tr class="${isModified ? 'sp-row-modified-bg' : ''}" data-index="${index}"
                            data-instance-id="${prop.instanceId}" data-group-id="${prop.propertyGroupId}"
                            data-property-id="${prop.propertyId}" data-cur-version="${prop.curVersion}">
                            <td class="sp-prop-checkbox">
                                <input type="checkbox" name="propertySectionCheck" value="${index}"
                                       data-instance-id="${prop.instanceId}" data-group-id="${prop.propertyGroupId}"
                                       data-property-id="${prop.propertyId}">
                            </td>
                            <td class="sp-prop-crud text-center" data-index="${index}"></td>
                            <td class="sp-prop-group-id">${prop.propertyGroupId}</td>
                            <td title="${prop.propertyName}">${prop.propertyId}</td>
                            <td class="sp-prop-default">${prop.defaultValue}</td>
                            <td class="sp-prop-value sp-editable" data-field="propertyValue" data-index="${index}">${prop.propertyValue || '-'}</td>
                            <td class="sp-prop-notes sp-editable" data-field="propertyDesc" data-index="${index}">${prop.propertyDesc || ''}</td>
                        </tr>
                    `;
                    tbody.append(row);
                });

                if (validPropertiesCount === 0) {
                    tbody.append(`
                        <tr>
                            <td colspan="7" class="text-center py-4 text-body-secondary">
                                <i class="bi bi-info-circle"></i> 유효한 프로퍼티 데이터가 없습니다.
                            </td>
                        </tr>
                    `);
                }

                // Select All
                $('#selectAllPropertiesSection').off('change').on('change', function() {
                    $('input[name="propertySectionCheck"]:not(:disabled)').prop('checked', $(this).prop('checked'));
                });

                // 편집 가능한 셀 클릭 → input 전환
                tbody.find('.sp-editable').off('click').on('click', function() {
                    const $cell = $(this);
                    if ($cell.find('input').length > 0) return; // 이미 편집 중
                    if ($cell.closest('tr').hasClass('sp-row-crud-deleted')) return; // 삭제 행은 편집 불가

                    const field = $cell.data('field');
                    const index = $cell.data('index');
                    const currentText = $cell.text().trim();
                    const currentValue = (currentText === '-') ? '' : currentText;

                    const $input = $('<input>', {
                        type: 'text',
                        class: 'form-control form-control-sm',
                        value: currentValue
                    });

                    $cell.empty().append($input);
                    $input.focus().select();

                    $input.on('blur', function() {
                        const newValue = $(this).val().trim();
                        $cell.text(newValue || '-');

                        // 원본과 비교하여 변경 여부 판단
                        const orig = originalProperties[index];
                        const origValue = orig[field] || '';

                        if (newValue !== origValue) {
                            // 변경 추적
                            if (!propertyChanges[index]) {
                                propertyChanges[index] = { crud: 'U', propertyValue: orig.propertyValue, propertyDesc: orig.propertyDesc };
                            }
                            propertyChanges[index][field] = newValue;
                            // CRUD 표시
                            $(`td.sp-prop-crud[data-index="${index}"]`).text('수정');
                            $cell.closest('tr').addClass('sp-row-modified-bg');
                        } else {
                            // 다른 필드도 변경 없으면 변경 추적 해제
                            if (propertyChanges[index]) {
                                propertyChanges[index][field] = newValue;
                                const otherField = (field === 'propertyValue') ? 'propertyDesc' : 'propertyValue';
                                if ((propertyChanges[index][otherField] || '') === (orig[otherField] || '')) {
                                    delete propertyChanges[index];
                                    $(`td.sp-prop-crud[data-index="${index}"]`).text('');
                                }
                            }
                        }
                    });

                    $input.on('keydown', function(e) {
                        if (e.key === 'Enter') $(this).blur();
                        if (e.key === 'Escape') {
                            const orig = originalProperties[index];
                            $(this).val(orig[field] || '');
                            $(this).blur();
                        }
                    });
                });
            }

            function loadPropertyGroups() {
                if (cachedPropertyGroups) {
                    return Promise.resolve(cachedPropertyGroups);
                }
                return $.ajax({
                    url: '/api/properties/groups',
                    method: 'GET'
                }).then(function(response) {
                    cachedPropertyGroups = response.data || [];
                    return cachedPropertyGroups;
                });
            }

            function loadPropertiesByGroup(propertyGroupId) {
                if (cachedPropertiesByGroup[propertyGroupId]) {
                    return Promise.resolve(cachedPropertiesByGroup[propertyGroupId]);
                }
                return $.ajax({
                    url: `/api/properties/groups/${propertyGroupId}/properties`,
                    method: 'GET'
                }).then(function(response) {
                    cachedPropertiesByGroup[propertyGroupId] = response.data || [];
                    return cachedPropertiesByGroup[propertyGroupId];
                });
            }

            function createNewPropertyRow(index, groups) {
                const groupOptions = groups.map(g =>
                    `<option value="${g.propertyGroupId}">${g.propertyGroupId}</option>`
                ).join('');

                return `
                    <tr class="sp-row-crud-created" data-new-index="${index}" data-is-new="true">
                        <td class="sp-prop-checkbox">
                            <input type="checkbox" name="propertySectionCheck"
                                   class="new-property-checkbox" data-new-index="${index}">
                        </td>
                        <td class="sp-prop-crud"><span class="badge bg-success">C</span></td>
                        <td>
                            <select class="form-select form-select-sm new-row-group-select"
                                    data-field="propertyGroupId" data-new-index="${index}">
                                <option value="">선택</option>
                                ${groupOptions}
                            </select>
                        </td>
                        <td>
                            <select class="form-select form-select-sm new-row-key-select"
                                    data-field="propertyId" data-new-index="${index}" disabled>
                                <option value="">그룹을 먼저 선택</option>
                            </select>
                        </td>
                        <td class="sp-prop-default new-row-default" data-new-index="${index}">-</td>
                        <td>
                            <input type="text" class="form-control form-control-sm"
                                   data-field="propertyValue" data-new-index="${index}"
                                   placeholder="설정값">
                        </td>
                        <td>
                            <input type="text" class="form-control form-control-sm"
                                   data-field="propertyDesc" data-new-index="${index}"
                                   placeholder="특이사항">
                        </td>
                    </tr>
                `;
            }

            function bindNewRowEvents(index) {
                const $row = $(`tr[data-new-index="${index}"]`);

                // 프로퍼티그룹 선택 시 → 프로퍼티ID 셀렉트 갱신
                $row.find('.new-row-group-select').on('change', function() {
                    const groupId = $(this).val();
                    const $keySelect = $row.find('.new-row-key-select');
                    const $defaultCell = $row.find('.new-row-default');

                    newPropertyRows[index].propertyGroupId = groupId;
                    newPropertyRows[index].propertyId = '';
                    $defaultCell.text('-');

                    if (!groupId) {
                        $keySelect.html('<option value="">그룹을 먼저 선택</option>').prop('disabled', true);
                        return;
                    }

                    $keySelect.html('<option value="">불러오는 중...</option>').prop('disabled', true);

                    loadPropertiesByGroup(groupId).then(function(properties) {
                        const keyOptions = properties.map(p =>
                            `<option value="${p.propertyId}" data-default="${p.defaultValue || ''}">${p.propertyId}</option>`
                        ).join('');
                        $keySelect.html('<option value="">선택</option>' + keyOptions).prop('disabled', false);
                    }).catch(function() {
                        $keySelect.html('<option value="">조회 실패</option>');
                    });
                });

                // 프로퍼티ID 선택 시 → 초기값 표시 + 데이터 동기화
                $row.find('.new-row-key-select').on('change', function() {
                    const propertyId = $(this).val();
                    const defaultValue = $(this).find('option:selected').data('default') || '-';
                    newPropertyRows[index].propertyId = propertyId;
                    $row.find('.new-row-default').text(defaultValue || '-');
                });

                // 설정값, 특이사항 입력 동기화
                $row.find('input[data-field]').on('input', function() {
                    const field = $(this).data('field');
                    newPropertyRows[index][field] = $(this).val();
                });
            }

            function addPropertyRow() {
                const instanceId = $('#sectionInstanceId').val();
                if (!instanceId) {
                    Toast.warning('WAS 인스턴스를 먼저 선택해주세요.');
                    return;
                }

                loadPropertyGroups().then(function(groups) {
                    const newIndex = newPropertyRows.length;
                    newPropertyRows.push({
                        instanceId: instanceId,
                        propertyGroupId: '',
                        propertyId: '',
                        propertyValue: '',
                        propertyDesc: ''
                    });

                    // "등록된 프로퍼티가 없습니다" 메시지 제거
                    $('#propertySectionTableBody').find('td[colspan]').closest('tr').remove();

                    $('#propertySectionTableBody').append(createNewPropertyRow(newIndex, groups));
                    bindNewRowEvents(newIndex);

                    // 프로퍼티그룹 셀렉트에 포커스
                    $(`tr[data-new-index="${newIndex}"] .new-row-group-select`).focus();
                });
            }

            function deleteSelectedProperties() {
                const $checked = $('input[name="propertySectionCheck"]:checked');
                if ($checked.length === 0) {
                    Toast.warning('삭제할 항목을 선택해주세요.');
                    return;
                }

                // 새로 추가된 행과 기존 행 분리
                const $newChecked = $checked.filter('.new-property-checkbox');
                const $existingChecked = $checked.not('.new-property-checkbox');

                // 새로 추가된 행은 바로 DOM에서 제거
                $newChecked.each(function() {
                    const idx = $(this).data('new-index');
                    newPropertyRows[idx] = null;
                    $(this).closest('tr').remove();
                });

                // 기존 행은 CRUD "삭제" 표시 (저장 시 일괄 처리)
                $existingChecked.each(function() {
                    const $row = $(this).closest('tr');
                    const index = parseInt($row.data('index'));

                    propertyChanges[index] = { crud: 'D' };
                    $(`td.sp-prop-crud[data-index="${index}"]`).text('삭제');
                    $row.addClass('sp-row-crud-deleted').removeClass('sp-row-modified-bg');
                    $row.find('.sp-editable').off('click'); // 편집 비활성화
                    $row.find('input[type="checkbox"]').prop('checked', false);
                });
            }

            function closePropertySection() {
                $('#propertyModalBackdrop').removeClass('show');
                $('#propertySection').removeClass('active');
            }

            function savePropertiesSection() {
                const instanceId = $('#sectionInstanceId').val();
                const requests = [];

                // 1. 기존 행 변경 (수정/삭제)
                Object.keys(propertyChanges).forEach(function(idx) {
                    const change = propertyChanges[idx];
                    const orig = originalProperties[idx];
                    if (!orig) return;

                    if (change.crud === 'D') {
                        requests.push({
                            instanceId: orig.instanceId || instanceId,
                            propertyGroupId: orig.propertyGroupId,
                            propertyId: orig.propertyId,
                            propertyValue: orig.propertyValue || '',
                            propertyDesc: orig.propertyDesc || '',
                            crud: 'D'
                        });
                    } else if (change.crud === 'U') {
                        requests.push({
                            instanceId: orig.instanceId || instanceId,
                            propertyGroupId: orig.propertyGroupId,
                            propertyId: orig.propertyId,
                            propertyValue: change.propertyValue !== undefined ? change.propertyValue : orig.propertyValue || '',
                            propertyDesc: change.propertyDesc !== undefined ? change.propertyDesc : orig.propertyDesc || '',
                            crud: 'U'
                        });
                    }
                });

                // 2. 새로 추가된 행 (생성)
                let hasIncompleteRow = false;
                newPropertyRows.forEach(function(r) {
                    if (!r) return;
                    if (!r.propertyGroupId || !r.propertyId) {
                        hasIncompleteRow = true;
                        return;
                    }
                    requests.push({
                        instanceId: instanceId,
                        propertyGroupId: r.propertyGroupId,
                        propertyId: r.propertyId,
                        propertyValue: r.propertyValue || '',
                        propertyDesc: r.propertyDesc || '',
                        crud: 'C'
                    });
                });

                if (hasIncompleteRow) {
                    Toast.warning('새 행의 프로퍼티그룹ID와 프로퍼티ID를 선택해주세요.');
                    return;
                }

                if (requests.length === 0) {
                    Toast.warning('변경된 항목이 없습니다.');
                    return;
                }

                $.ajax({
                    url: '/api/was/property/batch',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(requests),
                    success: function(response) {
                        const count = response.data || 0;
                        if (count > 0) {
                            Toast.success(count + '개의 프로퍼티가 처리되었습니다.');
                        } else {
                            Toast.warning('처리된 항목이 없습니다.');
                        }
                        // 캐시 무효화
                        invalidateAllPropertyCache();
                        newPropertyRows = [];
                        propertyChanges = {};
                        loadPropertyGroupDropdown(instanceId);
                        loadPropertyData(instanceId, false);
                    },
                    error: function(xhr) {
                        const msg = xhr.responseJSON?.message || '저장 중 오류가 발생했습니다.';
                        Toast.error(msg);
                    }
                });
            }

            function compareAllProperties() {

                const instance2 = $('#was2iSelectInstance').val();
                
                if (!instance1 || !instance2) {
                    Toast.warning('비교할 두 개의 WAS 인스턴스를 선택해주세요.');
                    return;
                }
                
                if (instance1 === instance2) {
                    Toast.warning('같은 인스턴스는 비교할 수 없습니다.');
                    return;
                }
                
                // API 호출
                $.ajax({
                    url: '/api/was/property/compare',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        instanceId1: instance1,
                        instanceId2: instance2,
                        propertyGroupIds: []
                    }),
                    success: function(response) {
                        showOriginalCompareModal(response.data, instance1, instance2);
                    },
                    error: function(xhr) {
                        console.error('비교 실패:', xhr);
                        Toast.error('비교 실패: ' + (xhr.responseJSON?.message || '알 수 없는 오류'));
                    }
                });
            }
            
            function compareSelectedProperties() {
                const instance1 = $('#sectionInstanceId').val();
                const instance2 = $('#was2iSelectInstance').val();
                const selectedGroup = $('#sectionPropertyGroup').val();
                
                if (!instance1 || !instance2) {
                    Toast.warning('비교할 두 개의 WAS 인스턴스를 선택해주세요.');
                    return;
                }
                
                if (instance1 === instance2) {
                    Toast.warning('같은 인스턴스는 비교할 수 없습니다.');
                    return;
                }
                
                if (!selectedGroup) {
                    Toast.warning('비교할 프로퍼티 그룹을 선택해주세요.');
                    return;
                }
                
                // API 호출
                $.ajax({
                    url: '/api/was/property/compare',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        instanceId1: instance1,
                        instanceId2: instance2,
                        propertyGroupIds: [selectedGroup]
                    }),
                    success: function(response) {
                        showOriginalCompareModal(response.data, instance1, instance2);
                    },
                    error: function(xhr) {
                        console.error('비교 실패:', xhr);
                        Toast.error('비교 실패: ' + (xhr.responseJSON?.message || '알 수 없는 오류'));
                    }
                });
            }
            
            function showOriginalCompareModal(data, instance1, instance2) {
                $('#compareResultModal').remove();
                
                const modalHtml = `
                    <div id="compareResultModal" class="sp-compare-overlay">
                        <div class="sp-compare-dialog">
                            <div class="sp-compare-header">
                                <h3>${instance2}와 ${instance1} 프로퍼티 비교</h3>
                                <button onclick="closeOriginalCompareModal()" class="sp-compare-close-btn">&times;</button>
                            </div>
                            <div class="sp-compare-toolbar">
                                <button onclick="exportOriginalCompareResult()" class="sp-compare-toolbar-btn"><i class="bi bi-file-earmark-excel"></i> 엑셀</button>
                                <button onclick="window.print()" class="sp-compare-toolbar-btn"><i class="bi bi-printer"></i> 출력</button>
                            </div>
                            <div class="sp-compare-body">
                                <table class="sp-compare-table">
                                    <thead><tr>
                                        <th>프로퍼티그룹ID</th>
                                        <th>프로퍼티ID</th>
                                        <th class="col-w-150">초기값</th>
                                        <th class="col-w-80 text-danger">비교결과</th>
                                        <th class="col-w-150 sp-editable-new-bg">${instance2} 설정값</th>
                                        <th class="col-w-150 sp-compare-bg-warm">${instance1} 설정값</th>

                                    <tbody id="originalCompareTableBody"></tbody>
                                </table>

                            <div class="sp-compare-footer">
                                <div class="sp-compare-footer-left">
                                    <button class="sp-compare-instance-btn">${instance1}</button>
