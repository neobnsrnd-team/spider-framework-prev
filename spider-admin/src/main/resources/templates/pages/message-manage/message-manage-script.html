<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- Message Page Scripts -->
<th:block th:fragment="script">
    <!-- Styles moved to app.css (sp-field-tbody, sp-resize-h/v, sp-cg-picker, etc.) -->
    <script th:inline="javascript">
        const HAS_MESSAGE_WRITE = /*[[${userAuthorities != null and userAuthorities.contains('MESSAGE:W')}]]*/ false;
    </script>
    <script>
        (function() {
        // ==================== Security Utilities ====================

        function getUserFriendlyErrorMessage(error) {
            let message = '요청 처리 중 오류가 발생했습니다.';

            if (!error) return message;

            if (error.response && error.response.data) {
                const data = error.response.data;
                if (data.message) {
                    message = data.message;
                }
                if (data.errors && Array.isArray(data.errors)) {
                    message = data.errors.map(e => e.message || e).join('\n');
                }
            } else if (error.responseJSON) {
                if (error.responseJSON.message) {
                    message = error.responseJSON.message;
                }
            } else if (error.message) {
                if (error.message.includes('Network Error')) {
                    message = '네트워크 연결을 확인해주세요.';
                } else if (error.message.includes('timeout')) {
                    message = '요청 시간이 초과되었습니다.';
                }
            }

            message = message.replace(/<[^>]*>/g, '');
            return message;
        }

        /**
         * Debounce 함수 - API 호출 최적화
         */
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // ==================== Validation Utilities ====================

        const Validators = {
            /**
             * 전문ID 검증
             */
            messageId: function(value) {
                if (!value) {
                    return '전문ID를 입력하세요.';
                }
                if (value.length > 50) {
                    return '전문ID는 50자 이하여야 합니다.';
                }
                if (!/^[a-zA-Z0-9_-]+$/.test(value)) {
                    return '영문, 숫자, 언더스코어(_), 하이픈(-)만 사용 가능합니다.';
                }
                return null;
            },

            /**
             * 전문명 검증
             */
            messageName: function(value) {
                if (!value) {
                    return '전문명을 입력하세요.';
                }
                if (value.length > 100) {
                    return '전문명은 100자 이하여야 합니다.';
                }
                return null;
            },

            /**
             * 전문타입 검증
             */
            messageType: function(value) {
                if (!value) {
                    return '전문타입을 선택하세요.';
                }
                return null;
            },

            /**
             * 기관ID 검증
             */
            orgId: function(value) {
                if (!value) {
                    return '기관ID를 선택하세요.';
                }
                return null;
            },

            /**
             * 상위전문ID 검증 (선택)
             */
            parentMessageId: function(value) {
                if (!value) {
                    return null; // 선택사항
                }
                if (value.length > 50) {
                    return '상위전문ID는 50자 이하여야 합니다.';
                }
                return null;
            },

            /**
             * SITE구분 검증 (필수)
             */
            bizDomain: function(value) {
                if (!value) {
                    return 'SITE구분을 선택하세요.';
                }
                return null;
            }
        };

        // ==================== Messages Object ====================

        window.Messages = window.Messages || {
            currentPage: 1,
            totalItems: 0,
            itemsPerPage: 10,
            sortBy: null,
            sortDirection: null,
            messagesData: [],
            orgs: [],

            init: function() {
                this.loadOrgs();
                this.loadMessageTypes();
                this.loadValidationRules();
                this.bindEvents();
            },

            loadMessageTypes: function() {
                $.ajax({
                    url: API_BASE_URL + '/messages/types',
                    method: 'GET',
                    success: (response) => {
                        if (response.success && response.data) {
                            const select = $('#messageTypeFilter');
                            select.find('option:not(:first)').remove();
                            response.data.forEach(type => {
                                select.append(`<option value="${HtmlUtils.escape(type.code)}">${HtmlUtils.escape(type.name)}</option>`);
                            });
                        }
                    },
                    error: (xhr) => {
                        console.error('Failed to load message types:', xhr);
                    }
                });
            },

            loadValidationRules: function() {
                $.ajax({
                    url: API_BASE_URL + '/messages/validation-rules',
                    method: 'GET',
                    success: (response) => {
                        if (response.success && response.data) {
                            VALIDATION_RULE_OPTIONS = response.data;
                        }
                    },
                    error: (xhr) => console.error('Failed to load validation rules:', xhr)
                });
            },

            loadOrgs: function() {
                $.ajax({
                    url: API_BASE_URL + '/orgs/list',
                    method: 'GET',
                    success: (response) => {
                        if (response.success && response.data) {
                            this.orgs = response.data;
                            this.renderOrgOptions();
                        }
                    },
                    error: (xhr) => {
                        console.error('Failed to load orgs:', xhr);
                    }
                });
            },

            renderOrgOptions: function() {
                // 모달용 select
                const modalOrgId = $('#modalOrgId');
                modalOrgId.find('option:not(:first)').remove();
                this.orgs.forEach(org => {
                    const orgId = HtmlUtils.escape(org.orgId);
                    const orgName = HtmlUtils.escape(org.orgName);
                    modalOrgId.append(`<option value="${orgId}">${orgName} (${orgId})</option>`);
                });

                // 검색조건 기관명 select
                const orgFilter = $('#orgIdFilter');
                orgFilter.find('option:not(:first)').remove();
                this.orgs.forEach(org => {
                    const orgId = HtmlUtils.escape(org.orgId);
                    const orgName = HtmlUtils.escape(org.orgName);
                    orgFilter.append(`<option value="${orgId}">${orgName}</option>`);
                });
            },

            bindEvents: function() {
                $('#messageTable thead th[data-sort]').off('click').on('click', function() {
                    const sortKey = $(this).data('sort');
                    if (!sortKey) return;

                    if (window.Messages.sortBy === sortKey) {
                        window.Messages.sortDirection = window.Messages.sortDirection === 'ASC' ? 'DESC' : 'ASC';
                    } else {
                        window.Messages.sortBy = sortKey;
                        window.Messages.sortDirection = 'ASC';
                    }
                    $('#sortSelect').val('');
                    window.Messages.updateSortIndicators();
                    window.Messages.load();
                });

                $('#limitRows').change(function() {
                    window.Messages.itemsPerPage = parseInt($(this).val()) || 10;
                    window.Messages.currentPage = 1;
                    window.Messages.load();
                });

                $('#orgIdFilter').change(function() {
                    window.Messages.loadParentMessages($(this).val());
                });
            },

            loadParentMessages: function(orgId) {
                const select = $('#parentMessageIdFilter');
                select.find('option:not(:first)').remove();
                if (!orgId) return;

                $.ajax({
                    url: API_BASE_URL + '/messages/headers',
                    method: 'GET',
                    data: { orgId: orgId },
                    success: (response) => {
                        if (response.success && response.data) {
                            response.data.forEach(msg => {
                                const id = HtmlUtils.escape(msg.messageId);
                                const name = HtmlUtils.escape(msg.messageName);
                                select.append(`<option value="${id}">${id} (${name})</option>`);
                            });
                        }
                    },
                    error: (xhr) => {
                        console.error('Failed to load parent messages:', xhr);
                    }
                });
            },

            toggleLock: function(index) {
                const msg = this.messagesData[index];
                if (!msg) return;

                const newLockYn = msg.lockYn === 'Y' ? 'N' : 'Y';
                const confirmMsg = newLockYn === 'Y'
                    ? '해당 전문을 잠그시겠습니까?'
                    : '해당 전문의 잠금을 해제하시겠습니까?';

                Toast.confirm(confirmMsg, () => {
                    const url = API_BASE_URL + '/messages/' + encodeURIComponent(msg.messageId) +
                                '?orgId=' + encodeURIComponent(msg.orgId);

                    $.ajax({
                        url: url,
                        method: 'PUT',
                        contentType: 'application/json',
                        data: JSON.stringify({ lockYn: newLockYn }),
                        success: (response) => {
                            if (response.success) {
                                msg.lockYn = newLockYn;
                                const btn = $(`button[data-action="toggleLock"][data-index="${index}"]`);
                                if (newLockYn === 'Y') {
                                    btn.text('Y').removeClass('sp-lock-inactive').addClass('sp-lock-active');
                                } else {
                                    btn.text('N').removeClass('sp-lock-active').addClass('sp-lock-inactive');
                                }
                                Toast.success('처리가 완료 되었습니다.');
                            } else {
                                Toast.error('잠금 상태 변경 실패\n' + (response.message || '알 수 없는 오류'));
                            }
                        },
                        error: (xhr) => {
                            Toast.error('잠금 상태 변경 실패\n' + getUserFriendlyErrorMessage(xhr));
                        }
                    });
                });
            },

            onSortSelectChange: function() {
                const val = $('#sortSelect').val();
                if (val) {
                    this.sortBy = val;
                    this.sortDirection = 'ASC';
                } else {
                    this.sortBy = null;
                    this.sortDirection = null;
                }
                this.updateSortIndicators();
                this.currentPage = 1;
                this.load();
            },

            load: function() {
                const searchParams = {
                    searchField: $('#searchField').val(),
                    searchValue: $('#searchValue').val(),
                    orgIdFilter: $('#orgIdFilter').val(),
                    headerYnFilter: $('#headerYnFilter').val(),
                    parentMessageIdFilter: $('#parentMessageIdFilter').val(),
                    messageTypeFilter: $('#messageTypeFilter').val(),
                    page: this.currentPage,
                    size: this.itemsPerPage,
                    sortBy: this.sortBy || undefined,
                    sortDirection: this.sortDirection || undefined
                };

                $.ajax({
                    url: API_BASE_URL + '/messages/page',
                    method: 'GET',
                    data: searchParams,
                    success: (response) => {
                        if (response.success) {
                            const pageData = response.data;
                            this.totalItems = pageData.totalElements;
                            this.messagesData = pageData.content;
                            this.renderTable(pageData.content);
                            this.renderPagination();
                        } else {
                            Toast.error('조회 실패: ' + (response.message || '알 수 없는 오류'));
                        }
                    },
                    error: (xhr) => {
                        console.error('Failed to load messages:', xhr);
                        const errorMsg = getUserFriendlyErrorMessage(xhr);
                        Toast.info(errorMsg);
                    }
                });
            },

            renderTable: function(messages) {
                const tbody = $('#messageTableBody');
                tbody.empty();

                if (!messages || messages.length === 0) {
                    const actionColCount = HAS_MESSAGE_WRITE ? 9 : 5;
                    tbody.append(`
                        <tr>
                            <td colspan="${actionColCount}" class="text-center py-4 text-body-secondary">
                                조회된 데이터가 없습니다.
                            </td>
                        </tr>
                    `);
                    return;
                }

                const getOrgName = (orgId) => {
                    const org = window.Messages.orgs.find(o => o.orgId === orgId);
                    return org ? HtmlUtils.escape(org.orgName) : HtmlUtils.escape(orgId);
                };

                messages.forEach((msg, index) => {
                    const lockBtnClass = msg.lockYn === 'Y' ? 'sp-lock-active' : 'sp-lock-inactive';
                    const lockBtnLabel = msg.lockYn === 'Y' ? 'Y' : 'N';

                    const actionCols = HAS_MESSAGE_WRITE ? `
                        <td class="text-center">
                            <button class="btn btn-outline-secondary btn-sm" data-action="backup" data-index="${index}">백업</button>
                        </td>
                        <td class="text-center">
                            <button class="btn btn-outline-secondary btn-sm" data-action="restore" data-index="${index}">복원</button>
                        </td>
                        <td class="text-center">
                            <button class="btn btn-outline-secondary btn-sm ${lockBtnClass}" data-action="toggleLock" data-index="${index}">${lockBtnLabel}</button>
                        </td>
                        <td class="text-center">
                            <button class="btn btn-outline-secondary btn-sm" data-action="reload" data-index="${index}">Reload</button>
                        </td>` : '';

                    const row = $(`
                        <tr data-message-index="${index}" class="cursor-pointer">
                            <td>${getOrgName(msg.orgId)}</td>
                            <td>${HtmlUtils.escape(msg.messageId)}</td>
                            <td>${HtmlUtils.escape(msg.messageName)}</td>
                            <td>${HtmlUtils.escape(msg.parentMessageId || '')}</td>
                            <td class="text-center">${msg.curVersion ?? ''}</td>
                            ${actionCols}
                        </tr>
                    `);

                    row.on('click', function(e) {
                        if ($(e.target).is('button') || $(e.target).closest('button').length) return;
                        const msgIndex = $(this).data('message-index');
                        const msgData = window.Messages.messagesData[msgIndex];
                        window.MessageDetailModal.open(msgData.orgId, msgData.messageId);
                    });

                    row.find('button[data-action="toggleLock"]').on('click', function(e) {
                        e.stopPropagation();
                        window.Messages.toggleLock(parseInt($(this).data('index')));
                    });

                    row.find('button[data-action="reload"]').on('click', function(e) {
                        e.stopPropagation();
                        const msgIndex = parseInt($(this).data('index'));
                        const msgData = window.Messages.messagesData[msgIndex];
                        WasSelectReloadModal.open({
                            onExecute: function(instanceIds) {
                                $.ajax({
                                    url: API_BASE_URL + '/reload/execute',
                                    method: 'POST',
                                    contentType: 'application/json',
                                    data: JSON.stringify({
                                        reloadType: 'message',
                                        instanceIds: instanceIds,
                                        additionalParams: {
                                            orgId: msgData.orgId,
                                            messageId: msgData.messageId
                                        }
                                    }),
                                    success: function(response) {
                                        if (response.success && response.data) {
                                            WasSelectReloadModal.showResults(response.data.results);
                                        } else {
                                            WasSelectReloadModal.resetButton();
                                            Toast.error(response.message || 'Reload 실행에 실패했습니다.');
                                        }
                                    },
                                    error: function(xhr) {
                                        WasSelectReloadModal.resetButton();
                                        Toast.error(xhr.responseJSON?.message || 'Reload 실행 중 오류가 발생했습니다.');
                                    }
                                });
                            }
                        });
                    });

                    row.find('button[data-action="backup"]').on('click', function(e) {
                        e.stopPropagation();
                        const msgIndex = parseInt($(this).data('index'));
                        const msgData = window.Messages.messagesData[msgIndex];
                        window.MessageDetailModal.currentOrgId = msgData.orgId;
                        window.MessageDetailModal.currentMessageId = msgData.messageId;
                        window.MessageDetailModal.openBackupModal();
                    });

                    row.find('button[data-action="restore"]').on('click', function(e) {
                        e.stopPropagation();
                        const msgIndex = parseInt($(this).data('index'));
                        const msgData = window.Messages.messagesData[msgIndex];
                        window.MessageDetailModal.currentOrgId = msgData.orgId;
                        window.MessageDetailModal.currentMessageId = msgData.messageId;
                        window.MessageDetailModal.openRestoreModal();
                    });

                    tbody.append(row);
                });
            },

            renderPagination: function() {
                const totalPages = Math.ceil(this.totalItems / this.itemsPerPage);
                const pagination = $('#pagination');
                pagination.empty();

                pagination.append(`
                    <li class="page-item ${this.currentPage === 1 ? 'disabled' : ''}">
                        <a class="page-link" href="#" onclick="window.Messages.changePage(1); return false;">
                            <i class="bi bi-chevron-double-left"></i>
                        </a>
                    </li>
                    <li class="page-item ${this.currentPage === 1 ? 'disabled' : ''}">
                        <a class="page-link" href="#" onclick="window.Messages.changePage(${this.currentPage - 1}); return false;">
                            <i class="bi bi-chevron-left"></i>
                        </a>
                    </li>
                `);

                const maxButtons = 5;
                let startPage = Math.max(1, this.currentPage - Math.floor(maxButtons / 2));
                let endPage = Math.min(totalPages, startPage + maxButtons - 1);

                if (endPage - startPage + 1 < maxButtons) {
                    startPage = Math.max(1, endPage - maxButtons + 1);
                }

                for (let i = startPage; i <= endPage; i++) {
                    pagination.append(`
                        <li class="page-item ${i === this.currentPage ? 'active' : ''}">
                            <a class="page-link" href="#" onclick="window.Messages.changePage(${i}); return false;">${i}</a>
                        </li>
                    `);
                }

                pagination.append(`
                    <li class="page-item ${this.currentPage === totalPages || totalPages === 0 ? 'disabled' : ''}">
                        <a class="page-link" href="#" onclick="window.Messages.changePage(${this.currentPage + 1}); return false;">
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </li>
                    <li class="page-item ${this.currentPage === totalPages || totalPages === 0 ? 'disabled' : ''}">
                        <a class="page-link" href="#" onclick="window.Messages.changePage(${totalPages}); return false;">
                            <i class="bi bi-chevron-double-right"></i>
                        </a>
                    </li>
                `);

                const start = this.totalItems === 0 ? 0 : (this.currentPage - 1) * this.itemsPerPage + 1;
                const end = Math.min(this.currentPage * this.itemsPerPage, this.totalItems);
                $('#pageInfo').text(`${start} - ${end} of ${this.totalItems} items`);
            },

            changePage: function(page) {
                const totalPages = Math.ceil(this.totalItems / this.itemsPerPage);
                if (page < 1 || page > totalPages) return;
                this.currentPage = page;
                this.load();
            },

            updateSortIndicators: function() {
                const headers = $('#messageTable thead th[data-sort]');
                headers.removeClass('sort-asc sort-desc');

                if (!this.sortBy || !this.sortDirection) {
                    return;
                }

                headers.filter(`[data-sort="${this.sortBy}"]`)
                    .addClass(this.sortDirection === 'ASC' ? 'sort-asc' : 'sort-desc');
            },

            resetSearch: function() {
                $('#searchField').val('messageId');
                $('#searchValue').val('');
                $('#orgIdFilter').val('');
                $('#headerYnFilter').val('');
                $('#parentMessageIdFilter').find('option:not(:first)').remove();
                $('#parentMessageIdFilter').val('');
                $('#sortSelect').val('');
                $('#messageTypeFilter').val('');
                this.currentPage = 1;
                this.sortBy = null;
                this.sortDirection = null;
                this.updateSortIndicators();
                this.load();
            }
        };

        // ==================== Shared Field Table Utilities ====================

        /**
         * 필드 테이블 공통 렌더링
         * @param {Array}   fields      - 필드 목록
         * @param {string}  messageType - 전문유형 ('X' = XML)
         * @param {{thead:string, theadXml:string, tbody:string}} ids - jQuery 선택자
         * @param {boolean} editable    - 셀 편집 기능 포함 여부 (data-row-index, editable-cell, crud-cell)
         */
        function renderFieldTable(fields, messageType, ids, editable) {
            const isXml = messageType === 'X';
            const colCount = isXml ? 15 : 19;

            $(ids.thead).toggle(!isXml);
            $(ids.theadXml).toggleClass('d-hidden', !isXml);

            const tbody = $(ids.tbody);
            tbody.empty();

            if (!fields || fields.length === 0) {
                tbody.append(`<tr><td colspan="${colCount}" class="text-center py-3 text-body-secondary">등록된 필드가 없습니다.</td></tr>`);
                return;
            }

            fields.forEach((field, index) => {
                const rowAttr = editable ? `data-row-index="${index}"` : '';
                const crud = editable
                    ? `<td class="crud-cell text-center"></td>`
                    : `<td class="text-center"></td>`;
                // editable 여부에 따라 셀 속성 생성
                const ec = (name, center) => {
                    const cls = center ? ' text-center' : '';
                    return editable ? `class="editable-cell${cls}" data-field="${name}"` : (center ? 'class="text-center"' : '');
                };

                if (isXml) {
                    tbody.append(`<tr ${rowAttr}>
                        <td class="text-center"><input type="checkbox"></td>
                        ${crud}
                        <td ${ec('sortOrder', true)}>${field.sortOrder ?? ''}</td>
                        <td ${ec('messageFieldName', false)}>${HtmlUtils.escape(field.messageFieldName)}</td>
                        <td ${ec('messageFieldId', false)}>${HtmlUtils.escape(field.messageFieldId)}</td>
                        <td ${ec('messageFieldDesc', false)}>${HtmlUtils.escape(field.messageFieldDesc ?? '')}</td>
                        <td ${ec('requiredYn', true)}>${HtmlUtils.escape(field.requiredYn)}</td>
                        <td ${ec('useMode', true)}>${HtmlUtils.escape(field.useMode)}</td>
                        <td ${ec('fieldTag', false)}>${HtmlUtils.escape(field.fieldTag)}</td>
                        <td ${ec('codeGroup', false)}>${HtmlUtils.escape(field.codeGroupName || field.codeGroup || '')}</td>
                        <td ${ec('codeMappingYn', true)}>${HtmlUtils.escape(field.codeMappingYn)}</td>
                        <td ${ec('defaultValue', false)}>${HtmlUtils.escape(field.defaultValue)}</td>
                        <td ${ec('remark', false)}>${HtmlUtils.escape(field.remark)}</td>
                        <td ${ec('logYn', true)}>${HtmlUtils.escape(field.logYn)}</td>
                        <td ${ec('validationRuleId', false)}>${HtmlUtils.escape(field.validationRuleId)}</td>
                    </tr>`);
                } else {
                    tbody.append(`<tr ${rowAttr}>
                        <td class="text-center"><input type="checkbox"></td>
                        ${crud}
                        <td ${ec('sortOrder', true)}>${field.sortOrder ?? ''}</td>
                        <td ${ec('messageFieldName', false)}>${HtmlUtils.escape(field.messageFieldName)}</td>
                        <td ${ec('messageFieldId', false)}>${HtmlUtils.escape(field.messageFieldId)}</td>
                        <td ${ec('dataType', true)}>${HtmlUtils.escape(field.dataType)}</td>
                        <td ${ec('dataLength', true)}>${field.dataLength ?? ''}</td>
                        <td ${ec('align', true)}>${HtmlUtils.escape(field.align)}</td>
                        <td ${ec('messageFieldDesc', false)}>${HtmlUtils.escape(field.messageFieldDesc ?? '')}</td>
                        <td ${ec('requiredYn', true)}>${HtmlUtils.escape(field.requiredYn)}</td>
                        <td ${ec('scale', true)}>${field.scale ?? ''}</td>
                        <td ${ec('filler', true)}>${HtmlUtils.escape(field.filler)}</td>
                        <td ${ec('useMode', true)}>${HtmlUtils.escape(field.useMode)}</td>
                        <td ${ec('codeGroup', false)}>${HtmlUtils.escape(field.codeGroupName || field.codeGroup || '')}</td>
                        <td ${ec('codeMappingYn', true)}>${HtmlUtils.escape(field.codeMappingYn)}</td>
                        <td ${ec('defaultValue', false)}>${HtmlUtils.escape(field.defaultValue)}</td>
                        <td ${ec('remark', false)}>${HtmlUtils.escape(field.remark)}</td>
                        <td ${ec('logYn', true)}>${HtmlUtils.escape(field.logYn)}</td>
                        <td ${ec('validationRuleId', false)}>${HtmlUtils.escape(field.validationRuleId)}</td>
                    </tr>`);
                }
            });
        }

        /**
         * 상위전문 옵션 로드 공통 유틸리티
         * @param {string}  selectId      - jQuery 선택자 (예: '#modalParentMessageId')
         * @param {string}  orgId         - 기관ID
         * @param {string}  selectedValue - 로드 후 선택할 값 (optional)
         * @param {boolean} showIdInText  - true: "ID (Name)" 형식, false: "Name" 만
         */
        function loadParentMessageOptions(selectId, orgId, selectedValue, showIdInText) {
            const select = $(selectId);
            select.empty().append('<option value="">선택</option>');
            if (!orgId) return;

            $.ajax({
                url: API_BASE_URL + '/messages/headers',
                method: 'GET',
                data: { orgId: orgId },
                success: (response) => {
                    if (response.success && response.data) {
                        response.data.forEach(msg => {
                            const id = HtmlUtils.escape(msg.messageId);
                            const name = HtmlUtils.escape(msg.messageName);
                            const text = showIdInText ? `${id} (${name})` : name;
                            select.append(`<option value="${id}">${text}</option>`);
                        });
                        if (selectedValue) select.val(selectedValue);
                    }
                },
                error: (xhr) => {
                    console.error('Failed to load parent messages:', xhr);
                }
            });
        }

        // ==================== Shared Field Cell Edit Utility ====================

        const DATA_TYPE_OPTIONS   = ['C', 'N', 'H', 'B', 'F', 'K', 'D', 'V', 'S'];
        const YN_OPTIONS          = ['N', 'Y'];
        const USE_MODE_OPTIONS    = ['U', 'S', 'D'];
        const ALIGN_OPTIONS       = ['L', 'R'];
        let   VALIDATION_RULE_OPTIONS = []; // GET /api/messages/validation-rules 로 로드

        function getCellEditType(fieldName) {
            if (fieldName === 'sortOrder' || fieldName === 'dataLength' || fieldName === 'scale') return 'number';
            if (fieldName === 'dataType')         return 'select-dataType';
            if (fieldName === 'align')             return 'select-align';
            if (fieldName === 'requiredYn' || fieldName === 'codeMappingYn' || fieldName === 'logYn') return 'select-yn';
            if (fieldName === 'useMode')           return 'select-useMode';
            if (fieldName === 'validationRuleId')  return 'select-validation';
            if (fieldName === 'codeGroup')         return 'popup-codeGroup';
            return 'text';
        }

        /**
         * 필드 테이블 셀 편집 이벤트 공통 바인딩
         * @param {string}   tbodySelector - 대상 tbody jQuery 선택자
         * @param {Function} getFields     - 현재 fields 배열 반환 함수 () => Array
         * @param {Function} onFieldUpdate - 값 변경 후 콜백 (rowIndex, fieldName, newValue)
         */
        function bindFieldCellEvents(tbodySelector, getFields, onFieldUpdate) {
            const $tbody = $(tbodySelector);

            // CRUD 셀: 수정 불가
            $tbody.off('click', '.crud-cell').on('click', '.crud-cell', function() {
                Toast.info('해당 필드는 수정이 불가능합니다');
            });

            // 편집 가능 셀
            $tbody.off('click', '.editable-cell').on('click', '.editable-cell', function() {
                const $cell = $(this);
                if ($cell.find('input, select').length > 0) return;

                const fieldName    = $cell.data('field');
                const rowIndex     = parseInt($cell.closest('tr').data('row-index'));
                const fields       = getFields();
                const currentValue = fields[rowIndex] != null ? String(fields[rowIndex][fieldName] ?? '') : '';
                const type         = getCellEditType(fieldName);

                function commit(newValue) {
                    if (fields[rowIndex] != null) fields[rowIndex][fieldName] = newValue;
                    $cell.empty().text(newValue);
                    if (type === 'number') $cell.addClass('cell-edited');
                    if (onFieldUpdate) onFieldUpdate(rowIndex, fieldName, newValue);
                }

                if (type === 'number') {
                    const $input = $('<input>', {
                        type: 'number', class: 'cell-edit-input w-70 text-center', value: currentValue, min: 0
                    });
                    $cell.removeClass('cell-edited').empty().append($input);
                    $input.focus().select();
                    $input.on('blur', function() { commit($input.val()); });
                    $input.on('keydown', function(e) {
                        if (e.key === 'Enter') { $input.off('blur'); commit($input.val()); }
                        else if (e.key === 'Escape') {
                            $input.off('blur');
                            $cell.empty().text(currentValue);
                            if (currentValue !== '') $cell.addClass('cell-edited');
                        }
                    });

                } else if (type.startsWith('select')) {
                    let options;
                    if      (type === 'select-dataType')   options = DATA_TYPE_OPTIONS;
                    else if (type === 'select-align')      options = ALIGN_OPTIONS;
                    else if (type === 'select-yn')         options = YN_OPTIONS;
                    else if (type === 'select-useMode')    options = USE_MODE_OPTIONS;
                    else if (type === 'select-validation') options = [''].concat(VALIDATION_RULE_OPTIONS);
                    else                                   options = [];

                    const $select = $('<select>', { class: 'cell-edit-input' });
                    options.forEach(opt =>
                        $select.append($('<option>', { value: opt, text: opt === '' ? '선택안함' : opt, selected: opt === currentValue }))
                    );
                    $cell.empty().append($select);
                    $select.focus();
                    let committed = false;
                    function doCommit() {
                        if (committed) return;
                        committed = true;
                        commit($select.val());
                    }
                    $select.on('change', doCommit).on('blur', doCommit);

                } else if (type === 'popup-codeGroup') {
                    CodeGroupPickerModal.open(function(selected) {
                        if (fields[rowIndex] != null) {
                            fields[rowIndex]['codeGroup']     = selected.codeGroupId;
                            fields[rowIndex]['codeGroupName'] = selected.codeGroupName;
                        }
                        $cell.text(selected.codeGroupName || '');
                        if (onFieldUpdate) onFieldUpdate(rowIndex, 'codeGroup', selected.codeGroupId);
                    });

                } else { // text
                    const $input = $('<input>', { type: 'text', class: 'cell-edit-input', value: currentValue });
                    $cell.empty().append($input);
                    $input.focus().select();
                    $input.on('blur', function() { commit($input.val()); });
                    $input.on('keydown', function(e) {
                        if (e.key === 'Enter') { $input.off('blur'); commit($input.val()); }
                        else if (e.key === 'Escape') { $input.off('blur'); $cell.empty().text(currentValue); }
                    });
                }
            });
        }

        // ==================== Code Group Picker Modal ====================

        window.CodeGroupPickerModal = {

            init: function() {

                $('#cgPickerSearchValue').val('');
                $('#cgPickerTableBody').html('<tr><td colspan="5" class="text-center py-3 text-body-secondary">조회 버튼을 클릭하세요</td></tr>');

            _updateSortIndicators: function() {
                $('#codeGroupPickerModal th[data-cg-sort]').each((_, th) => {
                    $(th).find('.sort-indicator').remove();
                    if ($(th).data('cg-sort') === this._sortBy) {
                        $(th).append('<span class="sort-indicator">' + (this._sortDir === 'asc' ? '▲' : '▼') + '</span>');

                });

            load: function() {
                const self        = this;
                const searchField = $('#cgPickerSearchField').val();
                const keyword     = $('#cgPickerSearchValue').val().trim();
                const size        = parseInt($('#cgPickerPageSize').val()) || 10;

                const params = { page: this._currentPage, size: size };
                if (keyword) { params.searchField = searchField; params.searchValue = keyword; }
                if (this._sortBy) { params.sortBy = this._sortBy; params.sortDirection = this._sortDir.toUpperCase(); }

                $('#cgPickerTableBody').html('<tr><td colspan="5" class="text-center py-2 text-body-secondary">로딩 중...</td></tr>');

                $.ajax({
                    url: API_BASE_URL + '/code-groups/page',
                    method: 'GET',
                    data: params,
                    success: function(response) {
                        if (response.success && response.data) {
                            self.render(response.data);
                        } else {
                            $('#cgPickerTableBody').html('<tr><td colspan="5" class="text-center py-2 text-body-secondary">데이터를 불러올 수 없습니다</td></tr>');
                        }
                    },
                    error: function() {
                        $('#cgPickerTableBody').html('<tr><td colspan="5" class="text-center py-2 text-danger">오류가 발생했습니다</td></tr>');
                    }
                });
            },

            render: function(pageData) {
                const tbody   = $('#cgPickerTableBody');
                const items   = pageData.content || [];
                tbody.empty();

                if (items.length === 0) {
                    tbody.html('<tr><td colspan="5" class="text-center py-3 text-body-secondary">검색 결과가 없습니다</td></tr>');
                } else {
                    items.forEach((item, i) => {
                        tbody.append(`<tr data-cg-id="${HtmlUtils.escape(item.codeGroupId)}" data-cg-name="${HtmlUtils.escape(item.codeGroupName)}">
                            <td class="fw-bold text-cg-id">${HtmlUtils.escape(item.codeGroupId)}</td>
                            <td>${HtmlUtils.escape(item.codeGroupName || '')}</td>
                            <td>${HtmlUtils.escape(item.codeGroupDesc || '')}</td>
                            <td class="text-center">${HtmlUtils.escape(item.bizGroupId || '')}</td>
                            <td class="text-center">${item.codeCount ?? 0}</td>
                        </tr>`);
                    });
                }

                const total   = pageData.totalElements || 0;
                const curPage = pageData.currentPage   || this._currentPage;
                const size    = pageData.size          || 10;
                this._totalPages  = pageData.totalPages || 1;
                this._currentPage = curPage;

                this.renderPagination(curPage, this._totalPages);

                const from = total === 0 ? 0 : (curPage - 1) * size + 1;
                const to   = Math.min(curPage * size, total);
                $('#cgPickerInfo').text(`${from} - ${to} of ${total} items`);
            },

            renderPagination: function(curPage, totalPages) {
                const self      = this;
                const container = $('#cgPickerPagination');
                container.empty();
                if (totalPages <= 1) return;

                const blockSize  = 10;
                const blockStart = Math.floor((curPage - 1) / blockSize) * blockSize + 1;
                const blockEnd   = Math.min(blockStart + blockSize - 1, totalPages);

                const btn = (label, page, active) => {
                    const $b = $('<button>', {
                        html:     label,
                        disabled: active,
                        class:    active ? 'btn btn-sm btn-primary' : 'btn btn-sm btn-outline-secondary'
                    });
                    if (!active) $b.on('click', function() { self._currentPage = page; self.load(); });
                    return $b;
                };

                if (blockStart > 1)        container.append(btn('◀', blockStart - 1, false));
                for (let p = blockStart; p <= blockEnd; p++) container.append(btn(p, p, p === curPage));
                if (blockEnd < totalPages) container.append(btn('▶', blockEnd + 1, false));
            }
        };

        // ==================== Shared Modal Resize Utility ====================

        function initModalResize(containerId, handleIds, minW, minH) {
            function onResizeStart(e, direction) {
                e.preventDefault();
                e.stopPropagation();
                const container = document.getElementById(containerId);
                const rect = container.getBoundingClientRect();
                container.style.position = 'fixed';
                container.style.left   = rect.left   + 'px';
                container.style.width  = rect.width  + 'px';
                container.style.top    = rect.top    + 'px';
                container.style.height = rect.height + 'px';
                container.style.maxHeight = 'none';
                container.style.maxWidth  = 'none';
                container.style.margin    = '0';
                let resizeState = {
                    direction,
                    startX: e.clientX, startY: e.clientY,
                    startTop: rect.top, startLeft: rect.left,
                    startWidth: rect.width, startHeight: rect.height,
                    startBottom: rect.top + rect.height,
                    startRight:  rect.left + rect.width
                };
                const isVertical = direction === 'top' || direction === 'bottom';
                document.body.classList.add('user-select-none');
                document.body.classList.add(isVertical ? 'cursor-ns-resize' : 'cursor-ew-resize');

                function onMove(ev) {
                    if (!resizeState) return;
                    const c = document.getElementById(containerId);
                    const { startX, startY, startTop, startLeft,
                            startWidth, startHeight, startBottom, startRight } = resizeState;
                    if (direction === 'top') {
                        const deltaY = ev.clientY - startY;
                        let newH = Math.max(minH, startHeight - deltaY);
                        let newTop = startBottom - newH;
                        if (newTop < 0) { newH = startBottom; newTop = 0; }
                        c.style.top    = newTop + 'px';
                        c.style.height = newH   + 'px';
                    } else if (direction === 'bottom') {
                        const deltaY = ev.clientY - startY;
                        let newH = Math.max(minH, startHeight + deltaY);
                        newH = Math.min(newH, window.innerHeight - startTop - 8);
                        c.style.height = newH + 'px';
                    } else if (direction === 'left') {
                        const deltaX = ev.clientX - startX;
                        let newW = Math.max(minW, startWidth - deltaX);
                        let newLeft = startRight - newW;
                        if (newLeft < 0) { newW = startRight; newLeft = 0; }
                        c.style.left  = newLeft + 'px';
                        c.style.width = newW    + 'px';
                    } else if (direction === 'right') {
                        const deltaX = ev.clientX - startX;
                        let newW = Math.max(minW, startWidth + deltaX);
                        newW = Math.min(newW, window.innerWidth - startLeft - 8);
                        c.style.width = newW + 'px';
                    }
                }
                function onUp() {
                    resizeState = null;
                    document.body.classList.remove('user-select-none', 'cursor-ns-resize', 'cursor-ew-resize');

                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                }
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            }

            Object.entries(handleIds).forEach(([dir, id]) => {
                const el = document.getElementById(id);
                if (el) el.addEventListener('mousedown', (e) => onResizeStart(e, dir));
            });
        }

        // ==================== Shared Field Table Sort Utility ====================

        /**
         * 필드 테이블 컬럼 정렬 초기화
         * data-sort-field 속성이 있는 th 클릭 시 tbody 행을 정렬합니다.
         * data-row-index는 변경하지 않고 DOM 행만 재배치하므로 셀 편집·CRUD 추적에 영향 없음.
         *
         * @param {string}   theadSelector - thead jQuery 선택자
         * @param {string}   tbodySelector - tbody jQuery 선택자
         * @param {Function} getFields     - 현재 fields 배열 반환 함수 () => Array
         */
        function initFieldTableSort(theadSelector, tbodySelector, getFields) {
            let sortField = null;
            let sortDir   = 'asc';

            $(theadSelector).off('click.sort').on('click.sort', 'th[data-sort-field]', function() {
                const field = $(this).data('sort-field');
                if (sortField === field) {
                    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
                } else {
                    sortField = field;
                    sortDir   = 'asc';
                }

                // 정렬 방향 아이콘 업데이트
                $(theadSelector).find('th[data-sort-field]').each(function() {
                    $(this).find('.sort-indicator').remove();
                    if ($(this).data('sort-field') === sortField) {
                        $(this).append(`<span class="sort-indicator">${sortDir === 'asc' ? '▲' : '▼'}</span>`);
                    }
                });

                // fields 배열 값 기준으로 DOM 행 재배치 (data-row-index 유지)
                const fields = getFields();
                const tbody  = $(tbodySelector);
                const rows   = tbody.find('tr[data-row-index]').toArray();

                rows.sort((a, b) => {
                    const ai   = parseInt($(a).data('row-index'));
                    const bi   = parseInt($(b).data('row-index'));
                    const aObj = fields[ai];
                    const bObj = fields[bi];
                    const aVal = aObj != null ? (aObj[field] ?? '') : '';
                    const bVal = bObj != null ? (bObj[field] ?? '') : '';

                    const aNum = parseFloat(aVal);
                    const bNum = parseFloat(bVal);
                    if (!isNaN(aNum) && !isNaN(bNum)) {
                        return sortDir === 'asc' ? aNum - bNum : bNum - aNum;
                    }
                    return sortDir === 'asc'
                        ? String(aVal).localeCompare(String(bVal))

                });

            /**
             * 개별 필드 검증

                const fieldIdMap = {
                    'messageId': '#modalMessageId',
                    'messageName': '#modalMessageName',
                    'messageType': '#modalMessageType',
                    'orgId': '#modalOrgId',
                    'parentMessageId': '#modalParentMessageId',
                    'bizDomain': '#modalBizDomain'
                };

                const fieldId = fieldIdMap[fieldName];
                if (!fieldId) return true;

                const value = $(fieldId).val()?.trim();
                const errorId = fieldName + 'Error';

                let errorMessage = null;

                // Validators 실행
                if (Validators[fieldName]) {
                    errorMessage = Validators[fieldName](value);
                }

                // 에러 메시지 표시/숨김
                if (errorMessage) {
                    $('#' + errorId).text(errorMessage).addClass('visible');
                    $(fieldId).closest('.form-group').addClass('has-error');
                    return false;
                } else {
                    $('#' + errorId).removeClass('visible').text('');
                    $(fieldId).closest('.form-group').removeClass('has-error');

                if (!this.validateForm()) {

                    return;

                // 헤더 저장 전 신규 필드 사전 검증 (저장 후 불완전 레코드 방지)
                const startIdx  = this._originalModalFieldCount;
                const newFields = (this.modalFields || []).slice(startIdx).filter(f => f !== null);

                if (newFields.length > 0) {
                    let isFieldValid = true;
                    newFields.forEach((f) => {
                        const rowIdx = this.modalFields.indexOf(f);
                        ['messageFieldId', 'messageFieldName'].forEach(function(key) {
                            if (!f[key] || !String(f[key]).trim()) {

                        Toast.warning('전문필드ID와 전문필드명을 입력해주세요.');
                        return;
                    }
                }

                const messageData = {
                    orgId: $('#modalOrgId').val().trim(),
                    messageId: $('#modalMessageId').val().trim(),
                    messageName: $('#modalMessageName').val().trim(),
                    messageDesc: $('#modalMessageDesc').val().trim(),
                    messageType: $('#modalMessageType').val(),
                    parentMessageId: $('#modalParentMessageId').val().trim(),
                    bizDomain: $('#modalBizDomain').val().trim(),
                    headerYn: $('#modalHeaderYn').val(),
                    requestYn: $('#modalRequestYn').val(),
                    trxType: $('#modalTrxType').val() || '1',
                    logLevel: $('#modalLogLevel').val(),
                    preLoadYn: $('#modalPreLoadYn').val(),
                    validationUseYn: $('#modalValidationUseYn').val() || 'N',
                    lockYn: $('#modalLockYn').val() || 'N',
                    curVersion: parseInt($('#modalCurVersion').val()) || 1
                };

                const method = this.mode === 'create' ? 'POST' : 'PUT';
                let url = API_BASE_URL + '/messages';
                if (this.mode === 'edit') {
                    url = API_BASE_URL + '/messages/' + encodeURIComponent(this.currentMessageId) +
                          '?orgId=' + encodeURIComponent(this.currentOrgId);

                $.ajax({
                    url: url,
                    method: method,
                    contentType: 'application/json',

                            const savedOrgId     = messageData.orgId;
                            const savedMessageId = messageData.messageId;

                            if (newFields.length === 0) {
                                Toast.success(this.mode === 'create' ? '전문이 등록되었습니다.' : '전문이 수정되었습니다.');

                                window.Messages.load();
                                return;

                            // 필수값 검증은 저장 요청 전 완료됨

                            const toInt = (v) => { const n = parseInt(v); return isNaN(n) ? null : n; };
                            const fieldBodies = newFields.map(f => ({
                                orgId:            savedOrgId,
                                messageId:        savedMessageId,
                                messageFieldId:   f.messageFieldId,
                                sortOrder:        toInt(f.sortOrder),
                                messageFieldName: f.messageFieldName || '',
                                messageFieldDesc: f.messageFieldDesc || '',
                                dataType:         f.dataType        || '',
                                dataLength:       toInt(f.dataLength) ?? 0,
                                scale:            toInt(f.scale),
                                align:            f.align           || '',
                                filler:           f.filler          || '',
                                useMode:          f.useMode         || '',
                                requiredYn:       f.requiredYn      || '',
                                fieldTag:         f.fieldTag        || '',
                                codeGroup:        f.codeGroup       || '',
                                codeMappingYn:    f.codeMappingYn   || '',
                                defaultValue:     f.defaultValue    || '',
                                remark:           f.remark          || '',
                                logYn:            f.logYn           || '',
                                validationRuleId: f.validationRuleId || ''
                            }));

                            $.ajax({
                                url:         API_BASE_URL + '/messages/' + encodeURIComponent(savedMessageId) + '/fields/batch',
                                method:      'POST',
                                contentType: 'application/json',
                                data:        JSON.stringify({ fields: fieldBodies }),
                                success: () => {

                                    this.close();

                                },
                                error: (xhr) => {
                                    Toast.error('필드 저장 실패\n' + getUserFriendlyErrorMessage(xhr));
                                }
                            });
                        } else {
                            const errorMsg = getUserFriendlyErrorMessage(response);
                            Toast.error('저장 실패\n' + errorMsg);
                        }
                    },
                    error: (xhr) => {
                        const errorMsg = getUserFriendlyErrorMessage(xhr);

                    }
                });

            save: function() {
                if (!this.currentOrgId || !this.currentMessageId) return;

                // 필수값 검증
                const requiredFields = ['detailMessageName', 'detailMessageType', 'detailSiteType'];
                let isValid = true;
                requiredFields.forEach(id => {
                    const $el = $('#' + id);
                    if (!$el.val()?.trim()) {
                        $el.addClass('detail-field-error');
                        $el.off('input.validation change.validation')
                           .one('input.validation change.validation', function() {
                               $(this).removeClass('detail-field-error');
                           });
                        isValid = false;
                    } else {
                        $el.removeClass('detail-field-error');
                    }
                });
                if (!isValid) return;

                // 추가 행 중 전문필드ID 누락 검증
                const compareKeys = ['sortOrder','messageFieldName','messageFieldId','dataType',
                                     'dataLength','align','requiredYn','scale','filler','useMode',
                                     'codeGroup','codeMappingYn','defaultValue','remark','logYn',
                                     'validationRuleId','fieldTag','messageFieldDesc'];
                const deletedFieldIds = [];
                const newFields       = [];
                const updatedFields   = [];
                const maxLen = Math.max(this.currentFields.length, (this.originalFields || []).length);
                let isFieldValid = true;

                for (let i = 0; i < maxLen; i++) {
                    const cur  = this.currentFields[i]  ?? null;
                    const orig = (this.originalFields || [])[i] ?? null;

                    if (cur === null && orig !== null) {
                        deletedFieldIds.push(orig.messageFieldId);
                    } else if (cur !== null && orig === null) {
                        // 새로 추가된 행 필수값 검증 (전체 순회 후 판단)
                        const textKeys = ['messageFieldId', 'messageFieldName'];
                        textKeys.forEach(function(key) {
                            if (!cur[key] || !String(cur[key]).trim()) {
                                const $cell = $('#messageFieldsTableBody tr[data-row-index="' + i + '"] td[data-field="' + key + '"]');
                                $cell.addClass('field-cell-error');
                                $cell.off('mousedown.fieldErr click.fieldErr').on('mousedown.fieldErr click.fieldErr', function() {
                                    $(this).removeClass('field-cell-error');
                                });
                                isFieldValid = false;
                            }
                        });
                        newFields.push(cur);
                    } else if (cur !== null && orig !== null) {
                        let hasChanges = false;
                        for (const key of compareKeys) {
                            if (String(cur[key] ?? '') !== String(orig[key] ?? '')) {
                                hasChanges = true; break;
                            }
                        }
                        if (hasChanges) updatedFields.push(cur);
                    }
                }

                if (!isFieldValid) return;

                const orgId     = this.currentOrgId;
                const messageId = this.currentMessageId;
                const self      = this;
                const baseUrl   = API_BASE_URL + '/messages/' + encodeURIComponent(messageId);

                // 1단계: 전문 기본정보 저장
                const headerData = {
                    messageName:     $('#detailMessageName').val().trim(),
                    messageDesc:     $('#detailMessageDesc').val().trim(),
                    messageType:     $('#detailMessageType').val(),
                    parentMessageId: $('#detailParentMessageId').val() || null,
                    headerYn:        $('#detailIsHeader').val(),
                    requestYn:       $('#detailReqResType').val(),
                    preLoadYn:       $('#detailPreload').val(),
                    logLevel:        $('#detailLogLevel').val(),
                    bizDomain:       $('#detailSiteType').val()
                };

                $.ajax({
                    url: baseUrl + '?orgId=' + encodeURIComponent(orgId),
                    method: 'PUT',
                    contentType: 'application/json',
                    data: JSON.stringify(headerData),
                    success: function(response) {
                        if (!response.success) {
                            Toast.error('저장 실패\n' + (response.message || '알 수 없는 오류'));
                            return;
                        }
                        // 2단계: 필드 변경사항 저장
                        self._saveFieldChanges(orgId, messageId, deletedFieldIds, newFields, updatedFields);
                    },
                    error: function(xhr) {
                        Toast.error('저장 실패\n' + getUserFriendlyErrorMessage(xhr));
                    }
                });
            },

            _saveFieldChanges: function(orgId, messageId, deletedFieldIds, newFields, updatedFields) {
                const baseUrl = API_BASE_URL + '/messages/' + encodeURIComponent(messageId);
                const self    = this;

                if (deletedFieldIds.length === 0 && newFields.length === 0 && updatedFields.length === 0) {
                    Toast.success('처리가 완료되었습니다.');
                    self.close();
                    window.Messages.load();
                    return;
                }

                function toFieldBody(f, includeIds) {
                    // 빈 문자열도 NaN → null 방지
                    const toInt = (v) => { const n = parseInt(v); return isNaN(n) ? null : n; };
                    const body = {
                        sortOrder:       toInt(f.sortOrder),
                        messageFieldName: f.messageFieldName || '',
                        messageFieldDesc: f.messageFieldDesc || '',
                        dataType:        f.dataType        || '',
                        dataLength:      toInt(f.dataLength) ?? 0,  // NOT NULL 컬럼: XML이면 0
                        scale:           toInt(f.scale),
                        align:           f.align           || '',
                        filler:          f.filler          || '',
                        useMode:         f.useMode         || '',
                        requiredYn:      f.requiredYn      || '',
                        fieldTag:        f.fieldTag        || '',
                        codeGroup:       f.codeGroup       || '',
                        codeMappingYn:   f.codeMappingYn   || '',
                        defaultValue:    f.defaultValue    || '',
                        remark:          f.remark          || '',
                        logYn:           f.logYn           || '',
                        validationRuleId: f.validationRuleId || ''
                    };
                    if (includeIds) {
                        body.orgId           = orgId;
                        body.messageId       = messageId;
                        body.messageFieldId  = f.messageFieldId;
                    }
                    return body;
                }

                const promises = [];

                // 삭제
                deletedFieldIds.forEach(function(fieldId) {
                    promises.push($.ajax({
                        url:    baseUrl + '/fields/' + encodeURIComponent(fieldId) + '?orgId=' + encodeURIComponent(orgId),
                        method: 'DELETE'
                    }));
                });

                // 추가 (batch)
                if (newFields.length > 0) {
                    promises.push($.ajax({
                        url:         baseUrl + '/fields/batch',
                        method:      'POST',
                        contentType: 'application/json',
                        data:        JSON.stringify({ fields: newFields.map(f => toFieldBody(f, true)) })
                    }));
                }

                // 수정
                updatedFields.forEach(function(f) {
                    promises.push($.ajax({
                        url:         baseUrl + '/fields/' + encodeURIComponent(f.messageFieldId) + '?orgId=' + encodeURIComponent(orgId),
                        method:      'PUT',
                        contentType: 'application/json',
                        data:        JSON.stringify(toFieldBody(f, false))
                    }));
                });

                $.when.apply($, promises)
                    .done(function() {
                        Toast.success('처리가 완료되었습니다.');
                        self.close();
                        window.Messages.load();
                    })
                    .fail(function(xhr) {
                        Toast.error('저장 실패\n' + getUserFriendlyErrorMessage(xhr));
                    });
            },

            updateRowCrud: function(rowIndex) {
                const $row = $('#messageFieldsTableBody tr[data-row-index="' + rowIndex + '"]');
                const $crudCell = $row.find('.crud-cell');
                const original = this.originalFields[rowIndex];

                // 신규 추가 행(original 없음)은 "추가" 표시 유지
                if (original == null) return;

                const current = this.currentFields[rowIndex];

                let hasChanges = false;
                for (const key in original) {
                    const curVal = current[key] != null ? String(current[key]) : '';
                    const origVal = original[key] != null ? String(original[key]) : '';
                    if (curVal !== origVal) {
                        hasChanges = true;
                        break;
                    }
                }

                if (hasChanges) {
                    $crudCell.text('수정').addClass('modified');
                } else {
                    $crudCell.text('').removeClass('modified');
                }
            },

            exportFieldsToExcel: function() {
                const fields = this.currentFields.filter(f => f != null);
                if (fields.length === 0) {
                    Toast.warning('내보낼 필드가 없습니다.');
                    return;
                }
                const messageType = $('#detailMessageType').val();
                const isXml = messageType === 'X';

                let headers, rows;
                if (isXml) {
                    headers = ['순번', '전문필드명', '전문필드ID', '특이사항', '필수여부', '입력구분', 'Field태그', '코드그룹', '코드매핑여부', '초기값', '비고', '로그여부', 'Validation Rule'];
                    rows = fields.map(f => [
                        f.sortOrder ?? '', f.messageFieldName || '', f.messageFieldId || '',
                        f.messageFieldDesc || '', f.requiredYn || '', f.useMode || '',
                        f.fieldTag || '', f.codeGroupName || f.codeGroup || '', f.codeMappingYn || '',
                        f.defaultValue || '', f.remark || '', f.logYn || '', f.validationRuleId || ''
                    ]);
                } else {
                    headers = ['순번', '전문필드명', '전문필드ID', '데이터타입', '길이', '정렬', '특이사항', '필수여부', 'Scale', 'Filler', '입력구분', '코드그룹', '코드매핑여부', '초기값', '비고', '로그여부', 'Validation Rule'];
                    rows = fields.map(f => [
                        f.sortOrder ?? '', f.messageFieldName || '', f.messageFieldId || '',
                        f.dataType || '', f.dataLength ?? '', f.align || '',
                        f.messageFieldDesc || '', f.requiredYn || '', f.scale ?? '', f.filler || '',
                        f.useMode || '', f.codeGroupName || f.codeGroup || '', f.codeMappingYn || '',
                        f.defaultValue || '', f.remark || '', f.logYn || '', f.validationRuleId || ''
                    ]);
                }

                const BOM = '\uFEFF';
                const csv = BOM + [headers, ...rows].map(r =>
                    r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(',')
                ).join('\n');

                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = (this.currentMessageId || 'message') + '_fields.csv';
                a.click();
                URL.revokeObjectURL(url);

            // ── Excel 붙여넣기 (Excel → 페이지) ──
            toggleExcelPaste: function() {
                if (this.isExcelPasteMode) {
                    this._exitExcelPaste();
                } else {
                    this._enterExcelPaste();
                }
            },

            _enterExcelPaste: function() {
                const self = this;
                this.isExcelPasteMode = true;

                // 시각적 표시
                const $scroll = $('#messageFieldsTableBody').closest('.sp-field-table-scroll');
                $scroll.css({'outline': '3px solid #dc3545', 'outline-offset': '-3px'});

                // 버튼 상태 변경
                const $btn = $('#btnExcelPaste');
                $btn.html('붙여넣기 완료').removeClass('btn-outline-secondary').addClass('btn-success');

                // 전문 유형에 따른 필드 매핑 키
                function getFieldKeys() {
                    const isXml = $('#detailMessageType').val() === 'X';
                    return isXml
                        ? ['sortOrder','messageFieldName','messageFieldId','messageFieldDesc','requiredYn','useMode','fieldTag','codeGroup','codeMappingYn','defaultValue','remark','logYn','validationRuleId']
                        : ['sortOrder','messageFieldName','messageFieldId','dataType','dataLength','align','messageFieldDesc','requiredYn','scale','filler','useMode','codeGroup','codeMappingYn','defaultValue','remark','logYn','validationRuleId'];
                }

                // paste 이벤트 핸들러
                this._pasteHandler = function(e) {
                    if (!self.isExcelPasteMode) return;
                    const cd = (e.originalEvent || e).clipboardData || window.clipboardData;
                    if (!cd) return;
                    const text = cd.getData('text/plain');
                    if (!text || !text.trim()) return;
                    e.preventDefault();

                    const fieldKeys = getFieldKeys();
                    const messageType = $('#detailMessageType').val();
                    const rows = text.trim().split('\n');
                    let addedCount = 0;

                    rows.forEach(function(row) {
                        if (!row.trim()) return;
                        const cells = row.split('\t');

                        const newField = {
                            sortOrder: self.currentFields.filter(f => f != null).length + addedCount + 1,
                            messageFieldName: '', messageFieldId: '',
                            dataType: 'C', dataLength: '', align: 'L',
                            messageFieldDesc: '', requiredYn: '', scale: '', filler: '',
                            useMode: 'U', codeGroup: '', codeMappingYn: 'Y',
                            defaultValue: '', remark: '', logYn: '', validationRuleId: '',
                            fieldTag: '', fieldDomainId: ''
                        };

                        cells.forEach(function(cell, idx) {
                            if (idx < fieldKeys.length) {
                                newField[fieldKeys[idx]] = cell.trim();
                            }
                        });

                        self.currentFields.push(newField);
                        addedCount++;
                    });

                    if (addedCount > 0) {
                        renderFieldTable(self.currentFields, messageType, {
                            thead: '#fieldHeadDefault',
                            theadXml: '#fieldHeadXml',
                            tbody: '#messageFieldsTableBody'
                        }, true);
                        self.bindFieldEditEvents();
                        Toast.success(addedCount + '건의 필드가 붙여넣기되었습니다.');
                    }
                };

                $(document).on('paste.excelPaste', this._pasteHandler);
                Toast.info('Excel에서 데이터를 복사(Ctrl+C)한 후,\n이 페이지에서 붙여넣기(Ctrl+V)하세요.\n\n완료 후 "붙여넣기 완료" 버튼을 클릭하세요.');
            },

            _exitExcelPaste: function() {
                this.isExcelPasteMode = false;
                $(document).off('paste.excelPaste');
                this._pasteHandler = null;

                const $scroll = $('#messageFieldsTableBody').closest('.sp-field-table-scroll');
                $scroll.css({'outline': '', 'outline-offset': ''});

                const $btn = $('#btnExcelPaste');
                $btn.text('Excel복사').removeClass('btn-success').addClass('btn-outline-secondary');
            },

            // ── 열(Column) 순서 변경 ──
            toggleFieldReorder: function() {
                if (this.isFieldReorderMode) {
                    this._exitFieldReorder();
                } else {
                    this._enterFieldReorder();
                }
            },

            _enterFieldReorder: function() {
                this.isFieldReorderMode = true;

                $('#btnFieldReorder').text('순서 변경 완료').removeClass('btn-outline-secondary').addClass('btn-warning');

                // 현재 보이는 thead 선택
                const isXml = $('#detailMessageType').val() === 'X';
                const $thead = $(isXml ? '#fieldHeadXml' : '#fieldHeadDefault');

                // data-sort-field가 있는 th만 드래그 가능 (체크박스, CRUD 열 제외)
                $thead.find('th[data-sort-field]').attr('draggable', 'true').css('cursor', 'grab');

                let dragSrcColIdx = null;

                $thead.on('dragstart.colReorder', 'th[data-sort-field]', function(e) {
                    dragSrcColIdx = $(this).index();
                    $(this).css('opacity', '0.4');
                    e.originalEvent.dataTransfer.effectAllowed = 'move';
                    e.originalEvent.dataTransfer.setData('text/plain', String(dragSrcColIdx));
                });

                $thead.on('dragend.colReorder', 'th', function() {
                    $(this).css('opacity', '');
                    $thead.find('.col-drag-left, .col-drag-right').removeClass('col-drag-left col-drag-right');
                });

                $thead.on('dragover.colReorder', 'th[data-sort-field]', function(e) {
                    e.preventDefault();
                    e.originalEvent.dataTransfer.dropEffect = 'move';
                    $thead.find('.col-drag-left, .col-drag-right').removeClass('col-drag-left col-drag-right');
                    const rect = this.getBoundingClientRect();
                    const midX = rect.left + rect.width / 2;
                    $(this).addClass(e.originalEvent.clientX < midX ? 'col-drag-left' : 'col-drag-right');
                });

                $thead.on('dragleave.colReorder', 'th', function() {
                    $(this).removeClass('col-drag-left col-drag-right');
                });

                $thead.on('drop.colReorder', 'th[data-sort-field]', function(e) {
                    e.preventDefault();
                    const toColIdx = $(this).index();
                    $thead.find('.col-drag-left, .col-drag-right').removeClass('col-drag-left col-drag-right');
                    if (dragSrcColIdx === null || dragSrcColIdx === toColIdx) return;

                    // 헤더 열 이동
                    const $headRow = $thead.find('tr');
                    const $srcTh = $headRow.children().eq(dragSrcColIdx).detach();
                    if (dragSrcColIdx < toColIdx) {
                        $headRow.children().eq(toColIdx - 1).after($srcTh);
                    } else {
                        $headRow.children().eq(toColIdx).before($srcTh);
                    }

                    // 바디 열 이동
                    $('#messageFieldsTableBody tr').each(function() {
                        const $srcTd = $(this).children().eq(dragSrcColIdx).detach();
                        if (dragSrcColIdx < toColIdx) {
                            $(this).children().eq(toColIdx - 1).after($srcTd);
                        } else {
                            $(this).children().eq(toColIdx).before($srcTd);
                        }
                    });

                    dragSrcColIdx = null;
                });
            },

            _exitFieldReorder: function() {
                this.isFieldReorderMode = false;

                $('#btnFieldReorder').text('전문 필드 순서 변경').removeClass('btn-warning').addClass('btn-outline-secondary');

                // 이벤트 정리
                $('#fieldHeadDefault, #fieldHeadXml').off('.colReorder');
                $('#fieldHeadDefault th, #fieldHeadXml th').removeAttr('draggable').css('cursor', '');
            },

            // 전체복사: API 호출 → 마스터 정보 + 필드 교체 → 모달 닫기

                    messageFieldId: f.messageFieldId || '',
                    dataType: f.dataType || 'C',
                    dataLength: f.dataLength || '',
                    align: f.align || 'L',
                    messageFieldDesc: f.messageFieldDesc || '',
                    requiredYn: f.requiredYn || '',
                    scale: f.scale || '',
                    filler: f.filler || '',
                    useMode: f.useMode || 'U',
                    codeGroup: f.codeGroup || '',
                    codeMappingYn: f.codeMappingYn || 'Y',
                    defaultValue: f.defaultValue || '',
                    remark: f.remark || '',
                    logYn: f.logYn || '',
                    validationRuleId: f.validationRuleId || '',
                    fieldTag: f.fieldTag || '',
                    fieldDomainId: ''

            renderVersionList: function(versions) {
                const tbody = document.getElementById('versionListBody');
                // Clear existing rows safely
                while (tbody.firstChild) { tbody.removeChild(tbody.firstChild); }
                // Hide comparison section when re-rendering version list
                document.getElementById('fieldComparisonSection').style.display = 'none';

                if (!versions || versions.length === 0) {
                    const emptyRow = document.createElement('tr');
                    const emptyCell = document.createElement('td');
                    emptyCell.setAttribute('colspan', '5');
                    emptyCell.className = 'text-center';
                    emptyCell.textContent = '저장된 버전이 없습니다';
                    emptyRow.appendChild(emptyCell);
                    tbody.appendChild(emptyRow);
                    return;
                }

                const self = this;
                versions.forEach(v => {
                    const tr = document.createElement('tr');
                    tr.style.cursor = 'pointer';
                    tr.setAttribute('data-version', v.version);

                    // Click handler to load field comparison
                    tr.addEventListener('click', function() {
                        // Highlight selected row
                        tbody.querySelectorAll('tr').forEach(function(row) {
                            row.classList.remove('table-active');
                        });
                        tr.classList.add('table-active');
                        self.loadFieldComparison(v.version);
                    });

                    const tdVersion = document.createElement('td');
                    tdVersion.className = 'text-center';
                    tdVersion.textContent = v.version;
                    tr.appendChild(tdVersion);

                    const tdReason = document.createElement('td');
                    tdReason.textContent = v.historyReason || '-';
                    tr.appendChild(tdReason);

                    const tdDate = document.createElement('td');

                    tdDate.textContent = v.lastUpdateDtime || '-';

                    const tdUser = document.createElement('td');

                    tdUser.textContent = v.lastUpdateUserId || '-';

                        window.MessageDetailModal.executeRestore(v.version);
