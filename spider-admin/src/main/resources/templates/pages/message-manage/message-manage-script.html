            loadFieldComparison: function(version) {
                const orgId = this.currentOrgId;
                const messageId = this.currentMessageId;
                const self = this;

                // Update version label
                document.getElementById('comparisonVersionLabel').textContent = version;

                // Show loading state in both tables
                const currentBody = document.getElementById('currentFieldsCompareBody');
                const versionBody = document.getElementById('versionFieldsCompareBody');
                currentBody.replaceChildren();
                versionBody.replaceChildren();

                var loadingRow = document.createElement('tr');
                var loadingCell = document.createElement('td');
                loadingCell.setAttribute('colspan', '6');
                loadingCell.className = 'text-center';
                loadingCell.textContent = '로딩 중...';
                loadingRow.appendChild(loadingCell);
                currentBody.appendChild(loadingRow);

                var loadingRow2 = document.createElement('tr');
                var loadingCell2 = document.createElement('td');
                loadingCell2.setAttribute('colspan', '6');
                loadingCell2.className = 'text-center';
                loadingCell2.textContent = '로딩 중...';
                loadingRow2.appendChild(loadingCell2);
                versionBody.appendChild(loadingRow2);

                // Show comparison section
                document.getElementById('fieldComparisonSection').style.display = 'block';

                // Fetch current fields and version fields in parallel
                var currentFieldsPromise = $.ajax({
                    url: API_BASE_URL + '/messages/' + encodeURIComponent(messageId),
                    method: 'GET',
                    data: { orgId: orgId, includeFields: true }
                });

                var versionFieldsPromise = $.ajax({
                    url: API_BASE_URL + '/messages/' + encodeURIComponent(messageId)
                         + '/versions/' + encodeURIComponent(version) + '/fields',
                    method: 'GET',
                    data: { orgId: orgId }
                });

                $.when(currentFieldsPromise, versionFieldsPromise).then(
                    function(currentRes, versionRes) {
                        var currentFields = (currentRes[0].data && currentRes[0].data.fields) || [];
                        var versionFields = (versionRes[0].data) || [];

                        // Build a map of fieldId -> field for diff highlighting
                        var currentFieldMap = {};
                        currentFields.forEach(function(f) { currentFieldMap[f.messageFieldId] = f; });
                        var versionFieldMap = {};
                        versionFields.forEach(function(f) { versionFieldMap[f.messageFieldId] = f; });

                        self.renderComparisonFields(currentBody, currentFields, versionFieldMap, 'current');
                        self.renderComparisonFields(versionBody, versionFields, currentFieldMap, 'version');
                    },
                    function() {
                        currentBody.replaceChildren();
                        versionBody.replaceChildren();
                        var errRow = document.createElement('tr');
                        var errCell = document.createElement('td');
                        errCell.setAttribute('colspan', '6');
                        errCell.className = 'text-center text-danger';
                        errCell.textContent = '필드 조회 실패';
                        errRow.appendChild(errCell);
                        currentBody.appendChild(errRow);

                        var errRow2 = document.createElement('tr');
                        var errCell2 = document.createElement('td');
                        errCell2.setAttribute('colspan', '6');
                        errCell2.className = 'text-center text-danger';
                        errCell2.textContent = '필드 조회 실패';
                        errRow2.appendChild(errCell2);
                        versionBody.appendChild(errRow2);
                    }
                );
            },

            renderComparisonFields: function(tbody, fields, otherFieldMap, side) {
                tbody.replaceChildren();

                if (!fields || fields.length === 0) {
                    var emptyRow = document.createElement('tr');
                    var emptyCell = document.createElement('td');
                    emptyCell.setAttribute('colspan', '6');
                    emptyCell.className = 'text-center text-body-secondary';
                    emptyCell.textContent = '필드가 없습니다';
                    emptyRow.appendChild(emptyCell);
                    tbody.appendChild(emptyRow);
                    return;
                }

                fields.forEach(function(f) {
                    var tr = document.createElement('tr');
                    var otherField = otherFieldMap[f.messageFieldId];

                    // Determine row diff status
                    if (!otherField) {
                        // Field exists only on this side
                        tr.className = side === 'current' ? 'table-danger' : 'table-success';
                    } else {
                        // Check if any displayed column differs
                        var hasDiff = (
                            String(f.sortOrder || '') !== String(otherField.sortOrder || '') ||
                            String(f.messageFieldName || '') !== String(otherField.messageFieldName || '') ||
                            String(f.dataType || '') !== String(otherField.dataType || '') ||
                            String(f.dataLength || '') !== String(otherField.dataLength || '') ||
                            String(f.defaultValue || '') !== String(otherField.defaultValue || '')
                        );
                        if (hasDiff) {
                            tr.className = 'table-warning';
                        }
                    }

                    var tdOrder = document.createElement('td');
                    tdOrder.className = 'text-center';
                    tdOrder.textContent = f.sortOrder != null ? f.sortOrder : '';
                    tr.appendChild(tdOrder);

                    var tdFieldId = document.createElement('td');
                    tdFieldId.textContent = f.messageFieldId || '';
                    tr.appendChild(tdFieldId);

                    var tdFieldName = document.createElement('td');
                    tdFieldName.textContent = f.messageFieldName || '';
                    tr.appendChild(tdFieldName);

                    var tdDataType = document.createElement('td');
                    tdDataType.className = 'text-center';
                    tdDataType.textContent = f.dataType || '';
                    tr.appendChild(tdDataType);

                    var tdDataLength = document.createElement('td');
                    tdDataLength.className = 'text-center';
                    tdDataLength.textContent = f.dataLength != null ? f.dataLength : '';
                    tr.appendChild(tdDataLength);

                    var tdDefault = document.createElement('td');
                    tdDefault.textContent = f.defaultValue || '';
                    tr.appendChild(tdDefault);

                    tbody.appendChild(tr);
                });
            },

            openCodeGenModal: function() {
                if (!this.currentOrgId || !this.currentMessageId) return;
                var orgId = this.currentOrgId;
                var messageId = this.currentMessageId;

                // 모달 오픈 전 초기화 및 로딩 상태 설정
                window.CodeGenModal._messageId = messageId;
                $('#codeGenDtoCode').text('');
                $('#codeGenMessageId').text(messageId);
                $('#codeGenMessageName').text('');
                $('#codeGenLoading').show();
                $('#codeGenDtoCode').hide();

                // getOrCreateInstance: 중복 열기 시 기존 인스턴스 재사용
                var modal = bootstrap.Modal.getOrCreateInstance(document.getElementById('codeGenModal'));
                modal.show();

                $.ajax({
                    url: API_BASE_URL + '/code-gen/message/' + encodeURIComponent(messageId) + '?orgId=' + encodeURIComponent(orgId),
                    method: 'GET',
                    success: function(response) {
                        if (response.success && response.data) {
                            var data = response.data;
                            $('#codeGenMessageId').text(data.messageId);
                            $('#codeGenMessageName').text(data.messageName || '');
                            $('#codeGenDtoCode').text(data.dtoCode || '');
                        } else {
                            Toast.error(response.message || '소스 코드 생성에 실패했습니다.');
                        }
                    },
                    error: function(xhr) {
                        Toast.error(xhr.responseJSON?.message || '소스 코드 생성 중 오류가 발생했습니다.');
                    },
                    complete: function() {
                        $('#codeGenLoading').hide();
                        $('#codeGenDtoCode').show();
                    }
                });
            },

            openReloadModal: function() {
                if (!this.currentOrgId || !this.currentMessageId) return;
                var orgId = this.currentOrgId;
                var messageId = this.currentMessageId;

                WasSelectReloadModal.open({
                    onExecute: function(instanceIds) {
                        $.ajax({
                            url: API_BASE_URL + '/reload/execute',
                            method: 'POST',
                            contentType: 'application/json',
                            data: JSON.stringify({
                                reloadType: 'message',
                                instanceIds: instanceIds,
                                additionalParams: {
                                    orgId: orgId,
                                    messageId: messageId
                                }
                            }),
                            success: function(response) {
                                if (response.success && response.data) {
                                    WasSelectReloadModal.showResults(response.data.results);
                                } else {
                                    WasSelectReloadModal.resetButton();
                                    Toast.error(response.message || 'Reload 실행에 실패했습니다.');
                                }
                            },
                            error: function(xhr) {
                                WasSelectReloadModal.resetButton();
                                Toast.error(xhr.responseJSON?.message || 'Reload 실행 중 오류가 발생했습니다.');
                            }
                        });
                    }
                });
            },

            executeRestore: function(version) {
                Toast.confirm('버전 ' + version + '으로 복원하시겠습니까?\n현재 전문 데이터와 필드가 선택한 버전으로 대체됩니다.', () => {
                    const orgId = this.currentOrgId;
                    const messageId = this.currentMessageId;

                    $.ajax({
                        url: API_BASE_URL + '/messages/' + encodeURIComponent(messageId) + '/restore',
                        method: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify({ orgId: orgId, version: version }),
                        success: (response) => {
                            if (response.success) {
                                Toast.success('복원이 완료되었습니다.');
                                bootstrap.Modal.getInstance(document.getElementById('restoreVersionModal')).hide();
                                this.open(orgId, messageId, '전문 수정');
                                window.Messages.load();
                            } else {
                                Toast.error('복원 실패: ' + (response.message || '알 수 없는 오류'));
                            }
                        },
                        error: (xhr) => {
                            Toast.error('복원 실패\n' + getUserFriendlyErrorMessage(xhr));
                        }
                    });
                });
            }
        };

        // ==================== Toolbar Event Bindings & Initialization ====================
        // 전문 관리 페이지(message.html)에서만 초기화 실행 (trx.html 등에서 include 시 스킵)
        if (document.getElementById('messageTable')) {
            $('#btnExcel').off('click').on('click', function() {
                const params = {};
                const searchField = $('#searchField').val();
                const searchValue = $('#searchValue').val();
                const orgIdFilter = $('#orgIdFilter').val();

                if (headerYnFilter) { params.headerYnFilter = headerYnFilter; }
                if (parentMessageIdFilter) { params.parentMessageIdFilter = parentMessageIdFilter; }
                if (messageTypeFilter) { params.messageTypeFilter = messageTypeFilter; }
                if (window.Messages.sortBy) { params.sortBy = window.Messages.sortBy; params.sortDirection = window.Messages.sortDirection || 'ASC'; }
                const qs = $.param(params);
                window.location.href = API_BASE_URL + '/messages/export' + (qs ? '?' + qs : '');
            });

            $('#btnPrint').off('click').on('click', function() {
                const columns = [
                    { key: 'orgId', label: '기관' },
                    { key: 'messageId', label: '메시지ID' },
                    { key: 'messageName', label: '메시지명' },

                    { key: 'curVersion', label: '현재버전' }

                window.Messages.load();

            window.CodeGroupPickerModal.init();

        // ==================== MessageExcelUpload ====================

        window.MessageExcelUpload = window.MessageExcelUpload || {
            modal: null,

            init: function() {
                var self = this;
                this.modal = bootstrap.Modal.getOrCreateInstance(document.getElementById('excelUploadModal'));

                $('#excelUploadFile').on('change', function() {
                    self.onFileChange(this);
                });

                $('#btnExcelUploadSubmit').on('click', function() {
                    self.upload();
                });

                // 모달 닫힐 때 초기화
                document.getElementById('excelUploadModal').addEventListener('hidden.bs.modal', function() {
                    self.reset();
                });
            },

            open: function() {
                if (!this.modal) {
                    this.init();
                }
                this.reset();
                this.modal.show();
            },

            reset: function() {
                $('#excelUploadFile').val('');
                $('#excelUploadFileInfo').hide();
                $('#excelUploadFileInfoBody').empty();
                $('#excelUploadResult').hide();
                $('#excelUploadErrors').hide();
                $('#excelUploadErrorList').empty();
                $('#btnExcelUploadSubmit').prop('disabled', false);
            },

            onFileChange: function(input) {
                var files = input.files;
                if (!files || files.length === 0) {
                    $('#excelUploadFileInfo').hide();
                    return;
                }

                var file = files[0];
                var fileName = HtmlUtils.escape(file.name);
                var fileSize = this.formatFileSize(file.size);

                // 확장자 검증
                if (!file.name.toLowerCase().endsWith('.xlsx')) {
                    Toast.info('xlsx 형식의 파일만 업로드 가능합니다.');
                    $(input).val('');
                    $('#excelUploadFileInfo').hide();
                    return;
                }

                // 크기 검증 (10MB)
                if (file.size > 10 * 1024 * 1024) {
                    Toast.info('파일 크기가 10MB를 초과합니다.');
                    $(input).val('');
                    $('#excelUploadFileInfo').hide();
                    return;
                }

                var tbody = $('#excelUploadFileInfoBody');
                tbody.empty();
                tbody.append(
                    '<tr>' +
                    '<td>' + fileName + '</td>' +
                    '<td class="text-center">' + fileSize + '</td>' +
                    '<td class="text-center"><span class="badge bg-secondary">대기</span></td>' +
                    '</tr>'
                );
                $('#excelUploadFileInfo').show();
                $('#excelUploadResult').hide();
            },

            formatFileSize: function(bytes) {
                if (bytes === 0) return '0 B';
                var k = 1024;
                var sizes = ['B', 'KB', 'MB'];
                var i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
            },

            upload: function() {
                var fileInput = document.getElementById('excelUploadFile');
                if (!fileInput.files || fileInput.files.length === 0) {
                    Toast.warning('먼저 파일을 선택하십시오.');
                    return;
                }

                var file = fileInput.files[0];
                var formData = new FormData();
                formData.append('file', file);

                var self = this;
                $('#btnExcelUploadSubmit').prop('disabled', true);

                // 상태 업데이트: 업로드 중
                var statusCell = $('#excelUploadFileInfoBody tr:first td:last');
                statusCell.html('<span class="badge bg-primary">업로드 중...</span>');

                $.ajax({
                    url: API_BASE_URL + '/messages/import',
                    method: 'POST',
                    data: formData,
                    processData: false,
                    contentType: false,
                    success: function(response) {
                        if (response.success) {
                            var data = response.data;
                            statusCell.html('<span class="badge bg-success">완료</span>');

                            // 결과 표시
                            $('#resultTotalRows').text(data.totalRows + '건');
                            $('#resultCreated').text(data.created + '건');
                            $('#resultUpdated').text(data.updated + '건');
                            $('#resultSkipped').text(data.skipped + '건');
                            $('#excelUploadResult').show();

                            // 오류 표시
                            if (data.errors && data.errors.length > 0) {
                                var errorHtml = '';
                                for (var i = 0; i < data.errors.length; i++) {
                                    errorHtml += '<div>' + HtmlUtils.escape(data.errors[i]) + '</div>';
                                }
                                $('#excelUploadErrorList').html(errorHtml);
                                $('#excelUploadErrors').show();
                            } else {
                                $('#excelUploadErrors').hide();
                            }

                            // 테이블 갱신
                            if (window.Messages) {
                                window.Messages.load();
                            }
                        } else {
                            statusCell.html('<span class="badge bg-danger">실패</span>');
                            Toast.error('업로드 실패: ' + (response.message || '알 수 없는 오류'));
                        }
                        $('#btnExcelUploadSubmit').prop('disabled', false);
                    },
                    error: function(xhr) {
                        statusCell.html('<span class="badge bg-danger">실패</span>');
                        var errorMsg = getUserFriendlyErrorMessage(xhr);
                        Toast.error('업로드 실패: ' + errorMsg);
                        $('#btnExcelUploadSubmit').prop('disabled', false);
                    }
                });
            }
        };

        // ==================== CodeGenModal ====================
        // 소스 코드 생성 모달: DTO 코드 클립보드 복사 및 파일 다운로드 기능
        window.CodeGenModal = {
            _messageId: null,

            download: function() {
                var codeEl = document.getElementById('codeGenDtoCode');
                if (!codeEl || !codeEl.textContent.trim()) {
                    Toast.warning('다운로드할 코드가 없습니다.');
                    return;
                }
                // messageId를 PascalCase로 변환하여 파일명 생성 (예: MY_MSG → MyMsgDto.java)
                var rawId = this._messageId || 'Generated';
                var className = rawId.split(/[_\-\s]+/)
                    .map(function(w) { return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase(); })
                    .join('') + 'Dto';
                var fileName = className + '.java';

                var blob = new Blob([codeEl.textContent], { type: 'text/plain;charset=utf-8' });
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            },

            copy: function() {
                var codeEl = document.getElementById('codeGenDtoCode');

                if (!codeEl || !codeEl.textContent.trim()) {
                    Toast.warning('복사할 코드가 없습니다.');
                    return;
                }

                navigator.clipboard.writeText(codeEl.textContent)
                    .then(function() {
                        Toast.success('코드가 클립보드에 복사되었습니다.');
                    })
                    .catch(function() {
                        // HTTPS가 아닌 환경에서 clipboard API 미지원 시 fallback
                        var textarea = document.createElement('textarea');
                        textarea.value = codeEl.textContent;
                        textarea.style.position = 'fixed';
                        textarea.style.opacity = '0';
                        document.body.appendChild(textarea);
                        textarea.select();
                        try {
                            document.execCommand('copy');
                            Toast.success('코드가 클립보드에 복사되었습니다.');
                        } catch (e) {
                            Toast.error('클립보드 복사에 실패했습니다.');
                        }
                        document.body.removeChild(textarea);
                    });
            }
        };

        })();
    </script>
