<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <!-- Include Page Content Layout Styles -->

    <!-- Search Section Header -->
    <div class="page-header">
        <h4 class="page-title">
            <i class="bi bi-exclamation-circle-fill text-danger"></i>
            검색조건
        </h4>
    </div>

    <!-- Search Box -->
    <div th:replace="~{pages/message-manage/message-manage-search :: search}"></div>

    <!-- List Section Header + Toolbar (같은 줄) -->
    <div class="page-header mt-3">
        <h4 class="page-title">
            <i class="bi bi-exclamation-circle-fill text-danger"></i>
            리스트
        </h4>
        <div class="page-header-actions">
            <button class="btn btn-outline-secondary btn-sm" id="btnExcel">
                <i class="bi bi-file-earmark-excel"></i> 엑셀
            </button>
            <button class="btn btn-outline-secondary btn-sm" id="btnPrint">
                <i class="bi bi-file-earmark-text"></i> 출력
            </button>
        </div>
    </div>

    <!-- Table -->
    <div th:replace="~{pages/message-manage/message-manage-table :: table}"></div>

    <!-- Pagination -->
    <div th:replace="~{fragments/page-content-layout :: pagination}"></div>

    <!-- Bottom Action Buttons -->
    <div th:replace="~{pages/message-manage/message-manage-buttons :: buttons}"></div>

    <!-- Message Modal (Create/Edit) -->
    <div th:replace="~{pages/message-manage/message-manage-modal :: modal}"></div>

    <!-- Message Detail Modal (View Fields) -->
    <div th:replace="~{pages/message-manage/message-manage-detail-modal :: modal}"></div>

    <!-- WAS 선택 Reload 모달 (공용 컴포넌트) -->
    <div th:replace="~{modals/was-reload-modal :: modal}"></div>

    <!-- Backup/Restore History Modals -->
    <div th:replace="~{pages/message-manage/message-manage-history-modal :: historyModals}"></div>

    <!-- Extra Modals (유사전문복사, 필드풀 검증, 테이블) -->
    <div th:replace="~{pages/message-manage/message-manage-extra-modals :: extraModals}"></div>

    <!-- Scripts -->
    <th:block th:replace="~{pages/message-manage/message-manage-script :: script}" />
</div>
</body>
</html>
