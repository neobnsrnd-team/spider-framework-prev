<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <!-- 권한 플래그: BATCH_RUNNING:W 권한 보유 여부를 JS 변수로 주입 -->
    <script th:inline="javascript">
        var hasBatchRunningWrite = /*[[${userAuthorities != null and userAuthorities.contains('BATCH_RUNNING:W')}]]*/ false;
    </script>

    <!-- 리스트 섹션 헤더 -->
    <div class="d-flex align-items-center justify-content-between mt-3">
        <div class="page-header mb-0">
            <h4 class="page-title mb-0">
                <i class="bi bi-exclamation-circle-fill text-danger"></i>
                실행중인 배치/스케줄
            </h4>
        </div>
        <!-- 새로고침 버튼 -->
        <button type="button" class="btn btn-sm btn-outline-secondary" id="btnRefresh">
            <i class="bi bi-arrow-clockwise"></i> 새로고침
        </button>
    </div>

    <!-- Table -->
    <div th:replace="~{pages/batch-running-list/batch-running-list-table :: table}"></div>

    <!-- 강제 종료 확인 모달 -->
    <div class="modal fade" id="stopConfirmModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">강제 종료 확인</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>선택한 배치를 강제 종료하시겠습니까?</p>
                    <p class="text-danger small">
                        <i class="bi bi-exclamation-triangle-fill"></i>
                        강제 종료 시 처리 중인 데이터가 불완전한 상태로 남을 수 있습니다.
                    </p>
                    <dl class="row mb-0 small">
                        <dt class="col-4">인스턴스 ID</dt>
                        <dd class="col-8 mb-1" id="stopModalInstanceId">-</dd>
                        <dt class="col-4">배치 APP ID</dt>
                        <dd class="col-8 mb-1" id="stopModalBatchAppId">-</dd>
                        <dt class="col-4">배치 APP명</dt>
                        <dd class="col-8 mb-0" id="stopModalBatchAppName">-</dd>
                    </dl>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-danger" id="btnConfirmStop">강제 종료</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Script -->
    <th:block th:replace="~{pages/batch-running-list/batch-running-list-script :: script}" />
</div>
</body>
</html>
