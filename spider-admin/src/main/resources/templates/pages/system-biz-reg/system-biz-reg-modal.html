<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- Monitor Modal Fragment -->
<div th:fragment="modal">
    <div class="modal fade" id="monitorModal" tabindex="-1" aria-labelledby="monitorModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="monitorModalLabel">현황판 등록</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- 기본 정보 섹션 -->
                    <div class="section-header">기본 정보</div>
                    <div class="form-section">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="monitorId" class="form-label">
                                    모니터ID <span class="text-danger">*</span>
                                </label>
                                <input type="text" class="form-control" id="monitorId" maxlength="20" required>
                            </div>
                            <div class="col-md-6">
                                <label for="monitorName" class="form-label">
                                    모니터명 <span class="text-danger">*</span>
                                </label>
                                <input type="text" class="form-control" id="monitorName" maxlength="50" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="refreshTerm" class="form-label">
                                    새로고침주기 <span class="text-danger">*</span>
                                </label>
                                <select class="form-select" id="refreshTerm" required>
                                    <option value="">선택</option>
                                    <option value="1">1분</option>
                                    <option value="5">5분</option>
                                    <option value="10">10분</option>
                                    <option value="30">30분</option>
                                    <option value="60">1시간</option>
                                    <option value="180">3시간</option>
                                    <option value="360">6시간</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="useYn" class="form-label">사용여부</label>
                                <select class="form-select" id="useYn">
                                    <option value="Y">사용</option>
                                    <option value="N">미사용</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-12">
                                <label for="monitorQuery" class="form-label">모니터쿼리</label>
                                <textarea class="form-control" id="monitorQuery" rows="4" maxlength="2000"></textarea>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-12">
                                <label for="detailQuery" class="form-label">상세쿼리</label>
                                <textarea class="form-control" id="detailQuery" rows="4" maxlength="2000"></textarea>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="alertCondition" class="form-label">경고조건</label>
                                <input type="text" class="form-control" id="alertCondition" maxlength="100">
                            </div>
                            <div class="col-md-6">
                                <label for="alertMessage" class="form-label">경고메세지</label>
                                <input type="text" class="form-control" id="alertMessage" maxlength="100">
                            </div>
                        </div>
                    </div>

                    <!-- 시스템 정보 섹션 (수정 모드일 때만 표시) -->
                    <div id="systemInfoSection" class="d-hidden">
                        <div class="section-header mt-4">시스템 정보</div>
                        <div class="form-section">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">최종수정자</label>
                                    <input type="text" class="form-control" id="lastUpdateUserId" readonly>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">최종수정일시</label>
                                    <input type="text" class="form-control" id="lastUpdateDtime" readonly>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"><i class="bi bi-x-lg"></i> 취소</button>
                    <button th:if="${userAuthorities != null and userAuthorities.contains('MONITOR:W')}"
                            type="button" class="btn btn-danger d-hidden" id="btnDelete">
                        <i class="bi bi-trash"></i> 삭제
                    </button>
                    <button th:if="${userAuthorities != null and userAuthorities.contains('MONITOR:W')}"
                            type="button" class="btn btn-primary" id="btnSave">
                        <i class="bi bi-floppy"></i> 저장
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Script Fragment -->
<th:block th:fragment="script">
<script>
    const MonitorModal = {
        isEditMode: false,
        currentMonitorId: null,
        isProcessing: false,  // 중복 클릭 방지 플래그

        /**
         * 등록 모드로 모달 열기
         */
        openCreateModal: function() {
            this.isEditMode = false;
            this.currentMonitorId = null;
            this.isProcessing = false;  // 플래그 초기화

            // 모달 제목 변경
            $('#monitorModalLabel').text('현황판 등록');

            // 폼 초기화
            this.resetForm();

            // 버튼 상태 설정
            $('#btnDelete').addClass('d-hidden');
            $('#btnSave').show().prop('disabled', false);  // 버튼 활성화
            $('#systemInfoSection').addClass('d-hidden');

            // 모니터ID 입력 가능
            $('#monitorId').prop('disabled', false);

            // 모달 표시
            const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById('monitorModal'));
            modal.show();
        },

        /**
         * 수정 모드로 모달 열기
         */
        openEditModal: function(monitorId) {
            this.isEditMode = true;
            this.currentMonitorId = monitorId;
            this.isProcessing = false;  // 플래그 초기화

            // 읽기 전용 여부
            const readOnly = !hasMonitorWrite;

            // 모달 제목 변경
            $('#monitorModalLabel').text(readOnly ? '현황판 상세' : '현황판 수정');

            // 데이터 로드
            this.loadMonitorData(monitorId);

            // 버튼 상태 설정
            if (readOnly) {
                $('#btnDelete').addClass('d-hidden');
                $('#btnSave').hide();
            } else {
                $('#btnDelete').removeClass('d-hidden').prop('disabled', false);
                $('#btnSave').show().prop('disabled', false);
            }
            $('#systemInfoSection').removeClass('d-hidden');

            // 폼 필드 읽기 전용 처리
            $('#monitorId').prop('disabled', true);
            $('#monitorName, #monitorQuery, #detailQuery, #alertCondition, #alertMessage')
                .prop('readonly', readOnly);
            $('#refreshTerm, #useYn').prop('disabled', readOnly);

            // 모달 표시
            const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById('monitorModal'));
            modal.show();
        },

        /**
         * 모니터 데이터 로드
         */
        loadMonitorData: function(monitorId) {
            $.ajax({
                url: API_BASE_URL + '/monitors/' + monitorId,
                method: 'GET',
                success: (response) => {
                    if (response.success && response.data) {
                        const data = response.data;
                        $('#monitorId').val(data.monitorId || '');
                        $('#monitorName').val(data.monitorName || '');
                        $('#monitorQuery').val(data.monitorQuery || '');
                        $('#detailQuery').val(data.detailQuery || '');
                        $('#alertCondition').val(data.alertCondition || '');
                        $('#alertMessage').val(data.alertMessage || '');
                        $('#refreshTerm').val(data.refreshTerm || '');
                        $('#useYn').val(data.useYn || 'Y');
                        $('#lastUpdateUserId').val(data.lastUpdateUserId || '');
                        $('#lastUpdateDtime').val(this.formatDateTime(data.lastUpdateDtime) || '');
                    }
                },
                error: (xhr) => {
                    console.error('Failed to load monitor:', xhr);
                    Toast.error('모니터 정보를 불러오는데 실패했습니다.');
                }
            });
        },

        /**
         * 폼 초기화
         */
        resetForm: function() {
            $('#monitorId').val('');
            $('#monitorName').val('');
            $('#monitorQuery').val('');
            $('#detailQuery').val('');
            $('#alertCondition').val('');
            $('#alertMessage').val('');
            $('#refreshTerm').val('');
            $('#useYn').val('Y');
            $('#lastUpdateUserId').val('');
            $('#lastUpdateDtime').val('');
        },

        /**
         * 저장
         */
        save: function() {
            // 중복 클릭 방지
            if (this.isProcessing) {
                return;
            }

            // 필수 입력 검증
            if (!this.validateForm()) {
                return;
            }

            // 등록과 수정 모두 동일한 data 구조 사용
            const data = {
                monitorId: this.isEditMode ? this.currentMonitorId : $('#monitorId').val().trim(),
                monitorName: $('#monitorName').val().trim(),
                monitorQuery: $('#monitorQuery').val().trim(),
                detailQuery: $('#detailQuery').val().trim(),
                alertCondition: $('#alertCondition').val().trim(),
                alertMessage: $('#alertMessage').val().trim(),
                refreshTerm: $('#refreshTerm').val(),
                useYn: $('#useYn').val()
            };

            // 수정 모드 검증
            if (this.isEditMode) {
                if (!this.currentMonitorId) {
                    Toast.error('수정할 모니터 ID를 찾을 수 없습니다. 페이지를 새로고침 후 다시 시도해주세요.');
                    return;
                }
                this.update(data);
            } else {
                this.create(data);
            }
        },

        /**
         * 등록
         */
        create: function(data) {
            // 중복 요청 방지 플래그 설정 및 버튼 비활성화
            this.isProcessing = true;
            $('#btnSave').prop('disabled', true);

            $.ajax({
                url: API_BASE_URL + '/monitors',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(data),
                success: (response) => {
                    if (response.success) {
                        Toast.success('모니터가 등록되었습니다.');
                        // Bootstrap 5 방식으로 모달 닫기
                        const modalElement = document.getElementById('monitorModal');
                        const modalInstance = bootstrap.Modal.getInstance(modalElement);
                        if (modalInstance) {
                            modalInstance.hide();
                        }
                        Monitors.load();
                    } else {
                        Toast.error('등록에 실패했습니다: ' + (response.message || '알 수 없는 오류'));
                    }
                },
                error: (xhr) => {
                    const errorMsg = xhr.responseJSON?.message || '모니터 등록에 실패했습니다.';
                    Toast.error(errorMsg);
                },
                complete: () => {
                    // 요청 완료 시 플래그 해제 및 버튼 활성화
                    this.isProcessing = false;
                    $('#btnSave').prop('disabled', false);
                }
            });
        },

        /**
         * 수정
         */
        update: function(data) {
            // 중복 요청 방지 플래그 설정 및 버튼 비활성화
            this.isProcessing = true;
            $('#btnSave').prop('disabled', true);

            $.ajax({
                url: API_BASE_URL + '/monitors/' + this.currentMonitorId,
                method: 'PUT',
                contentType: 'application/json',
                data: JSON.stringify(data),
                success: (response) => {
                    if (response.success) {
                        Toast.success('모니터가 수정되었습니다.');
                        // Bootstrap 5 방식으로 모달 닫기
                        const modalElement = document.getElementById('monitorModal');
                        const modalInstance = bootstrap.Modal.getInstance(modalElement);
                        if (modalInstance) {
                            modalInstance.hide();
                        }
                        Monitors.load();
                    } else {
                        Toast.error('수정에 실패했습니다: ' + (response.message || '알 수 없는 오류'));
                    }
                },
                error: (xhr) => {
                    const errorMsg = xhr.responseJSON?.message || '모니터 수정에 실패했습니다.';
                    Toast.error(errorMsg);
                },
                complete: () => {
                    // 요청 완료 시 플래그 해제 및 버튼 활성화
                    this.isProcessing = false;
                    $('#btnSave').prop('disabled', false);
                }
            });
        },

        /**
         * 삭제
         */
        deleteMonitor: function() {
            Toast.confirm('정말 삭제하시겠습니까?', () => {
                // 중복 요청 방지 플래그 설정 및 버튼 비활성화
                this.isProcessing = true;
                $('#btnDelete').prop('disabled', true);

                $.ajax({
                    url: API_BASE_URL + '/monitors/' + this.currentMonitorId,
                    method: 'DELETE',
                    success: (response) => {
                        if (response.success) {
                            Toast.success('모니터가 삭제되었습니다.');
                            // Bootstrap 5 방식으로 모달 닫기
                            const modalElement = document.getElementById('monitorModal');
                            const modalInstance = bootstrap.Modal.getInstance(modalElement);
                            if (modalInstance) {
                                modalInstance.hide();
                            }
                            Monitors.load();
                        } else {
                            Toast.error('삭제에 실패했습니다: ' + (response.message || '알 수 없는 오류'));
                        }
                    },
                    error: (xhr) => {
                        console.error('Failed to delete monitor:', xhr);
                        const errorMsg = xhr.responseJSON?.message || '모니터 삭제에 실패했습니다.';
                        Toast.error(errorMsg);
                    },
                    complete: () => {
                        // 요청 완료 시 플래그 해제 및 버튼 활성화
                        this.isProcessing = false;
                        $('#btnDelete').prop('disabled', false);
                    }
                });
            });
        },

        /**
         * 유효성 검증
         */
        validateForm: function() {
            const monitorId = this.isEditMode ? this.currentMonitorId : $('#monitorId').val().trim();
            const monitorName = $('#monitorName').val().trim();
            const refreshTerm = $('#refreshTerm').val();

            if (!this.isEditMode && !monitorId) {
                Toast.warning('모니터ID를 입력하세요.');
                $('#monitorId').focus();
                return false;
            }

            if (!monitorName) {
                Toast.warning('모니터명을 입력하세요.');
                $('#monitorName').focus();
                return false;
            }

            if (!refreshTerm) {
                Toast.warning('새로고침주기를 선택하세요.');
                $('#refreshTerm').focus();
                return false;
            }

            return true;
        },

        /**
         * 날짜 포맷팅 (YYYYMMDDHH24MISS -> YYYY/MM/DD HH24:MI:SS)
         */
        formatDateTime: function(dateTimeStr) {
            if (!dateTimeStr || dateTimeStr.length !== 14) {
                return dateTimeStr;
            }
            const year = dateTimeStr.substring(0, 4);
            const month = dateTimeStr.substring(4, 6);
            const day = dateTimeStr.substring(6, 8);
            const hour = dateTimeStr.substring(8, 10);
            const minute = dateTimeStr.substring(10, 12);
            const second = dateTimeStr.substring(12, 14);

            return `${year}/${month}/${day} ${hour}:${minute}:${second}`;
        }
    };

    // 이벤트 핸들러 초기화 플래그
    if (!window.MonitorModalInitialized) {
        window.MonitorModalInitialized = true;

        $(document).ready(function() {
            // 저장 버튼
            $(document).on('click', '#btnSave', function() {
                MonitorModal.save();
            });

            // 삭제 버튼
            $(document).on('click', '#btnDelete', function() {
                MonitorModal.deleteMonitor();
            });

            // 모달이 닫힐 때 상태 초기화
            $(document).on('hidden.bs.modal', '#monitorModal', function () {
                MonitorModal.isEditMode = false;
                MonitorModal.currentMonitorId = null;
                MonitorModal.isProcessing = false;
                MonitorModal.resetForm();
            });
        });
    }
</script>
</th:block>
</body>
</html>
