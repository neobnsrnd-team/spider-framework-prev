<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <!-- Include Page Content Layout Styles -->

    <!-- Search Section Header -->
    <div class="page-header">
        <h4 class="page-title">
            <i class="bi bi-exclamation-circle-fill text-danger"></i>
            검색조건
        </h4>
    </div>

    <!-- Search Box -->
    <div th:replace="~{pages/system-biz-reg/system-biz-reg-search :: search}"></div>

    <!-- List Section Header + Toolbar (한 줄) -->
    <div class="d-flex align-items-center mt-3">
        <div class="page-header mb-0">
            <h4 class="page-title mb-0">
                <i class="bi bi-exclamation-circle-fill text-danger"></i>
                리스트
            </h4>
        </div>
        <div class="flex-grow-1" th:insert="~{fragments/page-content-layout :: toolbar}"></div>
    </div>

    <!-- Table -->
    <div th:replace="~{pages/system-biz-reg/system-biz-reg-table :: table}"></div>

    <!-- Pagination -->
    <div th:replace="~{fragments/page-content-layout :: pagination}"></div>

    <!-- Bottom Action Buttons -->
    <div th:replace="~{pages/system-biz-reg/system-biz-reg-buttons :: buttons}"></div>

    <!-- Monitor Modal -->
    <div th:replace="~{pages/system-biz-reg/system-biz-reg-modal :: modal}"></div>

    <!-- 권한 플래그 (모달에서 사용) -->
    <script th:inline="javascript">
        var hasMonitorWrite = /*[[${userAuthorities != null and userAuthorities.contains('MONITOR:W')}]]*/ false;
    </script>

    <!-- Monitor Modal Script -->
    <th:block th:replace="~{pages/system-biz-reg/system-biz-reg-modal :: script}" />

    <!-- Monitor Script -->
    <th:block th:replace="~{pages/system-biz-reg/system-biz-reg-script :: script}" />
</div>
</body>
</html>
