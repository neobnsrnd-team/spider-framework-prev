<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="script">
<script>
    // ==================== CmsStatisticsPage ====================

    window.CmsStatisticsPage = {
        currentPage: 1,
        totalItems: 0,
        itemsPerPage: 10,
        /** 모달 재오픈 시 destroy 후 재생성하기 위한 Chart.js 인스턴스 참조 */
        _detailChart: null,
        /** afterDraw 레이블 계산 시 total 접근용 — _renderDetailChart 실행 시 갱신 */
        _chartTotal: 0,

        /**
         * 비율(%) 계산 헬퍼 — afterDraw·tooltip·요약 테이블에서 공통 사용
         * @param {number} value - 개별 값
         * @param {number} total - 전체 합계
         * @returns {string} 소수점 1자리 퍼센트 문자열 (예: "35.3")
         */
        _pct: function(value, total) {
            return total > 0 ? ((value / total) * 100).toFixed(1) : '0.0';
        },

        /**
         * 막대 끝 레이블 플러그인 — 함수 호출마다 재생성하지 않도록 객체 수준으로 정의
         * _chartTotal 을 통해 렌더링 시점의 total 값을 참조한다.
         */
        _datalabelsPlugin: {
            id: 'cmsStatDatalabels',
            afterDraw(chart) {
                const ctx = chart.ctx;
                const total = CmsStatisticsPage._chartTotal;
                chart.data.datasets.forEach((dataset, i) => {
                    chart.getDatasetMeta(i).data.forEach((bar, index) => {
                        const value = dataset.data[index];
                        const pct = CmsStatisticsPage._pct(value, total);
                        ctx.save();
                        ctx.font = '12px sans-serif';
                        ctx.fillStyle = '#495057';
                        ctx.textAlign = 'left';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(`${value.toLocaleString()} (${pct}%)`, bar.x + 6, bar.y);
                        ctx.restore();
                    });
                });
            }
        },

        load: function(page) {
            if (page !== undefined) this.currentPage = page;
            const params = new URLSearchParams({
                page:      this.currentPage,
                size:      this.itemsPerPage,
                pageId:    $('#filterPageId').val().trim(),
                startDate: $('#filterStartDate').val(),
                endDate:   $('#filterEndDate').val(),
            });

            fetch('/api/cms-admin/statistics?' + params)
                .then(r => r.json())
                .then(res => {
                    if (!res.success) { Toast.error(res.message); return; }
                    const pageData = res.data;
                    this.totalItems = pageData.totalElements;
                    this.renderTable(pageData.content);
                    this.renderPagination();
                })
                .catch(() => Toast.error('통계 조회 중 오류가 발생했습니다.'));
        },

        renderTable: function(rows) {
            const $tbody = $('#statisticsTableBody');
            if (!rows || rows.length === 0) {
                $tbody.html('<tr><td colspan="5" class="text-center py-4 text-body-secondary">아직 수집된 데이터가 없습니다.</td></tr>');
                return;
            }

            const startDate = $('#filterStartDate').val();
            const endDate   = $('#filterEndDate').val();

            const html = rows.map(row => {
                const pid = HtmlUtils.escape(row.pageId || '');
                const escapedName = HtmlUtils.escape(row.pageName || '').replace(/'/g, '&#39;');
                const detailBtn = row.clickCount > 0
                    ? `<button class="btn btn-outline-primary btn-xs"
                           onclick="CmsStatisticsPage.openDetailModal('${pid}', '${escapedName}', '${HtmlUtils.escape(startDate)}', '${HtmlUtils.escape(endDate)}')">상세</button>`
                    : '-';

                return `<tr>
                    <td>${HtmlUtils.escape(row.pageName || '')}</td>
                    <td class="text-monospace small">${pid}</td>
                    <td class="text-end">${(row.viewCount || 0).toLocaleString()}</td>
                    <td class="text-end">${(row.clickCount || 0).toLocaleString()}</td>
                    <td class="text-center">${detailBtn}</td>
                </tr>`;
            }).join('');

            $tbody.html(html);
        },

        renderPagination: function() {
            const totalPages = Math.ceil(this.totalItems / this.itemsPerPage);
            const pagination = $('#pagination');
            pagination.empty();

            pagination.append(`
                <li class="page-item ${this.currentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="CmsStatisticsPage.changePage(1); return false;"><i class="bi bi-chevron-double-left"></i></a>
                </li>
                <li class="page-item ${this.currentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="CmsStatisticsPage.changePage(${this.currentPage - 1}); return false;"><i class="bi bi-chevron-left"></i></a>
                </li>
            `);

            const maxButtons = 5;
            let startPage = Math.max(1, this.currentPage - Math.floor(maxButtons / 2));
            let endPage   = Math.min(totalPages, startPage + maxButtons - 1);
            if (endPage - startPage + 1 < maxButtons) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }

            for (let i = startPage; i <= endPage; i++) {
                pagination.append(`
                    <li class="page-item ${i === this.currentPage ? 'active' : ''}">
                        <a class="page-link" href="#" onclick="CmsStatisticsPage.changePage(${i}); return false;">${i}</a>
                    </li>
                `);
            }

            pagination.append(`
                <li class="page-item ${this.currentPage === totalPages || totalPages === 0 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="CmsStatisticsPage.changePage(${this.currentPage + 1}); return false;"><i class="bi bi-chevron-right"></i></a>
                </li>
                <li class="page-item ${this.currentPage === totalPages || totalPages === 0 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="CmsStatisticsPage.changePage(${totalPages}); return false;"><i class="bi bi-chevron-double-right"></i></a>
                </li>
            `);

            const start = this.totalItems === 0 ? 0 : (this.currentPage - 1) * this.itemsPerPage + 1;
            const end   = Math.min(this.currentPage * this.itemsPerPage, this.totalItems);
            $('#pageInfo').text(`${start} - ${end} of ${this.totalItems} items`);
        },

        changePage: function(page) {
            const totalPages = Math.ceil(this.totalItems / this.itemsPerPage);
            if (page < 1 || page > totalPages) return;
            this.currentPage = page;
            this.load();
        },

        reset: function() {
            const today = this._today();
            const thirtyDaysAgo = this._daysAgo(30);
            $('#filterStartDate').val(thirtyDaysAgo);
            $('#filterEndDate').val(today);
            $('#filterPageId').val('');
            this.itemsPerPage = parseInt($('#limitRows').val()) || 10;
            this.load(1);
        },

        openDetailModal: function(pageId, pageName, startDate, endDate) {
            $('#detailPageName').text(pageName);

            // 모달 재오픈 시 기존 차트 인스턴스 해제 (캔버스 재사용 시 오류 방지)
            if (this._detailChart) {
                this._detailChart.destroy();
                this._detailChart = null;
            }

            // 로딩 상태로 초기화
            $('#detailLoading').show();
            $('#detailChartWrapper').addClass('d-none');
            $('#detailSummaryTable').addClass('d-none');
            $('#detailNoData').addClass('d-none').removeClass('text-danger').text('');

            // getOrCreateInstance — 매 호출마다 새 인스턴스를 생성하지 않아 메모리 누수 방지
            bootstrap.Modal.getOrCreateInstance('#detailModal').show();

            const params = new URLSearchParams({ pageId, startDate, endDate });
            fetch('/api/cms-admin/statistics/detail?' + params)
                .then(r => r.json())
                .then(res => {
                    $('#detailLoading').hide();

                    if (!res.success || !res.data || res.data.length === 0) {
                        $('#detailNoData').removeClass('d-none').text('클릭 데이터가 없습니다.');
                        return;
                    }

                    this._renderDetailChart(res.data);
                })
                .catch(() => {
                    $('#detailLoading').hide();
                    $('#detailNoData').removeClass('d-none').addClass('text-danger').text('상세 조회 실패');
                });
        },

        /**
         * 컴포넌트별 클릭 수를 가로형 막대 차트 + 요약 테이블로 렌더링한다.
         * - 최대 클릭 컴포넌트: 강조색(#0d6efd), 나머지: 무채색(#adb5bd)
         * - 막대 끝 afterDraw 플러그인으로 "클릭수 (비율%)" 레이블 표시
         * - 레이블 길이에 따라 오른쪽 패딩을 동적 계산하여 잘림 방지
         * - 데이터 수에 따라 캔버스 높이를 동적 설정하여 막대 간격 균일화
         */
        _renderDetailChart: function(data) {
            const total = data.reduce((sum, d) => sum + (d.clickCount || 0), 0);
            const maxClick = Math.max(...data.map(d => d.clickCount || 0));

            // afterDraw 플러그인이 클로저 없이 total에 접근할 수 있도록 객체 프로퍼티에 저장
            this._chartTotal = total;

            const labels = data.map(d => d.componentId || '');
            const values = data.map(d => d.clickCount || 0);
            const colors = values.map(v => v === maxClick ? '#0d6efd' : '#adb5bd');

            // measureText()로 실제 텍스트 픽셀 너비를 측정하여 우측 패딩 계산 (매직 넘버 제거)
            const maxLabelText = maxClick.toLocaleString() + ' (100.0%)';
            const tempCtx = document.createElement('canvas').getContext('2d');
            tempCtx.font = '12px sans-serif';
            const rightPadding = tempCtx.measureText(maxLabelText).width + 12;

            // 데이터 수에 따라 캔버스 높이 동적 설정 (막대 1개당 22px + 상하 여백)
            const canvasHeight = Math.max(80, data.length * 22 + 30);
            $('#detailBarChart').css('height', canvasHeight + 'px');

            const canvas = document.getElementById('detailBarChart');
            $('#detailChartWrapper').removeClass('d-none');

            this._detailChart = new Chart(canvas.getContext('2d'), {
                type: 'bar',
                plugins: [this._datalabelsPlugin],
                data: {
                    labels,
                    datasets: [{
                        data: values,
                        backgroundColor: colors,
                        borderRadius: 3,
                        barThickness: 14,
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: ctx => ` ${ctx.parsed.x.toLocaleString()} (${CmsStatisticsPage._pct(ctx.parsed.x, total)}%)`
                            }
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            grid: { color: 'rgba(0,0,0,0.05)' }
                        },
                        y: { grid: { display: false } }
                    },
                    layout: { padding: { right: rightPadding } }
                }
            });

            // 요약 테이블 렌더링
            this._renderSummaryTable(data, total, maxClick);
        },

        /**
         * 차트 하단 요약 테이블을 렌더링한다.
         * - 최다 클릭 행에 강조 배지 표시
         * - 합계 행(tfoot) 추가
         */
        _renderSummaryTable: function(data, total, maxClick) {
            const rows = data.map(d => {
                const count = d.clickCount || 0;
                const pct = this._pct(count, total);
                const badge = count === maxClick
                    ? ' <span class="badge bg-primary ms-1" style="font-size:10px;">최다</span>'
                    : '';
                return `<tr>
                    <td class="text-monospace small">${HtmlUtils.escape(d.componentId || '')}${badge}</td>
                    <td class="text-end">${count.toLocaleString()}</td>
                    <td class="text-end text-body-secondary">${pct}%</td>
                </tr>`;
            }).join('');

            $('#detailSummaryBody').html(rows);
            $('#detailSummaryFoot').html(`
                <tr>
                    <td>합계</td>
                    <td class="text-end">${total.toLocaleString()}</td>
                    <td class="text-end">100.0%</td>
                </tr>
            `);
            $('#detailSummaryTable').removeClass('d-none');
        },

        _today: function() {
            return new Date().toLocaleDateString('en-CA');
        },

        _daysAgo: function(days) {
            const d = new Date();
            d.setDate(d.getDate() - days);
            return d.toLocaleDateString('en-CA');
        },
    };

    // ==================== 이벤트 바인딩 ====================

    $(document).ready(function() {
        const today = CmsStatisticsPage._today();
        const thirtyDaysAgo = CmsStatisticsPage._daysAgo(30);
        $('#filterStartDate').val(thirtyDaysAgo);
        $('#filterEndDate').val(today);

        CmsStatisticsPage.itemsPerPage = parseInt($('#limitRows').val()) || 10;
        CmsStatisticsPage.load(1);

        $('#limitRows').on('change', function() {
            CmsStatisticsPage.itemsPerPage = parseInt($(this).val()) || 10;
            CmsStatisticsPage.load(1);
        });

        $('#btnRefresh').off('click').on('click', function() { CmsStatisticsPage.load(); });
    });
</script>
</th:block>
</body>
</html>
