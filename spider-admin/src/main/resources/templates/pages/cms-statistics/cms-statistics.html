<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

    <!-- 검색조건 헤더 -->
    <div class="page-header">
        <h4 class="page-title">
            <i class="bi bi-exclamation-circle-fill text-danger"></i>
            검색조건
        </h4>
    </div>

    <!-- 검색 영역 -->
    <div th:replace="~{pages/cms-statistics/cms-statistics-search :: search}"></div>

    <!-- 리스트 헤더 + 툴바 -->
    <div class="page-header mt-3">
        <h4 class="page-title">
            <i class="bi bi-exclamation-circle-fill text-danger"></i>
            리스트
        </h4>
        <div class="page-header-actions">
            <button class="btn btn-outline-secondary btn-sm" id="btnRefresh">
                <i class="bi bi-arrow-clockwise"></i> 새로고침
            </button>
        </div>
    </div>

    <!-- 테이블 -->
    <div th:replace="~{pages/cms-statistics/cms-statistics-table :: table}"></div>

    <!-- 페이지네이션 -->
    <div th:replace="~{fragments/page-content-layout :: pagination}"></div>

    <!-- ==================== 컴포넌트 클릭 상세 모달 ==================== -->
    <div class="modal fade" id="detailModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">컴포넌트 클릭 상세</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body px-4 py-3">
                    <p id="detailPageName" class="mb-3 fw-medium text-body-secondary"></p>

                    <!-- 로딩 스피너 -->
                    <div id="detailLoading" class="text-center py-5 text-body-secondary">
                        <i class="bi bi-arrow-repeat sp-spin"></i> 불러오는 중...
                    </div>

                    <!-- 데이터 없음 / 오류 메시지 (기본 숨김) -->
                    <p id="detailNoData" class="text-center text-body-secondary d-none mb-0 py-4"></p>

                    <!-- 전체 누적 클릭 수 — 차트 렌더링 시 표시 -->
                    <p id="detailTotalClicks" class="d-none text-body-secondary small mb-2"></p>

                    <!-- 차트 영역 — 가운데 정렬, 좌우 여백으로 레이블 잘림 방지 -->
                    <div id="detailChartWrapper" class="d-none px-2 mb-4" style="max-width: 600px;">
                        <canvas id="detailBarChart"></canvas>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" id="detailPreviewBtn" class="btn btn-info btn-sm d-none me-auto">
                        <i class="bi bi-box-arrow-up-right"></i> 페이지 미리보기
                    </button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Chart.js — CMS 통계 상세 모달 가로형 막대 차트용 (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js" crossorigin="anonymous"></script>

    <!-- 스크립트 -->
    <th:block th:replace="~{pages/cms-statistics/cms-statistics-script :: script}"/>

</div>
</body>
</html>
