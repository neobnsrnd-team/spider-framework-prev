<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <!-- Include Page Content Layout Styles -->


    <!-- Search Section Header -->
    <div class="page-header">
        <h4 class="page-title">
            <i class="bi bi-exclamation-circle-fill text-danger"></i>
            검색조건
        </h4>
    </div>

    <!-- Search Container (동적 생성) -->
    <div id="searchContainer"></div>

    <!-- List Section Header -->
    <div class="page-header mt-3">
        <h4 class="page-title">
            <i class="bi bi-exclamation-circle-fill text-danger"></i>
            리스트
        </h4>
    </div>

    <!-- Toolbar -->
    <th:block th:replace="~{fragments/page-content-layout :: toolbar}" />

    <!-- Table Container (동적 생성) -->
    <div id="tableContainer"></div>

    <!-- Pagination -->
    <th:block th:replace="~{fragments/page-content-layout :: pagination}" />

    <!-- Bottom Action Buttons -->
    <div class="bottom-actions">
        <button class="btn btn-primary btn-sm" id="btnAdd"
                th:if="${userAuthorities != null and userAuthorities.contains('CODE_GROUP:W')}">
            + 추가
        </button>
    </div>

    <!-- Code Group Modal (기존 유지) -->
    <div th:replace="~{pages/neb-code-group-manage/neb-code-group-manage-modal :: modal}"></div>
    <th:block th:replace="~{pages/neb-code-group-manage/neb-code-group-manage-modal :: script}" />

    <!-- Page Script -->
    <script th:inline="javascript">
        // 코드그룹 관리 페이지 설정
        var PAGE_CONFIG = {
            pageId: 'codeGroups',
            apiEndpoint: API_BASE_URL + '/code-groups/page',

            // 검색 폼 설정
            search: {
                fields: [
                    {
                        type: 'select',
                        id: 'searchField',
                        width: '120px',
                        options: [
                            { value: 'codeGroupName', label: '코드그룹명' },
                            { value: 'codeGroupId', label: '코드그룹ID' }
                        ]
                    },
                    {
                        type: 'text',
                        id: 'searchValue',
                        placeholder: '검색어 입력',
                        width: '180px'
                    }
                ],
                limit: { default: 10, showLarge: true }
            },

            // 테이블 설정
            table: {
                id: 'codeGroupTable',
                columns: [
                    { key: 'codeGroupId', label: '코드그룹ID', width: '150px', sortable: true },
                    { key: 'codeGroupName', label: '코드그룹명', width: '300px', sortable: true, align: 'left' },
                    { key: 'codeGroupDesc', label: '코드설명', width: '400px', sortable: true, align: 'left' },
                    { key: 'bizGroupId', label: '업무분류', width: '120px' },
                    { key: 'codeCount', label: '속한코드수', width: '120px', sortable: true }
                ],
                emptyMessage: '데이터를 불러오는 중입니다...',
                noDataMessage: '조회된 데이터가 없습니다.'
            },

            containers: {
                search: '#searchContainer',
                table: '#tableContainer',
                pagination: '#pagination',
                pageInfo: '#pageInfo'
            },

            autoLoad: true
        };

        // 페이지 상태 관리
        window.CodeGroupsPage = {
            currentPage: 1,
            totalItems: 0,
            itemsPerPage: 10,
            sortBy: null,
            sortDirection: null,

            init: function() {
                // 1. 검색 폼 렌더링
                SearchForm.render('#searchContainer', PAGE_CONFIG.search, () => {
                    this.currentPage = 1;
                    this.load();
                });

                // 2. 테이블 렌더링
                const tableConfig = {
                    ...PAGE_CONFIG.table,
                    onSort: (sortBy, sortDirection) => {
                        this.sortBy = sortBy;
                        this.sortDirection = sortDirection;
                        this.currentPage = 1;
                        this.load();
                    }
                };

                DataTable.render('#tableContainer', tableConfig, (row) => {
                    // 행 클릭 시 모달 열기
                    if (typeof CodeGroupModal !== 'undefined') {
                        CodeGroupModal.openForEdit(row.codeGroupId);
                    }
                });

                // 3. 페이지네이션 초기화
                Pagination.init('#pagination', '#pageInfo', (page) => {
                    this.currentPage = page;
                    this.load();
                });

                // 4. 버튼 이벤트 바인딩
                $('#btnAdd').off('click').on('click', () => {
                    if (typeof CodeGroupModal !== 'undefined') {
                        CodeGroupModal.openForCreate();
                    }
                });

                $('#btnRefresh').off('click').on('click', () => {
                    this.load();
                });

                $('#btnExcel').off('click').on('click', () => {
                    this.exportExcel();
                });

                $('#btnPrint').off('click').on('click', () => {
                    this.printTable();
                });

                // 5. 자동 로드
                if (PAGE_CONFIG.autoLoad) {
                    this.load();
                }
            },

            load: function() {
                const params = SearchForm.getParams('#searchContainer');
                params.page = this.currentPage;
                params.size = params.size || this.itemsPerPage;

                if (this.sortBy) {
                    params.sortBy = this.sortBy;
                    params.sortDirection = this.sortDirection || 'ASC';
                }

                $.ajax({
                    url: PAGE_CONFIG.apiEndpoint,
                    method: 'GET',
                    data: params,
                    success: (response) => {
                        if (response.success && response.data) {
                            const pageData = response.data;
                            DataTable.setData('#tableContainer', pageData.content || []);

                            this.totalItems = pageData.totalElements || 0;
                            this.itemsPerPage = params.size;

                            Pagination.update('#pagination', {
                                currentPage: this.currentPage,
                                totalItems: this.totalItems,
                                itemsPerPage: this.itemsPerPage
                            });
                        } else {
                            DataTable.setData('#tableContainer', []);
                            Pagination.reset('#pagination');
                        }
                    },
                    error: (xhr) => {
                        console.error('Failed to load code groups:', xhr);
                        Toast.error('코드그룹 목록을 불러오는데 실패했습니다.');
                        DataTable.setData('#tableContainer', []);
                        Pagination.reset('#pagination');
                    }
                });
            },

            printTable: function() {
                const columns = PAGE_CONFIG.table.columns.map(col => ({ key: col.key, label: col.label }));
                const data = DataTable.getData('#tableContainer');
                PrintUtil.print({ title: '코드 그룹 목록', columns: columns, data: data });
            },

            exportExcel: function() {
                const params = SearchForm.getParams('#searchContainer');
                delete params.page;
                delete params.size;
                if (this.sortBy) {
                    params.sortBy = this.sortBy;
                    params.sortDirection = this.sortDirection || 'ASC';
                }
                const queryString = $.param(params);
                window.location.href = API_BASE_URL + '/code-groups/export' + (queryString ? '?' + queryString : '');
            }
        };

        // 기존 CodeGroups 객체와의 호환성 유지
        window.CodeGroups = {
            load: function() { CodeGroupsPage.load(); },
            exportExcel: function() { CodeGroupsPage.exportExcel(); },
            print: function() { CodeGroupsPage.printTable(); },
            openAddModal: function() {
                if (typeof CodeGroupModal !== 'undefined') {
                    CodeGroupModal.openForCreate();
                }
            }
        };

        // 페이지 초기화
        $(document).ready(function() {
            CodeGroupsPage.init();
        });
    </script>
</div>
</body>
</html>
