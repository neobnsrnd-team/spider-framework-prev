<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

    <!-- 검색조건 헤더 -->
    <div class="page-header">
        <h4 class="page-title">
            <i class="bi bi-exclamation-circle-fill text-danger"></i>
            검색조건
        </h4>
    </div>

    <!-- 검색 영역 -->
    <div th:replace="~{pages/cms-dashboard/cms-dashboard-search :: search}"></div>

    <!-- 리스트 헤더 + 툴바 -->
    <div class="page-header mt-3">
        <h4 class="page-title">
            <i class="bi bi-exclamation-circle-fill text-danger"></i>
            내 페이지 목록
        </h4>
        <div class="page-header-actions">
            <button class="btn btn-primary btn-sm" id="btnCreatePage"
                    th:if="${userAuthorities != null && userAuthorities.contains('CMS:R')}">
                <i class="bi bi-plus-lg"></i> 새 페이지
            </button>
        </div>
    </div>

    <!-- 테이블 -->
    <div th:replace="~{pages/cms-dashboard/cms-dashboard-table :: table}"></div>

    <!-- 페이지네이션 -->
    <div th:replace="~{fragments/page-content-layout :: pagination}"></div>

    <!-- ==================== 새 페이지 생성 모달 ==================== -->
    <div class="modal fade" id="createPageModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">새 페이지 만들기</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">페이지명 <span class="text-danger">*</span></label>
                        <input type="text" id="createPageName" class="form-control"
                               placeholder="예: 메인 페이지"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">레이아웃 선택 <span class="text-danger">*</span></label>
                        <input type="hidden" id="createViewMode" value="mobile"/>
                        <div class="cms-create-view-mode-group" role="group" aria-label="레이아웃 선택">
                            <button type="button" class="cms-create-view-mode active" data-view-mode="mobile">
                                <span class="cms-create-view-mode-icon">📱</span>
                                <span class="cms-create-view-mode-title">모바일</span>
                                <span class="cms-create-view-mode-desc">390px 고정 너비<br/>모바일 앱 화면에 최적화</span>
                            </button>
                            <button type="button" class="cms-create-view-mode" data-view-mode="web">
                                <span class="cms-create-view-mode-icon">🖥️</span>
                                <span class="cms-create-view-mode-title">웹</span>
                                <span class="cms-create-view-mode-desc">1280px 고정 너비<br/>데스크톱 웹 페이지용</span>
                            </button>
                            <button type="button" class="cms-create-view-mode" data-view-mode="responsive">
                                <span class="cms-create-view-mode-icon">🔄</span>
                                <span class="cms-create-view-mode-title">반응형</span>
                                <span class="cms-create-view-mode-desc">전체 너비 사용<br/>모든 기기에 대응</span>
                            </button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <input type="hidden" id="createTemplateId" value="blank"/>
                        <button class="cms-create-template-toggle" type="button"
                                data-bs-toggle="collapse" data-bs-target="#createTemplateCollapse"
                                aria-expanded="true" aria-controls="createTemplateCollapse">
                            <span>템플릿 선택</span>
                            <span class="cms-create-template-current">
                                <span class="cms-create-template-selected-name">빈 페이지</span>
                                <i class="bi bi-chevron-down"></i>
                            </span>
                        </button>
                        <div class="collapse show" id="createTemplateCollapse">
                            <div class="cms-create-template-list" role="listbox">
                                <button type="button" class="cms-create-template active" data-template-id="blank">
                                    <span class="cms-create-template-radio"></span>
                                    <span>
                                        <span class="cms-create-template-title">빈 페이지</span>
                                        <span class="cms-create-template-desc">아무 컴포넌트도 없는 빈 화면에서 시작합니다.</span>
                                    </span>
                                </button>
                            </div>
                        </div>
                    </div>
                    <p class="mb-0 text-body-secondary small">레이아웃은 페이지 생성 후 변경할 수 없습니다.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="button" id="btnCreatePageConfirm" class="btn btn-primary">만들기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== 승인 요청 모달 ==================== -->
    <div class="modal fade" id="approveRequestModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="approveRequestModalTitle">승인 요청</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="approveRequestPageId"/>
                    <div class="table-responsive">
                        <table class="table table-sm mb-3">
                            <tbody>
                                <tr>
                                    <th class="col-w-120">페이지명</th>
                                    <td id="approveRequestPageName">-</td>
                                </tr>
                                <tr>
                                    <th>승인자 <span class="text-danger">*</span></th>
                                    <td>
                                        <select id="approveRequestApproverId" class="form-select form-select-sm">
                                            <option value="">승인자 선택</option>
                                        </select>
                                    </td>
                                </tr>
                                <tr>
                                    <th>노출 시작일</th>
                                    <td>
                                        <input type="date" id="approveRequestBeginningDate"
                                               class="form-control form-control-sm"/>
                                    </td>
                                </tr>
                                <tr>
                                    <th>노출 종료일</th>
                                    <td>
                                        <input type="date" id="approveRequestExpiredDate"
                                               class="form-control form-control-sm"/>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="button" id="btnApproveRequestConfirm" class="btn btn-primary">요청</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== 반려 사유 확인 모달 ==================== -->
    <div class="modal fade" id="rejectedReasonModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">반려 사유</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="rejectedReasonText" class="mb-0 text-break"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 스크립트 -->
    <th:block th:replace="~{pages/cms-dashboard/cms-dashboard-script :: script}"/>

</div>
</body>
</html>
