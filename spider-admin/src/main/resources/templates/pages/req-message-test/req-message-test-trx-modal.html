<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="modal">
    <!-- 거래 조회 모달 -->
    <div class="modal fade" id="trxSearchModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog sp-modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">거래 리스트</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- 검색 조건 -->
                    <div class="row mb-3">
                        <div class="col-12 mb-2">
                            <label class="form-label">기관ID</label>
                            <select class="form-select form-select-sm" id="modalOrgId">
                                <option value="">ALL</option>
                            </select>
                        </div>
                        <div class="col-12 mb-2">
                            <label class="form-label">거래ID</label>
                            <input type="text" class="form-control form-control-sm" id="modalTrxId">
                        </div>
                        <div class="col-12 mb-2">
                            <label class="form-label">거래명</label>
                            <input type="text" class="form-control form-control-sm" id="modalTrxName">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-12 text-center">
                            <button type="button" class="btn btn-primary btn-sm" id="btnModalSearch">조회</button>
                        </div>
                    </div>

                    <!-- 조회 결과 카운트 -->
                    <div class="row mb-2">
                        <div class="col-12">
                            <span id="trxListCount" class="sp-result-count">총 <strong id="trxTotalCount">0</strong>건</span>
                        </div>
                    </div>

                    <!-- 거래 목록 테이블 -->
                    <div class="table-responsive sp-scrollable">
                        <table class="table table-bordered table-sm table-hover fs-sm">
                            <thead class="table-light sp-sticky-top">
                            <tr>
                                <th class="col-w-150">
                                    <div class="sp-th-sort-flex" onclick="sortTrxList('orgName')" title="클릭하여 정렬">
                                        <span>기관명</span>
                                        <i class="bi bi-arrow-down-up text-body-secondary fs-sm" id="sortIconOrgName"></i>
                                    </div>
                                </th>
                                <th class="col-w-150">
                                    <div class="sp-th-sort-flex" onclick="sortTrxList('trxId')" title="클릭하여 정렬">
                                        <span>거래ID</span>
                                        <i class="bi bi-arrow-down-up text-body-secondary fs-sm" id="sortIconTrxId"></i>
                                    </div>
                                </th>
                                <th class="col-w-200">
                                    <div class="sp-th-sort-flex" onclick="sortTrxList('trxName')" title="클릭하여 정렬">
                                        <span>거래명</span>
                                        <i class="bi bi-arrow-down-up text-body-secondary fs-sm" id="sortIconTrxName"></i>
                                    </div>
                                </th>
                            </tr>
                            </thead>
                            <tbody id="trxModalTableBody" class="fs-sm">
                            <!-- 거래 목록이 여기에 표시됩니다 -->
                            </tbody>
                        </table>
                    </div>

                    <!-- 페이지네이션 -->
                    <nav aria-label="거래 목록 페이지네이션" class="mt-3">
                        <ul class="pagination pagination-sm justify-content-center" id="trxModalPagination">
                        </ul>
                    </nav>
                </div>
                <div class="modal-footer justify-content-end">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal"><i class="bi bi-x-lg"></i> 닫기</button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
