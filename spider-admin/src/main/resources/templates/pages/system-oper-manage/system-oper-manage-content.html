<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

    <!-- 페이지 헤더 -->
    <div class="page-header mb-2">
        <h4 class="page-title">
            <i class="bi bi-arrow-clockwise"></i>
            운영정보Reload
        </h4>
    </div>

    <!-- 메인 컨테이너 -->
    <div class="reload-container">
        <!-- 왼쪽: Reload 항목 리스트 -->
        <div class="reload-list-panel">
            <div class="reload-list-header">
                <i class="bi bi-play-fill"></i> 리스트
            </div>
            <ul class="reload-list-items" id="reloadTypeList">
                <!-- JS로 동적 렌더링 -->
            </ul>
        </div>

        <!-- 오른쪽: 상세 정보 + WAS 카드 -->
        <div class="reload-detail-panel">
            <div class="reload-detail-info d-hidden" id="reloadDetailInfo">
                <div class="label">대상 : <span id="reloadTargetLabel"></span></div>
                <div class="desc">설명 : <span id="reloadTargetDesc"></span></div>
            </div>

            <div class="reload-toolbar">
                <label>Was그룹 :</label>
                <select id="wasGroupSelect">
                    <option value="">전체</option>
                </select>
                <button class="btn-reload" id="btnReload" disabled>
                    <i class="bi bi-search"></i> Was별 Reload
                </button>
            </div>

            <div class="sp-select-card-grid" id="wasCardGrid">
                <!-- JS로 동적 렌더링 -->
            </div>
        </div>
    </div>

    <!-- Reload 에러 상세 모달 -->
    <div th:replace="~{pages/system-oper-manage/system-oper-manage-modal :: modal}"></div>

    <!-- Script -->
    <th:block th:replace="~{pages/system-oper-manage/system-oper-manage-script :: script}" />
</div>
</body>
</html>
