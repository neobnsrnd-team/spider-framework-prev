<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="editModal">
    <div id="mappingEditModal" class="modal fade" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered sp-modal-sm">
            <div class="modal-content">
        <div class="modal-header py-2">
            <span id="mappingModalTitle">Gateway 매핑 편집</span>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <div class="modal-body">
            <input type="hidden" id="editMappingOriginalKey" />

            <div class="card border p-2 mb-2">
                <div class="d-flex flex-wrap align-items-center gap-2 mb-1">
                    <div class="col-auto flex-grow-1">
                        <label class="form-label mb-0 small fw-medium">기관 ID</label>
                        <select id="editOrgId" class="form-select form-select-sm editable-field col-w-300">
                            <option value="">선택하세요</option>
                        </select>
                    </div>
                </div>
                <div class="d-flex flex-wrap align-items-center gap-2 mb-1">
                    <div class="col-auto flex-grow-1">
                        <label class="form-label mb-0 small fw-medium">어댑터/리스너</label>
                        <select id="editIoType" class="form-select form-select-sm editable-field col-w-300">
                            <option value="">선택하세요</option>
                            <option value="O">어댑터(송신)</option>
                            <option value="I">리스너(수신)</option>
                        </select>
                    </div>
                </div>
                <div class="d-flex flex-wrap align-items-center gap-2 mb-1">
                    <div class="col-auto flex-grow-1">
                        <label class="form-label mb-0 small fw-medium">요청/응답</label>
                        <select id="editReqResType" class="form-select form-select-sm editable-field col-w-300">
                            <option value="">선택하세요</option>
                            <option value="Q">요청</option>
                            <option value="S">응답</option>
                        </select>
                    </div>
                </div>
                <div class="d-flex flex-wrap align-items-center gap-2 mb-1">
                    <div class="col-auto flex-grow-1">
                        <label class="form-label mb-0 small fw-medium">거래유형</label>
                        <select id="editTrxType" class="form-select form-select-sm editable-field col-w-300">
                            <option value="">선택하세요</option>
                        </select>
                    </div>
                </div>
                <div class="d-flex flex-wrap align-items-center gap-2 mb-1">
                    <div class="col-auto flex-grow-1">
                        <label class="form-label mb-0 small fw-medium">GATEWAY ID</label>
                        <input id="editGwId" type="text" class="form-control form-control-sm editable-field col-w-300"
                               maxlength="20">
                    </div>
                </div>
            </div>
        </div>

        <div class="modal-footer py-2">
            <button class="btn btn-xs btn-primary" onclick="GatewayMappingList.saveEditModal()"><i class="bi bi-floppy"></i> 저장</button>
            <button class="btn btn-xs btn-outline-secondary" data-bs-dismiss="modal"><i class="bi bi-x-lg"></i> 취소</button>
        </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
