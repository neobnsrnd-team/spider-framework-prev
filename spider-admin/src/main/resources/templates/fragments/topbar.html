<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="topbar" class="top-bar">
        <!-- Right Side -->
        <div class="d-flex align-items-center gap-2">
            <button type="button" class="btn-theme-toggle" onclick="ThemeManager.toggle()" title="테마 전환">
                <i id="themeToggleIcon" class="bi bi-moon"></i>
            </button>
            <div class="user-account-menu position-relative">
                <button type="button" class="user-account-toggle d-flex align-items-center gap-1" data-bs-toggle="dropdown" aria-expanded="false">
                    <span class="user-avatar" th:text="${!#strings.isEmpty(userName) ? #strings.substring(userName, 0, 1).toUpperCase() : 'G'}">G</span>
                    <span class="d-flex flex-column align-items-start lh-sm">
                        <span class="user-account-name" th:text="${userName} ?: 'guest01'">guest01</span>
                        <span class="user-account-id" th:text="${userId} ?: 'guest01'">guest01</span>
                    </span>
                    <i class="bi bi-chevron-down user-account-caret"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="dropdown-item d-flex align-items-center gap-2">
                                <i class="bi bi-box-arrow-right"></i> 로그아웃
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
