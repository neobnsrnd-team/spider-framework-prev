# SonarCloud 설정
# 사전 준비: https://sonarcloud.io 에서 프로젝트 생성 후 아래 값 수정

sonar.organization=neobnsrnd-team
sonar.projectKey=neobnsrnd-team_spider-admin

sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes

# JaCoCo 커버리지 리포트 경로
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# 제외 패턴
sonar.exclusions=src/main/resources/static/**,src/main/resources/templates/**

# CPD 설정: mvn sonar:sonar는 이 파일을 읽지 않으므로 sonar.cpd.exclusions는 pom.xml에 선언됨
# (참조용) sonar.cpd.exclusions=src/test/**,src/main/java/**/dto/**
