# ============================================
# Logstash Pipeline Configuration
# ============================================
# Receives logs from Spring Boot via LogstashTcpSocketAppender
# and forwards to Elasticsearch

input {
    tcp {
        port => 5000
        codec => json_lines
    }
}

filter {
    # 타임스탬프 파싱
    date {
        match => ["@timestamp", "ISO8601"]
        target => "@timestamp"
    }

    # traceId가 없으면 기본값 설정
    if ![traceId] {
        mutate {
            add_field => { "traceId" => "SYSTEM" }
        }
    }

    # 불필요한 필드 제거
    mutate {
        remove_field => ["@version", "host", "port"]
    }
}

output {
    elasticsearch {
        hosts => ["http://elasticsearch:9200"]
        index => "spider-admin-logs-%{+YYYY.MM.dd}"
    }

    # 디버깅용 콘솔 출력 (필요시 주석 해제)
    # stdout {
    #     codec => rubydebug
    # }
}
