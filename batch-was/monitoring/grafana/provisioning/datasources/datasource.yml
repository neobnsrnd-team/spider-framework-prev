apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    # proxy: Grafana 서버가 Prometheus에 직접 요청 (브라우저→Grafana→Prometheus 경로)
    access: proxy
    # docker-compose 내부 네트워크에서 prometheus 서비스명으로 접근
    url: http://prometheus:9090
    # 기본 데이터소스로 설정 — 대시보드에서 별도 선택 불필요
    isDefault: true
    jsonData:
      # Grafana 쿼리 시간 간격 기본값 — prometheus.yml scrape_interval 과 맞춤
      timeInterval: '15s'
