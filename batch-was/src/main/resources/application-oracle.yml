# ============================================
# Oracle Database Configuration
# ============================================
# Admin과 동일한 Oracle DB에 연결.
# Spring Batch 메타 테이블(BATCH_JOB_INSTANCE 등)도 동일 스키마에 생성.
# Sensitive values are loaded from environment variables (.env).
# ============================================

spring:
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url: ${DB_URL:jdbc:oracle:thin:@localhost:1521:XE}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    hikari:
      # Admin과 동일 스키마 사용 (FWK_BATCH_APP, FWK_BATCH_HIS 공유)
      connection-init-sql: ALTER SESSION SET CURRENT_SCHEMA = ${DB_SCHEMA:}
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

mybatis:
  mapper-locations: classpath:mapper/oracle/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    jdbc-type-for-null: VARCHAR
    lazy-loading-enabled: false
    cache-enabled: false
