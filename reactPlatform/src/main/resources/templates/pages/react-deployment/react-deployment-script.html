<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="script">
<script th:inline="javascript">
/*<![CDATA[*/
(function () {
const HAS_WRITE = document.getElementById('hasDeployWriteAuth')?.value === 'true';

// 배포 상태 배지 정의
const DEPLOY_STATUS_LABEL = {
    SUCCESS: { text: '성공', cls: 'bg-success' },
    FAILED:  { text: '실패', cls: 'bg-danger'  },
};

/** yyyyMMddHHmmss → yyyy-MM-dd HH:mm 형식으로 변환한다. */
function formatDtime(dtime) {
    if (!dtime || dtime.length < 12) return dtime || '';
    return dtime.substring(0, 4) + '-' + dtime.substring(4, 6) + '-' +
           dtime.substring(6, 8) + ' ' + dtime.substring(8, 10) + ':' + dtime.substring(10, 12);
}

/**
 * URL이 http/https 프로토콜을 사용하는지 검증한다.
 * javascript: 등 위험 프로토콜을 href에 바인딩하지 않기 위해 사용한다.
 */
function isSafeUrl(url) {
    if (!url) return false;
    try {
        const parsed = new URL(url);
        return parsed.protocol === 'https:' || parsed.protocol === 'http:';
    } catch {
        return false;
    }
}

/** 배포 상태 뱃지 HTML을 반환한다. null이면 '-'를 반환한다. */
function deployStatusBadge(status, prUrl) {
    if (!status) return '<span class="text-body-secondary">-</span>';
    const info = DEPLOY_STATUS_LABEL[status] || { text: status, cls: 'bg-secondary' };
    let badge = `<span class="badge ${info.cls}">${info.text}</span>`;
    // SUCCESS이고 PR URL이 있으면 뱃지 옆에 링크 추가
    if (status === 'SUCCESS' && isSafeUrl(prUrl)) {
        badge += ` <a href="${HtmlUtils.escape(prUrl)}" target="_blank" rel="noopener noreferrer"
                      class="ms-1 small"><i class="bi bi-box-arrow-up-right"></i> PR</a>`;
    }
    return badge;
}

/** PR URL 또는 실패 사유 셀 내용을 반환한다. */
function detailCell(deployStatus, prUrl, failReason) {
    if (deployStatus === 'SUCCESS' && isSafeUrl(prUrl)) {
        return `<a href="${HtmlUtils.escape(prUrl)}" target="_blank" rel="noopener noreferrer">
                    <i class="bi bi-box-arrow-up-right me-1"></i>${HtmlUtils.escape(prUrl)}
                </a>`;
    }
    if (deployStatus === 'FAILED' && failReason) {
        return `<span class="text-danger small">${HtmlUtils.escape(failReason)}</span>`;
    }
    return '<span class="text-body-secondary">-</span>';
}

// ═══════════════════════════════════════════════════════
//  배포 가능 목록 모듈
// ═══════════════════════════════════════════════════════
const ReactDeployList = window.ReactDeployList = {
    currentPage: 1,
    totalItems:  0,
    pageSize:    10,

    load: function (page) {
        this.currentPage = page || 1;
        const search = $('#deployListSearch').val().trim();
        $.get(API_BASE_URL + '/react-deploy', {
            page: this.currentPage, size: this.pageSize, search
        })
        .done(res => {
            if (res.success) {
                this.totalItems = res.data.totalCount || 0;
                this.renderTable(res.data.list || []);
                this.renderPagination();
            } else {
                Toast.error(res.message || '배포 가능 목록 조회에 실패했습니다.');
            }
        })
        .fail(() => Toast.error('배포 가능 목록 조회 중 오류가 발생했습니다.'));
    },

    renderTable: function (list) {
        const badge = document.getElementById('deployListCountBadge');
        badge.textContent = this.totalItems + '건';
        badge.className   = this.totalItems > 0 ? 'badge bg-primary' : 'badge bg-secondary';

        const tbody = $('#deployListTableBody');
        tbody.empty();
        const colCount = HAS_WRITE ? 9 : 8;
        if (!list || list.length === 0) {
            tbody.html(`<tr><td colspan="${colCount}" class="text-center py-4 text-body-secondary">
                배포 가능한 코드가 없습니다.</td></tr>`);
            return;
        }

        const offset = (this.currentPage - 1) * this.pageSize;
        list.forEach((item, idx) => {
            const safeId = HtmlUtils.escape(item.codeId || '');
            const deployCell = !HAS_WRITE ? '' :
                `<td class="text-center">
                    <button class="btn btn-sm btn-primary"
                            onclick="ReactDeployList.redeploy('${safeId}')">
                        <i class="bi bi-cloud-upload me-1"></i>배포
                    </button>
                 </td>`;

            tbody.append(`
                <tr>
                    <td class="text-center">${offset + idx + 1}</td>
                    <td class="text-center">
                        <span class="font-monospace small">${safeId}</span>
                    </td>
                    <td class="text-center">${HtmlUtils.escape(item.createUserId || '')}</td>
                    <td class="text-center">${HtmlUtils.escape(item.approvalUserId || '')}</td>
                    <td class="text-center">${formatDtime(item.approvalDtime)}</td>
                    <td class="text-center">${deployStatusBadge(item.lastDeployStatus, item.lastPrUrl)}</td>
                    <td class="text-center">${formatDtime(item.lastDeployDtime) || '<span class="text-body-secondary">-</span>'}</td>
                    ${deployCell}
                    <td class="text-center">
                        <button type="button" class="btn btn-outline-secondary btn-sm py-0 px-2"
                                onclick="ReactDeployHisModal.open('${safeId}')">
                            이력
                        </button>
                    </td>
                </tr>`);
        });
    },

    renderPagination: function () {
        const totalPages = Math.ceil(this.totalItems / this.pageSize) || 1;
        const ul = $('#deployListPagination');
        ul.empty();

        const s = this.totalItems === 0 ? 0 : (this.currentPage - 1) * this.pageSize + 1;
        const e = Math.min(this.currentPage * this.pageSize, this.totalItems);
        $('#deployListPageInfo').text(`${s} - ${e} of ${this.totalItems} items`);

        if (totalPages <= 1) return;

        const maxBtns = 5;
        let start = Math.max(1, this.currentPage - Math.floor(maxBtns / 2));
        let end   = Math.min(totalPages, start + maxBtns - 1);
        if (end - start + 1 < maxBtns) start = Math.max(1, end - maxBtns + 1);

        ul.append(`<li class="page-item ${this.currentPage === 1 ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="ReactDeployList.load(1); return false;">
                <i class="bi bi-chevron-double-left"></i></a></li>
            <li class="page-item ${this.currentPage === 1 ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="ReactDeployList.load(${this.currentPage - 1}); return false;">
                <i class="bi bi-chevron-left"></i></a></li>`);

        for (let p = start; p <= end; p++) {
            ul.append(`<li class="page-item ${p === this.currentPage ? 'active' : ''}">
                <a class="page-link" href="#" onclick="ReactDeployList.load(${p}); return false;">${p}</a></li>`);
        }

        const isLast = this.currentPage >= totalPages;
        ul.append(`<li class="page-item ${isLast ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="ReactDeployList.load(${this.currentPage + 1}); return false;">
                <i class="bi bi-chevron-right"></i></a></li>
            <li class="page-item ${isLast ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="ReactDeployList.load(${totalPages}); return false;">
                <i class="bi bi-chevron-double-right"></i></a></li>`);
    },

    redeploy: function (codeId) {
        if (!confirm('해당 코드를 배포하시겠습니까?')) return;
        $.ajax({ url: API_BASE_URL + '/react-deploy/' + codeId + '/redeploy', type: 'POST' })
            .done(res => {
                if (res.success) {
                    let msg = '배포가 완료됐습니다.';
                    if (res.data?.prUrl && isSafeUrl(res.data.prUrl)) {
                        msg += ` (<a href="${HtmlUtils.escape(res.data.prUrl)}" target="_blank" rel="noopener noreferrer">PR 확인</a>)`;
                    }
                    Toast.success(msg);
                    this.load(this.currentPage);
                    ReactDeployHis.search(); // 하단 이력 갱신
                } else {
                    Toast.error(res.message || '배포에 실패했습니다.');
                }
            })
            .fail(xhr => Toast.error(xhr.responseJSON?.message || '배포 처리 중 오류가 발생했습니다.'));
    },
};

// ═══════════════════════════════════════════════════════
//  배포 이력 모듈 (하단 테이블)
// ═══════════════════════════════════════════════════════
const ReactDeployHis = window.ReactDeployHis = {
    currentPage:   1,
    totalItems:    0,
    itemsPerPage:  10,
    appliedSearch: {},

    search: function () {
        this.appliedSearch = {
            search:   $('#hisSearchKeyword').val().trim(),
            onlyMine: $('#hisSearchOnlyMine').is(':checked'),
        };
        this.currentPage = 1;
        this.load();
    },

    load: function () {
        const params = Object.assign({}, this.appliedSearch, {
            page: this.currentPage,
            size: this.itemsPerPage,
        });
        $.ajax({
            url: API_BASE_URL + '/react-deploy/history',
            method: 'GET',
            data: params,
            success: (res) => {
                if (res.success && res.data) {
                    this.totalItems = res.data.totalCount || 0;
                    this.renderTable(res.data.list || []);
                    this.renderPagination();
                } else {
                    this.renderTable([]);
                }
            },
            error: (xhr) => {
                Toast.error(xhr.responseJSON?.message || '이력을 불러오는 중 오류가 발생했습니다.');
                this.renderTable([]);
            },
        });
    },

    renderTable: function (list) {
        const tbody = $('#deployHisTableBody');
        tbody.empty();
        if (!list || list.length === 0) {
            tbody.html(`<tr><td colspan="7" class="text-center py-4 text-body-secondary">
                조회된 데이터가 없습니다.</td></tr>`);
            return;
        }

        const offset = (this.currentPage - 1) * this.itemsPerPage;
        list.forEach((item, idx) => {
            tbody.append(`
                <tr>
                    <td class="text-center">${offset + idx + 1}</td>
                    <td class="text-center">
                        <span class="font-monospace small">${HtmlUtils.escape(item.codeId || '')}</span>
                    </td>
                    <td class="text-center">
                        <span class="badge bg-secondary">${HtmlUtils.escape(item.deployMode || '')}</span>
                    </td>
                    <td class="text-center">${deployStatusBadge(item.deployStatus, item.prUrl)}</td>
                    <td class="text-center">${HtmlUtils.escape(item.lastUpdateUserId || '')}</td>
                    <td class="text-center">${formatDtime(item.lastUpdateDtime)}</td>
                    <td>${detailCell(item.deployStatus, item.prUrl, item.failReason)}</td>
                </tr>`);
        });
    },

    renderPagination: function () {
        const totalPages = Math.ceil(this.totalItems / this.itemsPerPage) || 1;
        const pagination = $('#pagination');
        pagination.empty();

        pagination.append(`
            <li class="page-item ${this.currentPage === 1 ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="ReactDeployHis.changePage(1); return false;">
                    <i class="bi bi-chevron-double-left"></i></a></li>
            <li class="page-item ${this.currentPage === 1 ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="ReactDeployHis.changePage(${this.currentPage - 1}); return false;">
                    <i class="bi bi-chevron-left"></i></a></li>`);

        const maxBtns = 5;
        let start = Math.max(1, this.currentPage - Math.floor(maxBtns / 2));
        let end   = Math.min(totalPages, start + maxBtns - 1);
        if (end - start + 1 < maxBtns) start = Math.max(1, end - maxBtns + 1);
        for (let p = start; p <= end; p++) {
            pagination.append(`<li class="page-item ${p === this.currentPage ? 'active' : ''}">
                <a class="page-link" href="#" onclick="ReactDeployHis.changePage(${p}); return false;">${p}</a></li>`);
        }

        const isLast = this.currentPage >= totalPages;
        pagination.append(`
            <li class="page-item ${isLast ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="ReactDeployHis.changePage(${this.currentPage + 1}); return false;">
                    <i class="bi bi-chevron-right"></i></a></li>
            <li class="page-item ${isLast ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="ReactDeployHis.changePage(${totalPages}); return false;">
                    <i class="bi bi-chevron-double-right"></i></a></li>`);

        const s = this.totalItems === 0 ? 0 : (this.currentPage - 1) * this.itemsPerPage + 1;
        const e = Math.min(this.currentPage * this.itemsPerPage, this.totalItems);
        $('#pageInfo').text(`${s} - ${e} of ${this.totalItems} items`);
    },

    changePage: function (page) {
        const totalPages = Math.ceil(this.totalItems / this.itemsPerPage) || 1;
        if (page < 1 || page > totalPages) return;
        this.currentPage = page;
        this.load();
    },
};

// ═══════════════════════════════════════════════════════
//  코드별 배포 이력 상세 모달 모듈
// ═══════════════════════════════════════════════════════
const ReactDeployHisModal = window.ReactDeployHisModal = {
    currentCodeId: null,
    currentPage:   1,
    totalItems:    0,
    pageSize:      20,

    open: function (codeId) {
        this.currentCodeId = codeId;
        this.currentPage   = 1;
        $('#deployHisModalCodeId').text(codeId);
        new bootstrap.Modal(document.getElementById('deployHisModal')).show();
        this.load();
    },

    load: function () {
        if (!this.currentCodeId) return;
        $.get(API_BASE_URL + '/react-deploy/' + this.currentCodeId + '/history', {
            page: this.currentPage, size: this.pageSize,
        })
        .done(res => {
            if (res.success && res.data) {
                this.totalItems = res.data.totalCount || 0;
                this.renderTable(res.data.list || []);
                this.renderPagination();
            } else {
                this.renderTable([]);
            }
        })
        .fail(() => {
            Toast.error('이력 조회 중 오류가 발생했습니다.');
            this.renderTable([]);
        });
    },

    renderTable: function (list) {
        const tbody = $('#deployHisModalTableBody');
        tbody.empty();
        if (!list || list.length === 0) {
            tbody.html(`<tr><td colspan="6" class="text-center py-4 text-body-secondary">
                배포 이력이 없습니다.</td></tr>`);
            return;
        }

        const offset = (this.currentPage - 1) * this.pageSize;
        list.forEach((item, idx) => {
            tbody.append(`
                <tr>
                    <td class="text-center">${offset + idx + 1}</td>
                    <td class="text-center">
                        <span class="badge bg-secondary">${HtmlUtils.escape(item.deployMode || '')}</span>
                    </td>
                    <td class="text-center">${deployStatusBadge(item.deployStatus, item.prUrl)}</td>
                    <td class="text-center">${HtmlUtils.escape(item.lastUpdateUserId || '')}</td>
                    <td class="text-center">${formatDtime(item.lastUpdateDtime)}</td>
                    <td>${detailCell(item.deployStatus, item.prUrl, item.failReason)}</td>
                </tr>`);
        });
    },

    renderPagination: function () {
        const totalPages = Math.ceil(this.totalItems / this.pageSize) || 1;
        const ul = $('#deployHisModalPagination');
        ul.empty();

        const s = this.totalItems === 0 ? 0 : (this.currentPage - 1) * this.pageSize + 1;
        const e = Math.min(this.currentPage * this.pageSize, this.totalItems);
        $('#deployHisModalPageInfo').text(`${s} - ${e} of ${this.totalItems} items`);

        if (totalPages <= 1) return;

        const maxBtns = 5;
        let start = Math.max(1, this.currentPage - Math.floor(maxBtns / 2));
        let end   = Math.min(totalPages, start + maxBtns - 1);
        if (end - start + 1 < maxBtns) start = Math.max(1, end - maxBtns + 1);

        ul.append(`<li class="page-item ${this.currentPage === 1 ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="ReactDeployHisModal.changePage(${this.currentPage - 1}); return false;">
                <i class="bi bi-chevron-left"></i></a></li>`);
        for (let p = start; p <= end; p++) {
            ul.append(`<li class="page-item ${p === this.currentPage ? 'active' : ''}">
                <a class="page-link" href="#" onclick="ReactDeployHisModal.changePage(${p}); return false;">${p}</a></li>`);
        }
        const isLast = this.currentPage >= totalPages;
        ul.append(`<li class="page-item ${isLast ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="ReactDeployHisModal.changePage(${this.currentPage + 1}); return false;">
                <i class="bi bi-chevron-right"></i></a></li>`);
    },

    changePage: function (page) {
        const totalPages = Math.ceil(this.totalItems / this.pageSize) || 1;
        if (page < 1 || page > totalPages) return;
        this.currentPage = page;
        this.load();
    },
};

// ═══════════════════════════════════════════════════════
//  이벤트 바인딩
// ═══════════════════════════════════════════════════════
$(document).ready(function () {

    // ── 진입 시 목록 + 이력 동시 조회
    ReactDeployList.load(1);
    ReactDeployHis.search();

    // ── 배포 목록 검색 버튼
    $('#btnDeployListSearch').on('click', function () {
        ReactDeployList.load(1);
    });
    $('#deployListSearch').on('keydown', function (e) {
        if (e.key === 'Enter') { e.preventDefault(); ReactDeployList.load(1); }
    });

    // ── 배포 목록 새로고침
    $('#btnDeployListRefresh').on('click', function () {
        ReactDeployList.load(ReactDeployList.currentPage);
    });

    // ── 이력 검색 버튼
    $('#btnSearch').on('click', function () { ReactDeployHis.search(); });

    // ── 이력 검색 초기화
    $('#btnSearchReset').on('click', function () {
        $('#hisSearchStatus').val('');
        $('#hisSearchMode').val('');
        $('#hisSearchKeyword').val('');
        $('#hisSearchOnlyMine').prop('checked', false);
        ReactDeployHis.search();
    });

    // ── 이력 검색 영역 Enter 키 지원
    $('.card.border').on('keydown', 'input, select', function (e) {
        if (e.key === 'Enter') { e.preventDefault(); ReactDeployHis.search(); }
    });

    // ── 페이지당 건수 변경
    $('#limitRows').on('change', function () {
        ReactDeployHis.itemsPerPage = parseInt($(this).val()) || 10;
        ReactDeployHis.search();
    });

    // ── 새로고침 버튼 (툴바)
    $('#btnRefresh').on('click', function () { ReactDeployHis.load(); });

    // ── tab:activated — 탭으로 돌아올 때마다 최신 데이터 재조회
    $('[data-tab-page]').on('tab:activated', function () {
        ReactDeployList.load(ReactDeployList.currentPage);
        ReactDeployHis.load();
    });
});
})();
/*]]>*/
</script>
</th:block>
</body>
</html>
