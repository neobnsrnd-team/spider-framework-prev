<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- 배포 가능 목록 Fragment (APPROVED 코드 + 최근 배포 이력) -->
<div th:fragment="list" class="card">
    <div class="card-header">
        <div class="d-flex align-items-center gap-2">
            <span class="fw-semibold">배포 가능 목록</span>
            <span class="badge bg-secondary" id="deployListCountBadge">0건</span>
        </div>
        <div class="d-flex align-items-center gap-2">
            <input type="text" id="deployListSearch" class="form-control form-control-sm flex-fixed-200"
                   placeholder="화면 제목 / 컴포넌트명 / 요청자 검색">
            <button type="button" class="btn btn-outline-secondary btn-sm" id="btnDeployListSearch">
                <i class="bi bi-search"></i>
            </button>
            <button type="button" class="btn btn-outline-secondary btn-sm" id="btnDeployListRefresh"
                    title="새로고침">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
        </div>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-sm table-hover sp-data-grid mb-0" id="deployListTable">
                <thead class="table-light">
                    <tr>
                        <th class="text-center" style="width:50px;">No</th>
                        <th class="text-center" style="width:160px;">화면 제목</th>
                        <th class="text-center" style="width:160px;">컴포넌트명</th>
                        <th class="text-center" style="width:100px;">요청자</th>
                        <th class="text-center" style="width:120px;">승인자</th>
                        <th class="text-center" style="width:150px;">승인일시</th>
                        <th class="text-center" style="width:150px;">최근 배포 상태</th>
                        <th class="text-center" style="width:150px;">최근 배포일시</th>
                        <th class="text-center" style="width:70px;">상세</th>
                        <th class="text-center" style="width:80px;"
                            th:if="${userAuthorities != null and userAuthorities.contains('REACT_DEPLOY:W')}">
                            배포
                        </th>
                        <th class="text-center" style="width:70px;">이력</th>
                    </tr>
                </thead>
                <tbody id="deployListTableBody">
                    <tr>
                        <td colspan="9" class="text-center py-4 text-body-secondary">
                            조회 중...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="card-footer pagination-container mb-0">
        <nav aria-label="배포 가능 목록 페이지네이션">
            <ul class="pagination pagination-sm mb-0" id="deployListPagination"></ul>
        </nav>
        <div class="pagination-info">
            <span id="deployListPageInfo">0 - 0 of 0 items</span>
        </div>
    </div>
</div>
</body>
</html>
