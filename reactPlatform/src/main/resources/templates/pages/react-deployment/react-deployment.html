<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

    <!-- ===== 배포 가능 목록 섹션 ===== -->
    <div class="page-header">
        <h4 class="page-title">
            <i class="bi bi-cloud-upload text-primary"></i>
            React 코드 배포 관리
        </h4>
    </div>

    <!-- 배포 가능 목록 -->
    <div th:replace="~{pages/react-deployment/react-deployment-list :: list}"></div>

    <!-- ===== 배포 이력 섹션 ===== -->
    <div class="page-header mt-4">
        <h4 class="page-title">
            <i class="bi bi-clock-history text-primary"></i>
            배포 이력
        </h4>
    </div>

    <!-- 검색 영역 -->
    <div th:replace="~{pages/react-deployment/react-deployment-his-search :: search}"></div>

    <!-- 이력 테이블 -->
    <div th:replace="~{pages/react-deployment/react-deployment-his-table :: table}"></div>

    <!-- 페이지네이션 -->
    <div th:replace="~{fragments/page-content-layout :: pagination}"></div>

    <!-- 코드별 배포 이력 상세 모달 -->
    <div th:replace="~{pages/react-deployment/react-deployment-modal :: modal}"></div>

    <!-- 공용 코드 상세 모달 (view 모드 — 배포 전 코드 내용 확인용) -->
    <div th:replace="~{modals/react-code-detail-modal :: modal}"></div>

    <!-- 권한 정보 (JS 참조용) -->
    <!-- SPA에서 react-approval 페이지와 id 충돌을 피하기 위해 hasDeployWriteAuth 사용 -->
    <input type="hidden" id="hasDeployWriteAuth"
           th:value="${userAuthorities != null and userAuthorities.contains('REACT_DEPLOY:W')}">

    <!-- Scripts -->
    <th:block th:replace="~{pages/react-deployment/react-deployment-script :: script}" />
    <!-- 공용 모달 스크립트 (ReactCodeDetailModal 모듈) -->
    <th:block th:replace="~{modals/react-code-detail-modal-script :: script}" />
</div>
</body>
</html>
