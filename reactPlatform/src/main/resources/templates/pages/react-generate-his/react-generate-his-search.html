<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- React 코드 생성 이력 Search Fragment -->
<div th:fragment="search" class="card border p-2 mb-3">

    <!-- 1행: title, brand, domain, category, status -->
    <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
        <label class="form-label mb-0 small fw-medium">화면 제목</label>
        <input type="text" id="searchTitle" class="form-control form-control-sm flex-fixed-130"
               placeholder="화면 제목">

        <label class="form-label mb-0 small fw-medium ms-2">브랜드</label>
        <select id="searchBrand" class="form-select form-select-sm flex-fixed-120">
            <option value="">전체</option>
            <option value="HANA">하나</option>
            <option value="SHINHAN">신한</option>
            <option value="KB">국민</option>
            <option value="NH">농협</option>
            <option value="IBK">기업</option>
            <option value="WOORI">우리</option>
        </select>

        <label class="form-label mb-0 small fw-medium ms-2">도메인</label>
        <select id="searchDomain" class="form-select form-select-sm flex-fixed-120">
            <option value="">전체</option>
            <option value="BANKING">뱅킹</option>
            <option value="CARD">카드</option>
            <option value="GIRO">지로</option>
            <option value="INSURANCE">보험</option>
        </select>

        <label class="form-label mb-0 small fw-medium ms-2">분류</label>
        <select id="searchCategory" class="form-select form-select-sm flex-fixed-120">
            <option value="">전체</option>
            <option value="AUTH">인증</option>
            <option value="MAIN">메인</option>
            <option value="LIST">목록</option>
            <option value="DETAIL">상세</option>
            <option value="FORM">폼</option>
            <option value="MYPAGE">마이페이지</option>
            <option value="ADMIN">관리자</option>
            <option value="EVENT">이벤트</option>
            <option value="ERROR">오류</option>
        </select>

        <label class="form-label mb-0 small fw-medium ms-2">상태</label>
        <select id="searchStatus" class="form-select form-select-sm flex-fixed-130">
            <option value="">전체</option>
            <option value="GENERATED">생성 완료</option>
            <option value="PENDING_APPROVAL">승인 대기</option>
            <option value="APPROVED">승인 완료</option>
            <option value="FAILED">실패</option>
        </select>
    </div>

    <!-- 2행: componentName, createUserId, 날짜, 나의이력, 건씩, 버튼 -->
    <div class="d-flex flex-wrap align-items-center gap-2">
        <label class="form-label mb-0 small fw-medium">컴포넌트명</label>
        <input type="text" id="searchComponentName" class="form-control form-control-sm flex-fixed-120"
               placeholder="컴포넌트명">

        <label class="form-label mb-0 small fw-medium ms-2">생성자</label>
        <input type="text" id="searchCreateUserId" class="form-control form-control-sm flex-fixed-120"
               placeholder="생성자 ID">

        <label class="form-label mb-0 small fw-medium ms-2">생성일 시작</label>
        <input type="date" id="searchFromDate" class="form-control form-control-sm flex-fixed-140">

        <label class="form-label mb-0 small fw-medium ms-2">생성일 종료</label>
        <input type="date" id="searchToDate" class="form-control form-control-sm flex-fixed-140">

        <div class="flex-grow-1"></div>

        <!-- 나의 생성 이력: 생성자(createUserId)를 현재 로그인 사용자로 고정 -->
        <div class="form-check form-check-inline ms-2 mb-0">
            <input class="form-check-input" type="checkbox" id="chkMyOnly">
            <label class="form-check-label small fw-medium" for="chkMyOnly">나의 생성 이력</label>
        </div>

        <select id="limitRows" class="form-select form-select-sm sp-limit-select">
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="50">50</option>
        </select>
        <label class="form-label mb-0 small fw-medium">건씩</label>

        <button class="btn btn-outline-secondary btn-sm" id="btnSearchReset">
            <i class="bi bi-arrow-counterclockwise"></i> 초기화
        </button>
        <button class="btn btn-primary btn-sm" id="btnSearch">
            <i class="bi bi-search"></i> 조회
        </button>
    </div>
</div>
</body>
</html>
