<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="script">
<script th:inline="javascript">
(function () {
    // 내 것만 보기 체크박스에서 생성자 ID 고정 시 사용
    const CURRENT_USER_ID = /*[[${currentUserId}]]*/ '';

    // ─── 상태 배지 정의 ────────────────────────────────────────
    const STATUS_LABEL = {
        GENERATED:        { text: '생성 완료',  cls: 'bg-primary' },
        FAILED:           { text: '실패',        cls: 'bg-danger' },
        PENDING_APPROVAL: { text: '승인 대기',   cls: 'bg-warning text-dark' },
        APPROVED:         { text: '승인 완료',   cls: 'bg-success' },
        REJECTED:         { text: '반려',        cls: 'bg-secondary' },
    };

    // ─── 카테고리 한글 레이블 ──────────────────────────────────
    const CATEGORY_LABEL = {
        AUTH:    '인증',
        MAIN:    '메인',
        LIST:    '목록',
        DETAIL:  '상세',
        FORM:    '폼',
        MYPAGE:  '마이페이지',
        ADMIN:   '관리자',
        EVENT:   '이벤트',
        ERROR:   '오류',
    };

    // ─── 브랜드 한글 레이블 ────────────────────────────────────
    const BRAND_LABEL = {
        HANA:    '하나',
        SHINHAN: '신한',
        KB:      '국민',
        NH:      '농협',
        IBK:     '기업',
        WOORI:   '우리',
    };

    // ─── 도메인 한글 레이블 ────────────────────────────────────
    const DOMAIN_LABEL = {
        BANKING:   '뱅킹',
        CARD:      '카드',
        GIRO:      '지로',
        INSURANCE: '보험',
    };

    /** yyyyMMddHHmmss → yyyy-MM-dd HH:mm 형식으로 변환한다. */
    function formatDtime(dtime) {
        if (!dtime || dtime.length < 12) return dtime || '';
        return dtime.substring(0, 4) + '-' +
               dtime.substring(4, 6) + '-' +
               dtime.substring(6, 8) + ' ' +
               dtime.substring(8, 10) + ':' +
               dtime.substring(10, 12);
    }

    // ─── 이력 목록 모듈 ────────────────────────────────────────
    const ReactGenerateHis = window.ReactGenerateHis = {
        currentPage: 1,
        totalItems: 0,
        itemsPerPage: 10,
        appliedSearch: {},
        currentData: [],  // 현재 페이지 데이터 (출력 기능에 사용)

        /** 검색 조건을 수집하고 1페이지부터 재조회한다. */
        search: function () {
            // 내 것만 보기 체크 시 생성자 ID를 현재 로그인 사용자로 고정
            const myOnly = $('#chkMyOnly').is(':checked');
            // date input은 yyyy-MM-dd로 오므로 하이픈 제거 후 yyyyMMdd로 전달
            this.appliedSearch = {
                title:          $('#searchTitle').val().trim(),
                brand:          $('#searchBrand').val(),
                domain:         $('#searchDomain').val(),
                category:       $('#searchCategory').val(),
                componentName:  $('#searchComponentName').val().trim(),
                status:         $('#searchStatus').val(),
                createUserId:   myOnly ? CURRENT_USER_ID : $('#searchCreateUserId').val().trim(),
                fromDate:       ($('#searchFromDate').val() || '').replace(/-/g, ''),
                toDate:         ($('#searchToDate').val() || '').replace(/-/g, '')
            };
            this.currentPage = 1;
            this.load();
        },

        /** 현재 검색 조건과 페이지 번호로 API를 호출하고 테이블을 갱신한다. */
        load: function () {
            const params = Object.assign({}, this.appliedSearch, {
                page: this.currentPage,
                size: this.itemsPerPage
            });

            $.ajax({
                url: API_BASE_URL + '/react-generate/history',
                method: 'GET',
                data: params,
                success: (res) => {
                    if (res.success && res.data) {
                        this.renderTable(res.data.list || [], res.data.totalCount || 0);
                        this.totalItems = res.data.totalCount || 0;
                        this.renderPagination();
                    } else {
                        this.renderTable([], 0);
                    }
                },
                error: (xhr) => {
                    Toast.error(xhr.responseJSON?.message || '이력을 불러오는 중 오류가 발생했습니다.');
                    this.renderTable([], 0);
                }
            });
        },

        /** 이력 데이터를 받아 tbody를 렌더링한다. */
        renderTable: function (list, totalCount) {
            this.currentData = list || [];
            const tbody = $('#reactHisTableBody');
            tbody.empty();

            if (!list || list.length === 0) {
                tbody.append(`
                    <tr>
                        <td colspan="7" class="text-center py-4 text-body-secondary">
                            조회된 데이터가 없습니다.
                        </td>
                    </tr>
                `);
                return;
            }

            const offset = (this.currentPage - 1) * this.itemsPerPage;
            list.forEach((item, idx) => {
                const statusInfo = STATUS_LABEL[item.status] || { text: item.status, cls: 'bg-secondary' };
                const safeCodeId = HtmlUtils.escape(item.codeId || '');

                const row = $('<tr></tr>');

                // No
                row.append(`<td class="text-center">${offset + idx + 1}</td>`);

                // 화면 제목 (브랜드·도메인·분류는 상세 모달에서 확인)
                const $title = $('<td class="text-truncate" style="max-width:180px;"></td>');
                $title.attr('title', item.title || '');
                $title.text(item.title || '—');
                row.append($title);

                // 컴포넌트명
                const $comp = $('<td class="text-truncate font-monospace small" style="max-width:160px;"></td>');
                $comp.attr('title', item.componentName || '');
                $comp.text(item.componentName || '—');
                row.append($comp);

                // 상태
                row.append(`<td class="text-center"><span class="badge ${statusInfo.cls}">${statusInfo.text}</span></td>`);

                // 생성자
                const $user = $('<td class="text-center"></td>');
                $user.text(item.createUserId || '—');
                row.append($user);

                // 생성일시
                const $dtime = $('<td class="text-center"></td>');
                $dtime.text(formatDtime(item.createDtime));
                row.append($dtime);

                // 상세 버튼 — onclick은 textContent 기반 safeCodeId를 사용하므로 XSS 위험 없음
                row.append(`
                    <td class="text-center">
                        <button type="button" class="btn btn-outline-primary btn-sm py-0 px-2"
                                onclick="ReactGenerateHis.openDetail('${safeCodeId}')">
                            보기
                        </button>
                    </td>
                `);

                tbody.append(row);
            });
        },

        /** 페이지네이션 UI를 렌더링한다. */
        renderPagination: function () {
            const totalPages = Math.ceil(this.totalItems / this.itemsPerPage) || 1;
            const pagination = $('#pagination');
            pagination.empty();

            // 처음·이전
            pagination.append(`
                <li class="page-item ${this.currentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#"
                       onclick="ReactGenerateHis.changePage(1); return false;">
                        <i class="bi bi-chevron-double-left"></i>
                    </a>
                </li>
                <li class="page-item ${this.currentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#"
                       onclick="ReactGenerateHis.changePage(${this.currentPage - 1}); return false;">
                        <i class="bi bi-chevron-left"></i>
                    </a>
                </li>
            `);

            // 페이지 번호 버튼 (최대 5개)
            const maxButtons = 5;
            let startPage = Math.max(1, this.currentPage - Math.floor(maxButtons / 2));
            let endPage = Math.min(totalPages, startPage + maxButtons - 1);
            if (endPage - startPage + 1 < maxButtons) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }
            for (let i = startPage; i <= endPage; i++) {
                pagination.append(`
                    <li class="page-item ${i === this.currentPage ? 'active' : ''}">
                        <a class="page-link" href="#"
                           onclick="ReactGenerateHis.changePage(${i}); return false;">${i}</a>
                    </li>
                `);
            }

            // 다음·마지막
            const isLast = this.currentPage >= totalPages;
            pagination.append(`
                <li class="page-item ${isLast ? 'disabled' : ''}">
                    <a class="page-link" href="#"
                       onclick="ReactGenerateHis.changePage(${this.currentPage + 1}); return false;">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                </li>
                <li class="page-item ${isLast ? 'disabled' : ''}">
                    <a class="page-link" href="#"
                       onclick="ReactGenerateHis.changePage(${totalPages}); return false;">
                        <i class="bi bi-chevron-double-right"></i>
                    </a>
                </li>
            `);

            const start = this.totalItems === 0 ? 0 : (this.currentPage - 1) * this.itemsPerPage + 1;
            const end   = Math.min(this.currentPage * this.itemsPerPage, this.totalItems);
            $('#pageInfo').text(`${start} - ${end} of ${this.totalItems} items`);
        },

        /** 페이지를 변경하고 목록을 다시 불러온다. */
        changePage: function (page) {
            const totalPages = Math.ceil(this.totalItems / this.itemsPerPage) || 1;
            if (page < 1 || page > totalPages) return;
            this.currentPage = page;
            this.load();
        },

        // ─── 상세 모달 ───────────────────────────────────────────
        // 공용 ReactCodeDetailModal 모듈에 위임한다.
        // 승인 요청 성공 후 목록 갱신 콜백을 함께 전달한다.

        /** 상세 모달을 열고 지정된 codeId 데이터를 불러온다. */
        openDetail: function (codeId) {
            ReactCodeDetailModal.open(codeId, 'history', {
                onRequestApproval: () => ReactGenerateHis.load(),
                // 재생성 완료 후 목록 갱신
                onRegenerate: () => ReactGenerateHis.load(),
            });
        },
    };

    // ─── 검색 폼 이벤트 ──────────────────────────────────────
    $('#btnSearch').on('click', function () {
        ReactGenerateHis.search();
    });

    $('#btnSearchReset').on('click', function () {
        $('#searchTitle').val('');
        $('#searchBrand').val('');
        $('#searchDomain').val('');
        $('#searchCategory').val('');
        $('#searchComponentName').val('');
        $('#searchStatus').val('');
        $('#searchCreateUserId').val('').prop('disabled', false);
        $('#searchFromDate').val('');
        $('#searchToDate').val('');
        $('#chkMyOnly').prop('checked', false);
        ReactGenerateHis.search();
    });

    // 내 것만 보기: 체크 시 생성자 입력 필드 비활성화, 즉시 재조회
    $('#chkMyOnly').on('change', function () {
        $('#searchCreateUserId').prop('disabled', this.checked).val('');
        ReactGenerateHis.search();
    });

    // 검색 영역 Enter 키 지원
    $('.card.border').on('keydown', 'input, select', function (e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            ReactGenerateHis.search();
        }
    });

    // 페이지당 건수 변경
    $('#limitRows').on('change', function () {
        ReactGenerateHis.itemsPerPage = parseInt($(this).val()) || 10;
        ReactGenerateHis.search();
    });

    // 새로고침 버튼
    $('#btnRefresh').on('click', function () {
        ReactGenerateHis.load();
    });

    // ─── 엑셀 내보내기 ────────────────────────────────────────
    // 현재 검색 조건 그대로 서버에서 전체 데이터를 xlsx로 다운로드
    $('#btnExcel').off('click').on('click', function () {
        const params = Object.assign({}, ReactGenerateHis.appliedSearch);
        const qs = $.param(params);
        window.location.href = API_BASE_URL + '/react-generate/history/export' + (qs ? '?' + qs : '');
    });

    // ─── 출력 ─────────────────────────────────────────────────
    // 현재 페이지에 표시된 데이터를 PrintUtil로 출력
    $('#btnPrint').off('click').on('click', function () {
        // 브랜드·도메인·분류는 테이블에서 제거되었으므로 출력에서도 제외
        const columns = [
            { key: 'title',          label: '화면 제목' },
            { key: 'componentName',  label: '컴포넌트명' },
            { key: 'statusLabel',    label: '상태' },
            { key: 'createUserId',   label: '생성자' },
            { key: 'createDtimeFmt', label: '생성일시' },
        ];
        const printData = ReactGenerateHis.currentData.map(function (item) {
            const statusInfo = STATUS_LABEL[item.status] || { text: item.status };
            return {
                title:          item.title || '',
                componentName:  item.componentName || '',
                statusLabel:    statusInfo.text,
                createUserId:   item.createUserId || '',
                createDtimeFmt: formatDtime(item.createDtime),
            };
        });
        PrintUtil.print({ title: 'React 코드 생성 이력', columns: columns, data: printData });
    });

    // ─── 초기 조회 ─────────────────────────────────────────────
    ReactGenerateHis.search();

    // 캐시에서 복원 시(tab:activated) React 코드 생성 이력 최신화
    $('[data-tab-page]').on('tab:activated', function () {
        ReactGenerateHis.search();
    });
})();
</script>
</th:block>
</body>
</html>
