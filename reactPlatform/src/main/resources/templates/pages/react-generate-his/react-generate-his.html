<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

    <!-- Page Header -->
    <div class="page-header">
        <h4 class="page-title">
            <i class="bi bi-clock-history text-primary"></i>
            React 코드 생성 이력
        </h4>
    </div>

    <!-- Search Box -->
    <div th:replace="~{pages/react-generate-his/react-generate-his-search :: search}"></div>

    <!-- List Section Header + Toolbar -->
    <div class="d-flex align-items-center mt-3">
        <div class="page-header mb-0">
            <h4 class="page-title mb-0">
                <i class="bi bi-list-ul text-primary"></i>
                목록
            </h4>
        </div>
        <div class="flex-grow-1" th:insert="~{fragments/page-content-layout :: toolbar}"></div>
    </div>

    <!-- Table -->
    <div th:replace="~{pages/react-generate-his/react-generate-his-table :: table}"></div>

    <!-- Pagination -->
    <div th:replace="~{fragments/page-content-layout :: pagination}"></div>

    <!-- 공용 코드 상세 모달 -->
    <div th:replace="~{modals/react-code-detail-modal :: modal}"></div>
    <!-- 재생성 모달 -->
    <div th:replace="~{modals/react-regenerate-modal :: modal}"></div>

    <!-- Script -->
    <th:block th:replace="~{pages/react-generate-his/react-generate-his-script :: script}" />
    <!-- 공용 모달 스크립트 (ReactCodeDetailModal 모듈) -->
    <th:block th:replace="~{modals/react-code-detail-modal-script :: script}" />
    <!-- 재생성 모달 스크립트 (ReactRegenerateModal 모듈) -->
    <th:block th:replace="~{modals/react-regenerate-modal-script :: script}" />
</div>
</body>
</html>
